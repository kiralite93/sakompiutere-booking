        setSheetData({ bookings: created, total: { price: created.reduce((s, b) => s + b.price, 0), coins: created.reduce((s, b) => s + b.coins, 0) } });
        setSheet("pay");
        if (isMulti) { setMulti(false); setMultiSel([]); }
      };

      return <React.Fragment>
        <div className="overlay" onClick={close} />
        <div className="sheet"><div className="sheet-bar" />

          {/* Header: single vs multi */}
          {isMulti ? (
            <div style={{ marginBottom: 10 }}>
              <h3 style={{ marginBottom: 6 }}>{L("book")} {pcCount} PCs</h3>
              <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                {pcs.map(p => (
                  <div key={p.id} style={{
                    display: "inline-flex", alignItems: "center", gap: 3,
                    background: conflictPids.includes(p.id) ? "var(--c1)" : "var(--t1)",
                    border: `1px solid ${conflictPids.includes(p.id) ? "rgba(255,107,107,.2)" : "rgba(78,205,196,.2)"}`,
                    borderRadius: 10, padding: "3px 8px", fontSize: 10, fontWeight: 600,
                    color: conflictPids.includes(p.id) ? "var(--coral)" : "var(--teal)"
                  }}>
                    {p.icon} {p.name} {conflictPids.includes(p.id) && "⚠️"}
                  </div>
                ))}
              </div>
            </div>
          ) : (
            <h3>{L("book")} {pcs[0]?.icon} {pcs[0]?.name}</h3>
          )}

          {/* Mode: Now or Scheduled */}
          <div style={{ display: "flex", gap: 4, marginBottom: 10 }}>
            <button className={`ftab ${!bkCustom ? "act" : ""}`} onClick={() => setBkCustom(false)} style={{ flex: 1, textAlign: "center" }}>
              ⚡ {lang === "ka" ? "ახლავე" : "Start Now"}
            </button>
            <button className={`ftab ${bkCustom ? "act" : ""}`} onClick={() => { setBkCustom(true); setBkT0(fmtDT(new Date(now + 3600000))); setBkT1(fmtDT(new Date(now + 2 * 3600000))); }} style={{ flex: 1, textAlign: "center" }}>
              📅 {lang === "ka" ? "დაგეგმე" : "Schedule"}
            </button>
          </div>

          {/* Start Now — duration picker */}
          {!bkCustom && (
            <div className="dur-grid">
              {[1, 2, 3, 4, 5].map(h => <button key={h} className={`ftab ${bkDur === h ? "act" : ""}`} onClick={() => setBkDur(h)}>{h}h</button>)}
            </div>
          )}

          {/* Scheduled mode */}
          {bkCustom && (
            <div style={{ marginBottom: 10 }}>
              <div style={{ fontSize: 9, color: "var(--tx2)", fontWeight: 600, marginBottom: 4 }}>
                {lang === "ka" ? "სწრაფი დაწყება:" : "Quick start:"}
              </div>
              <div style={{ display: "flex", gap: 3, marginBottom: 8, flexWrap: "wrap" }}>
                {quickStarts.map((q, i) => (
                  <button key={i} className="ftab" onClick={() => setStart(q.ts)} style={{ fontSize: 9, padding: "3px 8px" }}>{q.label}</button>
                ))}
              </div>

              <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
                <div>
                  <div style={{ fontSize: 9, color: "var(--tx2)", fontWeight: 600, marginBottom: 2 }}>
                    {lang === "ka" ? "დაწყება" : "Start"}
                  </div>
                  <input className="inp" type="datetime-local" value={bkT0} onChange={e => {
                    setBkT0(e.target.value);
                    const newStart = new Date(e.target.value).getTime();
                    if (!isNaN(newStart)) setBkT1(fmtDT(new Date(newStart + bkDur * 3600000)));
                  }} />
                </div>
                <div>
                  <div style={{ fontSize: 9, color: "var(--tx2)", fontWeight: 600, marginBottom: 2 }}>
                    {lang === "ka" ? "ხანგრძლივობა" : "Duration"}
                  </div>
                  <div className="dur-grid" style={{ marginBottom: 0 }}>
                    {[1, 2, 3, 4, 5].map(h => (
                      <button key={h} className={`ftab ${Math.abs(hrs - h) < 0.1 ? "act" : ""}`}
                        onClick={() => {
                          const s = new Date(bkT0).getTime();
                          if (!isNaN(s)) { setBkT1(fmtDT(new Date(s + h * 3600000))); setBkDur(h); }
                        }}>{h}h</button>
                    ))}
                  </div>
                </div>
                <div>
                  <div style={{ fontSize: 9, color: "var(--tx2)", fontWeight: 600, marginBottom: 2 }}>
                    {lang === "ka" ? "დასრულება" : "End"}
                  </div>
                  <input className="inp" type="datetime-local" value={bkT1} onChange={e => setBkT1(e.target.value)} />
                </div>
              </div>

              <div style={{ fontSize: 9, color: "var(--tx2)", marginTop: 6, textAlign: "center" }}>
                📅 {fmtDate(startTs, lang)} {fmt(startTs)} → {fmt(endTs)} ({hrs.toFixed(1)}h)
              </div>
            </div>
          )}

          {/* Price summary */}
          <div className="price-box">
            <div style={{ fontSize: 10, color: "var(--tx2)" }}>
              {hrs.toFixed(1)}h {isMulti ? `× ${pcCount} PCs` : ""}
            </div>
            {calc.disc > 0 && <div style={{ fontSize: 10, color: "var(--tx2)", textDecoration: "line-through" }}>₾{isMulti ? (calc.base * pcCount).toFixed(0) : calc.base}</div>}
            <div className="price-big">₾{totalPrice}</div>
            <div className="coins-earn">🪙 +{totalCoins}{isHappyHour() ? " 🔥" : ""}</div>
          </div>

          {/* Conflict warning */}
          {hasConflict && (
            <div style={{ background: "var(--c1)", borderRadius: 8, padding: 6, marginBottom: 8, fontSize: 10, color: "var(--coral)" }}>
              ⚠️ {L("conflict")} {isMulti && (
                <span> ({conflictPids.length} PC{conflictPids.length > 1 ? "s" : ""}: {conflictPids.map(pid => ALL_PCS.find(p => p.id === pid)?.name).join(", ")})</span>
              )}
              {isMulti && conflictPids.length < pcCount && (
                <div style={{ fontSize: 9, marginTop: 3, color: "var(--tx2)" }}>
                  ✓ {pcCount - conflictPids.length} PCs will still be booked
                </div>
              )}
            </div>
          )}

          <button className="btn btn-teal" style={{ width: "100%" }} disabled={(hasConflict && !isMulti) || hrs <= 0} onClick={confirmBooking}>
            {L("confirm")} {isMulti && hasConflict && conflictPids.length < pcCount ? `(${pcCount - conflictPids.length} PCs)` : ""}
          </button>
          <button className="btn btn-ghost" style={{ width: "100%", marginTop: 4 }} onClick={close}>{L("cancel")}</button>
        </div>
      </React.Fragment>;
    }

    // PAYMENT — handles single booking (from createBooking) and multi (from unified book sheet)
    if (sheet === "pay" && sheetData) {
      const bks = sheetData.bookings || [sheetData]; // array of bookings
      const total = sheetData.total || { price: bks[0]?.price || 0, coins: bks[0]?.coins || 0 };
      const isMulti = bks.length > 1;

      return <React.Fragment>
        <div className="overlay" onClick={close} />
        <div className="sheet"><div className="sheet-bar" />
          <h3>{L("payment")}</h3>

          {/* Booking summary cards */}
          {bks.map(bk => {
            const pc = ALL_PCS.find(p => p.id === bk.pid);
            return <div key={bk.id} className="card" style={{ marginBottom: 5, padding: 8 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ fontSize: 20 }}>{pc?.icon}</span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 700, fontSize: 11 }}>{pc?.name}</div>
                  <div style={{ fontSize: 9, color: "var(--tx2)" }}>{fmtDate(bk.t0, lang)} {fmt(bk.t0)}–{fmt(bk.t1)} · {bk.hrs}h</div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontFamily: "Nunito", fontWeight: 700, fontSize: 11, color: "var(--teal)" }}>₾{bk.price}</div>
                  <div style={{ fontSize: 8, color: "var(--gold)" }}>🪙+{bk.coins}</div>
                </div>
              </div>
            </div>;
          })}

          {/* Total for multi */}
          {isMulti && (
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 4px", borderTop: "1px solid var(--s3)", marginTop: 4, marginBottom: 6 }}>
              <span style={{ fontSize: 10, color: "var(--tx2)", fontWeight: 600 }}>Total ({bks.length} PCs)</span>
              <div style={{ textAlign: "right" }}>
                <span style={{ fontFamily: "Nunito", fontWeight: 900, fontSize: 18, color: "var(--teal)" }}>₾{Math.round(total.price * 100) / 100}</span>
                <span style={{ color: "var(--gold)", fontWeight: 700, fontSize: 11, marginLeft: 8 }}>🪙+{total.coins}</span>
              </div>
            </div>
          )}

          <div className="card" style={{ marginBottom: 8, marginTop: isMulti ? 0 : 4 }}>
            <div style={{ fontSize: 10, color: "var(--tx2)", marginBottom: 3 }}>TBC Bank</div>
            <code style={{ fontSize: 10, color: "var(--teal)", fontWeight: 600 }}>{IBAN}</code>
          </div>
          <p style={{ fontSize: 10, color: "var(--tx2)", textAlign: "center", marginBottom: 8 }}>{L("payMsg")}</p>
          <div style={{ textAlign: "center", marginBottom: 8 }}><span className="pl pl-g">⏳ {L("pending")}</span></div>
          <button className="btn btn-ghost" style={{ width: "100%" }} onClick={close}>OK</button>
        </div>
      </React.Fragment>;
    }

    // EDIT BOOKING — user can reschedule their pending/active booking
    if (sheet === "editbk" && sheetData?.editBk) {
      const bk = sheetData.editBk;
      const pc = sheetData.pc;
      const now = Date.now();

      const quickStarts = [
        { label: "+30m", ts: now + 30 * 60000 },
        { label: "+1h", ts: now + 3600000 },
        { label: "+2h", ts: now + 2 * 3600000 },
        { label: "+3h", ts: now + 3 * 3600000 },
      ];
      const tmrw = new Date(now); tmrw.setDate(tmrw.getDate() + 1); tmrw.setMinutes(0, 0, 0);
      quickStarts.push({ label: lang === "ka" ? "ხვალ" : "Tomorrow", ts: tmrw.getTime() });

      const startTs = new Date(bkT0).getTime();
      const endTs = new Date(bkT1).getTime();
      const hrs = Math.max(0, (endTs - startTs) / 3600000);
      const calc = calcPrice(hrs, user);
      const conflict = bookings.some(b => b.pid === bk.pid && b.id !== bk.id && ["active", "pending", "playing"].includes(b.s) && b.t0 < endTs && b.t1 > startTs);

      const setStart = (ts) => {
        setBkT0(fmtDT(new Date(ts)));
        setBkT1(fmtDT(new Date(ts + bkDur * 3600000)));
      };

      const saveEdit = () => {
        if (hrs <= 0) return showToast("❌ Invalid time");
        if (conflict) return showToast("❌ " + L("conflict"));
        setBookings(bs => bs.map(b => {
          if (b.id !== bk.id) return b;
          return { ...b, t0: startTs, t1: endTs, hrs: Math.round(hrs * 100) / 100, price: calc.final, coins: calc.coins };
        }));
        setSheet(null);
        showToast("✅ " + (lang === "ka" ? "ჯავშანი განახლდა" : "Booking updated"));
      };

      return <React.Fragment>
        <div className="overlay" onClick={close} />
        <div className="sheet"><div className="sheet-bar" />
          <h3>✏️ {lang === "ka" ? "ჯავშნის რედაქტირება" : "Edit Booking"}</h3>
          <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 10, background: "var(--s2)", borderRadius: 10, padding: 8 }}>
            <span style={{ fontSize: 20 }}>{pc?.icon}</span>
            <div>
              <div style={{ fontWeight: 700, fontSize: 11 }}>{pc?.name}</div>
              <div style={{ fontSize: 8, color: "var(--tx2)" }}>
                {lang === "ka" ? "ძველი:" : "Was:"} {fmtDate(bk.t0, lang)} {fmt(bk.t0)}–{fmt(bk.t1)}
              </div>
            </div>
            <StatusPill status={bk.s} L={L} />
          </div>

          {/* Quick start presets */}
          <div style={{ fontSize: 9, color: "var(--tx2)", fontWeight: 600, marginBottom: 4 }}>
            {lang === "ka" ? "სწრაფი დაწყება:" : "Quick start:"}
          </div>
          <div style={{ display: "flex", gap: 3, marginBottom: 8, flexWrap: "wrap" }}>
            {quickStarts.map((q, i) => (
              <button key={i} className="ftab" onClick={() => setStart(q.ts)} style={{ fontSize: 9, padding: "3px 8px" }}>{q.label}</button>
            ))}
          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: 5, marginBottom: 8 }}>
            <div>
              <div style={{ fontSize: 9, color: "var(--tx2)", fontWeight: 600, marginBottom: 2 }}>{lang === "ka" ? "დაწყება" : "Start"}</div>
              <input className="inp" type="datetime-local" value={bkT0} onChange={e => {
                setBkT0(e.target.value);
                const ns = new Date(e.target.value).getTime();
                if (!isNaN(ns)) setBkT1(fmtDT(new Date(ns + bkDur * 3600000)));
              }} />
            </div>
            <div>
              <div style={{ fontSize: 9, color: "var(--tx2)", fontWeight: 600, marginBottom: 2 }}>{lang === "ka" ? "ხანგრძლივობა" : "Duration"}</div>
              <div className="dur-grid" style={{ marginBottom: 0 }}>
                {[1, 2, 3, 4, 5].map(h => (
                  <button key={h} className={`ftab ${Math.abs(hrs - h) < 0.1 ? "act" : ""}`}
                    onClick={() => {
                      const s = new Date(bkT0).getTime();
                      if (!isNaN(s)) { setBkT1(fmtDT(new Date(s + h * 3600000))); setBkDur(h); }
                    }}>{h}h</button>
                ))}
              </div>
            </div>
            <div>
              <div style={{ fontSize: 9, color: "var(--tx2)", fontWeight: 600, marginBottom: 2 }}>{lang === "ka" ? "დასრულება" : "End"}</div>
              <input className="inp" type="datetime-local" value={bkT1} onChange={e => setBkT1(e.target.value)} />
            </div>
          </div>

          <div style={{ fontSize: 9, color: "var(--tx2)", textAlign: "center", marginBottom: 6 }}>
            📅 {fmtDate(startTs, lang)} {fmt(startTs)} → {fmt(endTs)} ({hrs.toFixed(1)}h)
          </div>

          <div className="price-box">
            <div style={{ fontSize: 10, color: "var(--tx2)" }}>{hrs.toFixed(1)}h</div>
            <div className="price-big">₾{calc.final}</div>
            <div className="coins-earn">🪙 +{calc.coins}{isHappyHour() ? " 🔥" : ""}</div>
          </div>

          {conflict && <div style={{ background: "var(--c1)", borderRadius: 8, padding: 6, marginBottom: 8, fontSize: 10, color: "var(--coral)", textAlign: "center" }}>⚠️ {L("conflict")}</div>}

          <button className="btn btn-teal" style={{ width: "100%" }} disabled={conflict || hrs <= 0} onClick={saveEdit}>
            💾 {lang === "ka" ? "შენახვა" : "Save Changes"}
          </button>
          <button className="btn btn-ghost" style={{ width: "100%", marginTop: 4 }} onClick={close}>{L("cancel")}</button>
        </div>
      </React.Fragment>;
    }

    // EDIT USER — admin modal to edit user details
    if (sheet === "edituser" && editUid) {
      const eu = users.find(x => x.id === editUid);
      if (!eu) return null;
      const euTier = getTier(Number(editFields.hr) || 0);
      const ef = editFields;
      const setF = (k, v) => setEditFields(f => ({ ...f, [k]: v }));

      return <React.Fragment>
        <div className="overlay" onClick={close} />
        <div className="modal">
          <div style={{ textAlign: "center", marginBottom: 10 }}>
            <div style={{ fontSize: 24, marginBottom: 2 }}>{euTier.icon}</div>
            <h3 style={{ margin: 0 }}>✏️ {lang === "ka" ? "მომხმარებლის რედაქტირება" : "Edit User"}</h3>
            <div style={{ fontSize: 9, color: "var(--tx2)", marginTop: 2 }}>ID: {eu.id}</div>
          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {/* Nick & Email */}
            <div style={{ display: "flex", gap: 4 }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 8, color: "var(--tx2)", fontWeight: 600, marginBottom: 2 }}>{L("nick")}</div>
                <input className="inp" value={ef.nick || ""} onChange={e => setF("nick", e.target.value)} />
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 8, color: "var(--tx2)", fontWeight: 600, marginBottom: 2 }}>{L("email")}</div>
                <input className="inp" value={ef.email || ""} onChange={e => setF("email", e.target.value)} />
              </div>
            </div>

            {/* Password */}
            <div>
              <div style={{ fontSize: 8, color: "var(--tx2)", fontWeight: 600, marginBottom: 2 }}>
                {L("password")} <span style={{ fontSize: 7, color: "var(--s4)" }}>({lang === "ka" ? "ცარიელი = არ შეიცვლება" : "empty = no change"})</span>
              </div>
              <input className="inp" type="password" placeholder="••••••" value={ef.pw || ""} onChange={e => setF("pw", e.target.value)} />
            </div>

            {/* Coins & Hours & Streak */}
            <div style={{ display: "flex", gap: 4 }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 8, color: "var(--tx2)", fontWeight: 600, marginBottom: 2 }}>🪙 {L("coins")}</div>
                <input className="inp" type="number" value={ef.co ?? 0} onChange={e => setF("co", e.target.value)} style={{ padding: "6px 8px" }} />
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 8, color: "var(--tx2)", fontWeight: 600, marginBottom: 2 }}>⏱ {L("hours")}</div>
                <input className="inp" type="number" value={ef.hr ?? 0} onChange={e => setF("hr", e.target.value)} style={{ padding: "6px 8px" }} />
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 8, color: "var(--tx2)", fontWeight: 600, marginBottom: 2 }}>🔥 {L("streak")}</div>
                <input className="inp" type="number" value={ef.st ?? 0} onChange={e => setF("st", e.target.value)} style={{ padding: "6px 8px" }} />
              </div>
            </div>

            {/* Total Coins Earned */}
            <div>
              <div style={{ fontSize: 8, color: "var(--tx2)", fontWeight: 600, marginBottom: 2 }}>🪙 {lang === "ka" ? "სულ მონეტა" : "Total Coins Earned"}</div>
              <input className="inp" type="number" value={ef.ce ?? 0} onChange={e => setF("ce", e.target.value)} style={{ padding: "6px 8px" }} />
            </div>

            {/* Role selector */}
            <div>
              <div style={{ fontSize: 8, color: "var(--tx2)", fontWeight: 600, marginBottom: 2 }}>Role</div>
              <div style={{ display: "flex", gap: 3 }}>
                {["user", "mod", "admin"].map(r => (
                  <button key={r} className={`btn btn-sm ${ef.role === r ? "btn-teal" : "btn-ghost"}`}
                    style={{ flex: 1, fontSize: 9, padding: "5px 0" }} onClick={() => setF("role", r)}>
                    {r.toUpperCase()}
                  </button>
                ))}
              </div>
            </div>

            {/* Verified toggle */}
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "4px 0" }}>
              <span style={{ fontSize: 10, color: "var(--tx2)", fontWeight: 600 }}>
                {lang === "ka" ? "ვერიფიცირებული" : "Verified"}
              </span>
              <button className={`btn btn-sm ${ef.verified ? "btn-teal" : "btn-ghost"}`}
                style={{ fontSize: 9 }}
                onClick={() => setF("verified", !ef.verified)}>
                {ef.verified ? "✓ Yes" : "✕ No"}
              </button>
            </div>

            {/* Tier preview */}
            <div style={{ background: "var(--s2)", borderRadius: 8, padding: 8, textAlign: "center", border: `1px solid ${euTier.c}33` }}>
              <span style={{ fontSize: 14 }}>{euTier.icon}</span>
              <span style={{ fontFamily: "Nunito", fontWeight: 800, fontSize: 12, color: euTier.c, marginLeft: 6 }}>{euTier[lang] || euTier.en}</span>
              <span style={{ fontSize: 9, color: "var(--tx2)", marginLeft: 6 }}>{euTier.mul}× · -{euTier.disc}%</span>
            </div>
          </div>

          <div style={{ display: "flex", gap: 4, marginTop: 12 }}>
            <button className="btn btn-teal" style={{ flex: 1 }} onClick={saveEditUser}>
              💾 {lang === "ka" ? "შენახვა" : "Save"}
            </button>
            <button className="btn btn-ghost" onClick={close}>{L("cancel")}</button>
          </div>
        </div>
      </React.Fragment>;
    }

    return null;
  };

  // ═══════════════════
  // MAIN RENDER
  // ═══════════════════
  const isAdm = user?.role === "admin" || user?.role === "mod";
  const tabs = [
    { id: "home", icon: "🖥️", label: "home" },
    { id: "bookings", icon: "📋", label: "bookings" },
    { id: "chat", icon: "💬", label: "chat" },
    { id: "forum", icon: "📢", label: "forum" },
    { id: "profile", icon: "👤", label: "profile" },
    ...(isAdm ? [{ id: "admin", icon: "⚙️", label: "admin" }] : []),
  ];

  return (
    <div className="app">
      <style>{CSS}</style>
      <div className="amb amb-1" />
      <div className="amb amb-2" />

      {/* Header — no clock, shows username + tier */}
      <div className="hdr">
        <div className="hdr-brand">{L("brand")}</div>
        <div className="hdr-right">
          {user && <div className="hdr-user"><span style={{ fontSize: 13 }}>{tier.icon}</span> {user.nick}</div>}
          <button className="hdr-btn" onClick={() => setLang(lang === "en" ? "ka" : "en")}>{lang === "en" ? "🇬🇪" : "🇬🇧"}</button>
          {user && <button className="hdr-btn" onClick={() => {
            setNotifOpen(!notifOpen);
            if (!notifOpen) setNotifs(n => { const o = { ...n }; if (o[user.id]) o[user.id] = o[user.id].map(x => ({ ...x, read: true })); return o; });
          }}>🔔{unreadN > 0 && <span className="badge">{unreadN}</span>}</button>}
          {user
            ? <button className="hdr-btn" onClick={doLogout}>🚪</button>
            : <button className="hdr-btn" onClick={() => { setSheet("auth"); setAuthMode("login"); setANick(""); setAEmail(""); setAPw(""); }}>🔑</button>
          }
        </div>
      </div>

      {/* Notification panel */}
      {notifOpen && <div className="notif-panel">
        {myNotifs.length === 0
          ? <div className="empty" style={{ padding: 12 }}>{L("noNotif")}</div>
          : myNotifs.map(n => <div key={n.id} className="notif-item">
            <div style={{ fontSize: 14, flexShrink: 0 }}>{n.icon}</div>
            <div style={{ flex: 1 }}>{n.text}</div>
            <div style={{ fontSize: 8, color: "var(--tx2)", whiteSpace: "nowrap" }}>{ago(n.ts, lang)}</div>
          </div>)
        }
      </div>}

      {/* Tab content */}
      <div className="content" key={tab}>
        {tab === "home" && renderHome()}
        {tab === "bookings" && renderBookings()}
        {tab === "chat" && renderChat()}
        {tab === "forum" && renderForum()}
        {tab === "profile" && renderProfile()}
        {tab === "admin" && renderAdmin()}
      </div>

      {/* Bottom nav */}
      <div className="bnav">
        {tabs.map(t => (
          <button key={t.id} className={tab === t.id ? "act" : ""} onClick={() => { setTab(t.id); setChatUid(null); setForumTid(null); }}>
            <span className="ti">{t.icon}</span>
            {L(t.label)}
            {t.id === "chat" && chatUnread > 0 && <span className="dot" />}
          </button>
        ))}
      </div>

      {/* Sheets */}
      {renderSheet()}

      {/* Toast */}
      {toast && <div className="toast">{toast}</div>}

      {/* Confetti */}
      {confetti && ["🎉", "⭐", "🎮", "🪙", "💎", "🔥", "✨", "🏆"].map((e, i) => (
        <div key={i} className="confetti" style={{ left: `${8 + i * 11}%`, animationDelay: `${i * .18}s` }}>{e}</div>
      ))}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
