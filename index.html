<!doctype html>
<html lang="ka">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Sakompiutere Gaming — Live Hall</title>
  <meta name="theme-color" content="#0b1020" />
  <link rel="icon" href="data:," />

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    :root{
      --bg:#070a12;
      --card:#0d1324;
      --text:#edf3ff;
      --muted:#9aa7c7;
      --line:rgba(255,255,255,.09);
      --free:#34d399;
      --soon:#fbbf24;
      --busy:#fb7185;
      --accent:#6ee7ff;
      --accent2:#a78bfa;
      --shadow:0 18px 60px rgba(0,0,0,.45);
      --glassA:rgba(255,255,255,.075);
      --glassB:rgba(255,255,255,.035);
    }

    body[data-theme="light"]{
      --bg:#eef4ff;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#5b6b86;
      --line:rgba(15,23,42,.10);
      --free:#059669;
      --soon:#d97706;
      --busy:#e11d48;
      --accent:#0284c7;
      --accent2:#7c3aed;
      --shadow:0 18px 45px rgba(15,23,42,.10);
      --glassA:rgba(255,255,255,.9);
      --glassB:rgba(255,255,255,.72);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    html{-webkit-text-size-adjust:100%}

    body{
      margin:0;
      color:var(--text);
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:
        radial-gradient(1000px 600px at 10% -10%, rgba(110,231,255,.12), transparent 60%),
        radial-gradient(900px 700px at 90% 0%, rgba(167,139,250,.14), transparent 60%),
        radial-gradient(1200px 700px at 50% 120%, rgba(52,211,153,.08), transparent 60%),
        var(--bg);
      overflow-x:hidden;
      transition:background .2s ease,color .2s ease;
      word-wrap:break-word;
      overflow-wrap:anywhere;
    }

    body[data-theme="light"]{
      background:
        radial-gradient(1000px 600px at 10% -10%, rgba(2,132,199,.10), transparent 60%),
        radial-gradient(900px 700px at 90% 0%, rgba(124,58,237,.10), transparent 60%),
        radial-gradient(1200px 700px at 50% 120%, rgba(5,150,105,.08), transparent 60%),
        var(--bg);
    }

    .wrap{
      max-width:1360px;
      margin:0 auto;
      padding:14px;
      padding-bottom:max(14px, env(safe-area-inset-bottom));
    }

    .glass{
      background:linear-gradient(180deg, var(--glassA), var(--glassB));
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
    }

    .hidden{display:none !important}

    .headerShell{
      border-radius:28px;
      position:sticky;
      top:10px;
      z-index:50;
      overflow:hidden;
      padding:0;
    }

    .hero{
      position:relative;
      padding:18px 18px 16px;
      min-width:0;
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:-20% auto auto -10%;
      width:280px;
      height:180px;
      border-radius:999px;
      background:radial-gradient(circle, rgba(110,231,255,.18), transparent 70%);
      filter:blur(24px);
      pointer-events:none;
    }

    .hero::after{
      content:"";
      position:absolute;
      inset:auto -10% -35% auto;
      width:320px;
      height:220px;
      border-radius:999px;
      background:radial-gradient(circle, rgba(167,139,250,.16), transparent 70%);
      filter:blur(28px);
      pointer-events:none;
    }

    .heroGrid{
      position:relative;
      z-index:1;
      display:grid;
      grid-template-columns:minmax(0,1fr) auto;
      gap:16px;
      align-items:start;
    }

    .heroMain{
      min-width:0;
    }

    .heroTopLine{
      display:flex;
      align-items:center;
      gap:8px;
      margin-bottom:10px;
      color:#d8fff0;
      font-size:13px;
      font-weight:800;
      letter-spacing:.03em;
    }

    .liveDot{
      width:10px;
      height:10px;
      border-radius:999px;
      background:var(--free);
      box-shadow:0 0 0 0 rgba(52,211,153,.4);
      animation:pulse 1.8s infinite;
      flex:0 0 10px;
    }

    @keyframes pulse{
      70%{box-shadow:0 0 0 10px rgba(52,211,153,0)}
      100%{box-shadow:0 0 0 0 rgba(52,211,153,0)}
    }

    .brandRow{
      display:flex;
      align-items:flex-start;
      gap:14px;
      min-width:0;
    }

    .logo{
      width:70px;
      height:70px;
      flex:0 0 70px;
      border-radius:18px;
      background-image:url("./logo.png");
      background-repeat:no-repeat;
      background-position:center;
      background-size:contain;
      background-color:transparent;
      border:none;
      box-shadow:none;
      overflow:hidden;
      margin-top:2px;
    }

    .heroText{
      min-width:0;
      flex:1 1 auto;
    }

    h1{
      margin:0;
      font-size:20px;
      line-height:1.15;
      font-weight:1000;
      overflow-wrap:anywhere;
    }

    .heroSubtitle{
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
      line-height:1.45;
      max-width:720px;
    }

    .heroPills{
      display:grid;
      grid-template-columns:repeat(2, minmax(220px,1fr));
      gap:10px;
      margin-top:14px;
      min-width:0;
    }

    .heroPill{
      min-width:0;
      display:flex;
      align-items:center;
      gap:10px;
      padding:12px 14px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.045);
      color:var(--muted);
      font-size:13px;
      line-height:1.2;
    }

    body[data-theme="light"] .heroPill{
      background:rgba(255,255,255,.78);
    }

    .heroPill b{
      color:var(--text);
      font-weight:900;
      overflow-wrap:anywhere;
    }

    .heroActions{
      display:flex;
      flex-direction:column;
      gap:10px;
      align-items:stretch;
      min-width:84px;
    }

    .iconBtn,.statusMini,.mini,.btn,.tinyAction,.filterBtn{
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--text);
    }

    body[data-theme="light"] .iconBtn,
    body[data-theme="light"] .statusMini,
    body[data-theme="light"] .mini,
    body[data-theme="light"] .btn,
    body[data-theme="light"] .tinyAction,
    body[data-theme="light"] .filterBtn{
      background:rgba(255,255,255,.80);
    }

    .iconBtn{
      width:52px;
      height:52px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      font-size:20px;
      transition:.15s ease;
      padding:0;
      align-self:flex-end;
    }

    .iconBtn:hover{
      transform:translateY(-1px);
      border-color:rgba(110,231,255,.45);
    }

    body[data-theme="light"] .iconBtn:hover{
      border-color:rgba(2,132,199,.35);
    }

    .iconBtn.danger{
      color:#fff;
      background:rgba(251,113,133,.12);
      border-color:rgba(251,113,133,.25);
    }

    .statusMini{
      min-height:44px;
      padding:10px 12px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
      font-weight:800;
    }

    .statusMini b{
      color:var(--text);
      white-space:nowrap;
    }

    .dot{
      width:8px;
      height:8px;
      border-radius:999px;
      background:#fff2;
      flex:0 0 8px;
    }

    .dot.ok{
      background:var(--free);
      box-shadow:0 0 0 0 rgba(52,211,153,.35);
      animation:pulse 1.8s infinite;
    }

    .dot.err{background:var(--busy)}

    .langWrap{position:relative}

    .langMenu{
      position:absolute;
      top:calc(100% + 8px);
      right:0;
      width:164px;
      border-radius:18px;
      padding:8px;
      display:none;
      z-index:70;
    }

    .langMenu.show{display:block}

    .langGrid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
    }

    .langFlagBtn{
      height:44px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--text);
      font-size:22px;
      cursor:pointer;
      transition:.15s ease;
    }

    body[data-theme="light"] .langFlagBtn{
      background:rgba(255,255,255,.78);
    }

    .langFlagBtn:hover{
      transform:translateY(-1px);
      border-color:rgba(110,231,255,.45);
    }

    body[data-theme="light"] .langFlagBtn:hover{
      border-color:rgba(2,132,199,.35);
    }

    .langFlagBtn.active{
      background:rgba(110,231,255,.10);
      border-color:rgba(110,231,255,.45);
    }

    body[data-theme="light"] .langFlagBtn.active{
      background:rgba(2,132,199,.08);
      border-color:rgba(2,132,199,.35);
    }

    .layout{
      display:grid;
      grid-template-columns:minmax(0,1fr) 380px;
      gap:16px;
      margin-top:14px;
      min-width:0;
    }

    @media (max-width:1180px){
      .layout{grid-template-columns:1fr}
    }

    .panel{border-radius:26px;min-width:0}
    .panelHead{
      padding:14px 16px;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      min-width:0;
      flex-wrap:wrap;
    }

    .panelHead > div{min-width:0}

    .panelTitle{
      font-size:15px;
      font-weight:900;
      line-height:1.25;
      overflow-wrap:anywhere;
    }

    .panelBody{
      padding:16px;
      min-width:0;
    }

    .hallTopCompact{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      flex-wrap:wrap;
      margin-bottom:14px;
      min-height:0;
    }

    .hallTopInfo{
      min-width:0;
      flex:1 1 auto;
    }

    .hallTitle{
      margin:0;
      font-size:22px;
      font-weight:1000;
      line-height:1.15;
      overflow-wrap:anywhere;
    }

    .hallTools{
      display:grid;
      grid-template-columns:repeat(3, minmax(120px, 1fr));
      gap:10px;
      min-width:0;
      width:min(100%, 480px);
    }

    .filterBtn{
      padding:12px 16px;
      border-radius:16px;
      white-space:nowrap;
      font-size:14px;
      color:var(--text);
      cursor:pointer;
      font-weight:900;
      transition:.15s ease;
    }

    .filterBtn.active{
      background:linear-gradient(180deg, rgba(110,231,255,.18), rgba(167,139,250,.12));
      border-color:rgba(110,231,255,.45);
      box-shadow:0 0 0 2px rgba(110,231,255,.08) inset;
    }

    body[data-theme="light"] .filterBtn.active{
      background:linear-gradient(180deg, rgba(2,132,199,.12), rgba(124,58,237,.10));
      border-color:rgba(2,132,199,.35);
      box-shadow:0 0 0 2px rgba(2,132,199,.08) inset;
    }

    .miniStatsRow{
      display:grid;
      grid-template-columns:repeat(6,1fr);
      gap:10px;
      margin-bottom:16px;
    }

    .miniStat{
      padding:10px 12px;
      border-radius:18px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      min-width:0;
    }

    body[data-theme="light"] .miniStat{
      background:rgba(255,255,255,.72);
    }

    .miniStat span{
      display:block;
      color:var(--muted);
      font-size:11px;
      line-height:1.25;
      overflow-wrap:anywhere;
    }

    .miniStat b{
      display:block;
      margin-top:4px;
      font-size:18px;
      line-height:1.15;
      overflow-wrap:anywhere;
    }

    .toast{
      margin-bottom:12px;
      border-radius:16px;
      padding:12px 13px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      font-size:12px;
      line-height:1.4;
      overflow-wrap:anywhere;
    }

    body[data-theme="light"] .toast{background:rgba(255,255,255,.72)}
    .toast.good{border-color:rgba(52,211,153,.28);background:rgba(52,211,153,.08)}
    .toast.bad{border-color:rgba(251,113,133,.28);background:rgba(251,113,133,.08)}
    .toast.warn{border-color:rgba(251,191,36,.28);background:rgba(251,191,36,.08)}

    .hall{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:16px;
      align-items:start;
      min-width:0;
    }

    .side{
      display:grid;
      gap:14px;
      min-width:0;
    }

    .aisle{display:none !important}

    .pc{
      position:relative;
      padding:18px;
      border-radius:28px;
      border:1px solid rgba(110,231,255,.14);
      background:
        linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.03)),
        radial-gradient(140% 120% at 0% 0%, rgba(52,211,153,.08), transparent 60%),
        radial-gradient(140% 120% at 100% 100%, rgba(110,231,255,.08), transparent 60%);
      overflow:hidden;
      cursor:pointer;
      transition:.18s ease;
      min-width:0;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.025),
        0 8px 28px rgba(0,0,0,.18);
    }

    body[data-theme="light"] .pc{
      background:
        linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,255,255,.78)),
        radial-gradient(140% 120% at 0% 0%, rgba(5,150,105,.07), transparent 60%),
        radial-gradient(140% 120% at 100% 100%, rgba(2,132,199,.06), transparent 60%);
    }

    .pc:hover{transform:translateY(-2px)}

    .pc.active{
      border-color:rgba(110,231,255,.55);
      box-shadow:0 0 0 3px rgba(110,231,255,.08), 0 10px 28px rgba(0,0,0,.22);
    }

    body[data-theme="light"] .pc.active{
      border-color:rgba(2,132,199,.35);
      box-shadow:0 0 0 3px rgba(2,132,199,.08), 0 10px 26px rgba(15,23,42,.1);
    }

    .pc.selectedMulti{
      box-shadow:0 0 0 3px rgba(167,139,250,.13), inset 0 0 0 1px rgba(167,139,250,.28);
    }

    .pc.free{box-shadow:inset 0 0 0 1px rgba(52,211,153,.14), 0 8px 26px rgba(0,0,0,.18)}
    .pc.soon{box-shadow:inset 0 0 0 1px rgba(251,191,36,.14), 0 8px 26px rgba(0,0,0,.18)}
    .pc.busy{box-shadow:inset 0 0 0 1px rgba(251,113,133,.14), 0 8px 26px rgba(0,0,0,.18)}

    .pc::before{
      content:"";
      position:absolute;
      inset:-28% auto auto -8%;
      width:190px;
      height:140px;
      border-radius:999px;
      filter:blur(24px);
      opacity:.38;
    }

    .pc.free::before{background:rgba(52,211,153,.22)}
    .pc.soon::before{background:rgba(251,191,36,.18)}
    .pc.busy::before{background:rgba(251,113,133,.18)}

    .pcTop{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
      min-width:0;
      flex-wrap:wrap;
    }

    .pcName{
      font-size:24px;
      font-weight:1000;
      letter-spacing:.01em;
      min-width:0;
      flex:1 1 140px;
      line-height:1.1;
      overflow-wrap:anywhere;
    }

    .statusTag{
      font-size:12px;
      font-weight:900;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid var(--line);
      white-space:normal;
      text-align:center;
      line-height:1.15;
      max-width:100%;
      overflow-wrap:anywhere;
      flex:0 1 auto;
    }

    .statusTag.free{
      color:var(--free);
      background:rgba(52,211,153,.10);
      border-color:rgba(52,211,153,.25);
    }

    .statusTag.soon{
      color:var(--soon);
      background:rgba(251,191,36,.10);
      border-color:rgba(251,191,36,.25);
    }

    .statusTag.busy{
      color:var(--busy);
      background:rgba(251,113,133,.10);
      border-color:rgba(251,113,133,.25);
    }

    .pcMeta{
      margin-top:16px;
      display:grid;
      gap:8px;
      font-size:14px;
      color:var(--muted);
      min-width:0;
      min-height:58px;
    }

    .pcMeta div{
      min-width:0;
      overflow-wrap:anywhere;
      line-height:1.35;
    }

    .pcMeta b{color:var(--text)}

    .progress{
      height:8px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      overflow:hidden;
      margin-top:6px;
    }

    body[data-theme="light"] .progress{background:rgba(15,23,42,.07)}

    .bar{
      height:100%;
      background:linear-gradient(90deg, rgba(251,113,133,.8), rgba(251,191,36,.8));
      width:0%;
    }

    .pcBottom{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
      margin-top:18px;
      min-width:0;
    }

    .mini,.btn,.tinyAction{
      cursor:pointer;
      transition:.15s ease;
      font-weight:800;
      min-width:0;
    }

    .mini{
      width:100%;
      padding:13px 14px;
      border-radius:18px;
      font-size:18px;
      white-space:normal;
      line-height:1.2;
      text-align:center;
      overflow-wrap:anywhere;
    }

    .mini.primary,.btn.primary{
      background:linear-gradient(180deg, rgba(110,231,255,.18), rgba(167,139,250,.10));
      border-color:rgba(110,231,255,.42);
    }

    body[data-theme="light"] .mini.primary,
    body[data-theme="light"] .btn.primary{
      background:linear-gradient(180deg, rgba(2,132,199,.12), rgba(124,58,237,.08));
      border-color:rgba(2,132,199,.32);
    }

    .mini.soft{background:rgba(167,139,250,.10);border-color:rgba(167,139,250,.22)}
    .mini.bad{background:rgba(251,113,133,.10);border-color:rgba(251,113,133,.28)}

    .sideCard{
      border-radius:24px;
      position:sticky;
      top:86px;
      min-width:0;
    }

    @media (max-width:1180px){
      .sideCard{position:static}
    }

    .topActionCluster{
      display:grid;
      gap:10px;
      margin-bottom:14px;
    }

    .topActionRow{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }

    .topActionRow.single{grid-template-columns:1fr}

    .tinyAction{
      padding:10px 12px;
      border-radius:14px;
      text-align:center;
      line-height:1.2;
      font-size:12px;
      background:rgba(255,255,255,.03);
    }

    .tinyAction.primary{
      background:linear-gradient(180deg, rgba(110,231,255,.18), rgba(167,139,250,.12));
      border-color:rgba(110,231,255,.42);
    }

    body[data-theme="light"] .tinyAction.primary{
      background:linear-gradient(180deg, rgba(2,132,199,.12), rgba(124,58,237,.08));
      border-color:rgba(2,132,199,.32);
    }

    .bigStatus{
      padding:14px;
      border-radius:18px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      margin-bottom:14px;
      min-width:0;
    }

    body[data-theme="light"] .bigStatus{background:rgba(255,255,255,.72)}

    .bigStatus h3{
      margin:0 0 6px;
      font-size:20px;
      line-height:1.2;
      overflow-wrap:anywhere;
    }

    .quickList{
      display:grid;
      gap:10px;
      min-width:0;
    }

    .quickItem{
      border:1px solid var(--line);
      border-radius:18px;
      padding:12px;
      background:rgba(255,255,255,.03);
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      min-width:0;
    }

    body[data-theme="light"] .quickItem{background:rgba(255,255,255,.72)}

    .quickItem > div{
      min-width:0;
      flex:1 1 auto;
    }

    .quickItem b,.quickItem small{
      overflow-wrap:anywhere;
      display:block;
      line-height:1.3;
    }

    .quickItem small{color:var(--muted);margin-top:3px}

    .chipRow{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
      min-width:0;
    }

    .chip{
      padding:7px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      font-size:12px;
      color:var(--muted);
      max-width:100%;
      overflow-wrap:anywhere;
      line-height:1.2;
    }

    body[data-theme="light"] .chip{background:rgba(255,255,255,.78)}
    .chip b{color:var(--text)}

    .formRow{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:10px;
      min-width:0;
    }

    .formRow > div{min-width:0}

    @media (max-width:640px){
      .formRow{grid-template-columns:1fr}
    }

    label{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin:0 0 6px;
      line-height:1.3;
      overflow-wrap:anywhere;
    }

    input,select{
      width:100%;

      border-radius:16px;
      background:rgba(110,231,255,.06);
      font-size:12px;
      color:var(--muted);
      line-height:1.45;
      overflow-wrap:anywhere;

    body[data-theme="light"] .notice{
      border-color:rgba(2,132,199,.20);
      background:rgba(2,132,199,.06);
    }

    .myBookings{
      display:grid;
      gap:10px;
      margin-top:14px;
      min-width:0;
    }

    .bookingItem{
      padding:12px;
      border-radius:18px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      min-width:0;
    }

    body[data-theme="light"] .bookingItem{
      background:rgba(255,255,255,.72);

      line-height:1.35;

  }

  function getPcBookings(pc) {
    return allBookings.filter(b => b.pc === pc).sort((a,b) => a.startAtMs - b.startAtMs);
  }

  function progressFor(b) {
    const now = Date.now();
    if (!b || !b.startAtMs || !b.endAtMs) return 0;
    if (now <= b.startAtMs) return 0;
    if (now >= b.endAtMs) return 100;
    return Math.max(0, Math.min(100, ((now - b.startAtMs) / (b.endAtMs - b.startAtMs)) * 100));
  }

  function getPcStatus(pc) {
    const now = Date.now();
    const future = getPcBookings(pc).filter(b => b.endAtMs > now);
    const active = future.find(b => b.startAtMs <= now && b.endAtMs > now);

    if (active) {
      const mins = Math.max(1, Math.ceil((active.endAtMs - now) / 60000));
      if (mins <= SOON_MIN) {
        return { state:'soon', subState:'soon_busy', active, freeAtMs:active.endAtMs, minsToFree:mins };
      }
      return { state:'busy', subState:'busy', active, freeAtMs:active.endAtMs, minsToFree:mins };
    }

    const next = future.find(b => b.startAtMs > now);
    if (next && next.startAtMs - now <= SOON_MIN * 60000) {
      return { state:'soon', subState:'soon_free', next, nextStartMs:next.startAtMs, minsToStart:Math.max(1, Math.ceil((next.startAtMs - now) / 60000)) };
    }

    return { state:'free', subState:'free' };
  }

  function getDisplayTag(status) {
    if (status.subState === 'soon_free') return tr('soonFreeTag');
    if (status.subState === 'soon_busy') return tr('soonBusyTag');
    if (status.state === 'busy') return tr('busyTag');
    return tr('freeTag');
  }

  function isFreeRangeForAll(pcs, startMs, endMs) {
    return pcs.every(pc => !getPcBookings(pc).some(b => overlaps(startMs, endMs, b.startAtMs, b.endAtMs)));
  }

  function clampToOpen(date) {
    const d = new Date(date);
    const base = new Date(d.getFullYear(), d.getMonth(), d.getDate(), 0,0,0,0);
    const open = addMinutes(base, WORK_START);
    const close = addDays(base, 1);
    close.setHours(Math.floor(WORK_END_NEXTDAY / 60), WORK_END_NEXTDAY % 60, 0, 0);
    if (d < open) return open;
    if (d > close) return null;
    return d;
  }

  function roundUp(date) {
    const d = new Date(date);
    d.setSeconds(0,0);
    const m = d.getMinutes();
    const extra = (SLOT_STEP - (m % SLOT_STEP)) % SLOT_STEP;
    if (extra) d.setMinutes(m + extra);
    return d;
  }

  function findNearestForAll(pcs, earliest, dur) {
    let cur = roundUp(clampToOpen(earliest) || earliest);
    const until = addDays(new Date(), 5).getTime();

    while (cur && cur.getTime() < until) {
      const end = addMinutes(cur, dur);
      const a = clampToOpen(cur);
      const b = clampToOpen(end);
      if (a && b && isFreeRangeForAll(pcs, cur.getTime(), end.getTime())) return cur;
      cur = addMinutes(cur, SLOT_STEP);
    }
    return null;
  }

  function rankFreeGroupCandidates(freeList) {
    const indexMap = ALL.reduce((acc, name, idx) => {
      acc[name] = idx;
      return acc;

  }

  function renderCard(pc) {
    const s = getPcStatus(pc);

    if (currentFilter === 'free' && s.state !== 'free') return null;
    if (currentFilter === 'soon' && s.state !== 'soon') return null;

    const el = document.createElement('div');
    const selectedMulti = selectedPCs.has(pc);
    el.className = `pc ${s.state} ${selectedPc === pc ? 'active' : ''} ${selectedMulti ? 'selectedMulti' : ''}`;

    let meta = '';
    if (s.subState === 'free') {
      meta = `<div>${tr('freeNow')}</div>`;
    } else if (s.subState === 'busy' || s.subState === 'soon_busy') {
      meta = `
        <div>${tr('playing')}: <b>${esc(s.active.nick || tr('guest'))}</b></div>
        <div>${tr('occupiedUntil')}: <b>${fmtHM(new Date(s.freeAtMs))}</b></div>
        <div>${tr('endsIn')}: <b>${s.minsToFree} ${tr('minutes')}</b></div>
        <div class="progress"><div class="bar" style="width:${progressFor(s.active)}%"></div></div>
      `;
    } else if (s.subState === 'soon_free') {
      meta = `
        <div>${tr('reservedAt')}: <b>${fmtHM(new Date(s.nextStartMs))}</b></div>
        <div>${tr('startsIn')}: <b>${s.minsToStart} ${tr('minutes')}</b></div>
      `;
    }

    el.innerHTML = `
      <div class="pcTop">
        <div class="pcName">${esc(pc)}</div>
        <div class="statusTag ${s.state}">${esc(getDisplayTag(s))}</div>
      </div>
      <div class="pcMeta">${meta}</div>
      <div class="pcBottom">
        <button class="mini ${selectedMulti ? 'soft' : ''}" data-a="pick" type="button">${selectedMulti ? '✓' : '+'}</button>
        <button class="mini ${s.state === 'free' ? 'primary' : ''}" data-a="quick" type="button">${multiMode ? '👥' : '→'}</button>
      </div>
    `;

    el.addEventListener('click', e => {
      if (e.target.closest('button')) return;
      updateSelection(pc);
    });

    const pick = el.querySelector('[data-a="pick"]');
    const quick = el.querySelector('[data-a="quick"]');

    pick.onclick = ev => {
      ev.stopPropagation();
      updateSelection(pc);
    };

    quick.onclick = ev => {
      ev.stopPropagation();
      updateSelection(pc);

      if (multiMode) {
        if (!selectedPCs.size) return toast(tr('chooseAtLeastOne'), 'warn');
        showCustom();
      } else {
        if (s.state === 'free') openQuickConfirm([pc], new Date(), 60);
        else openNearestConfirm([pc]);
      }
    };

    return el;
  }

    $('selectedActions').classList.remove('hidden');

    const names = [...selectedPCs];
    $('selectedName').textContent = names.length === 1 ? names[0] : `${names.length} ${tr('pcs')}`;
    $('selectedStatus').textContent = multiMode
      ? `${tr('selectedList')}: ${names.join(', ')}`
      : tr('selectedOne');

    names.forEach(pc => {
      const chip = document.createElement('div');
      chip.className = 'chip';
      chip.innerHTML = `<b>${esc(pc)}</b>`;
      $('selectedChips').appendChild(chip);
    });

    const actions = [];
    if (names.length === 1 && !multiMode) {
      const s = getPcStatus(names[0]);
      if (s.state === 'free') {
        actions.push({ label:tr('play1'), small:`${tr('starts')}: ${fmtHM(new Date())}`, fn:()=>openQuickConfirm(names, new Date(), 60) });
        actions.push({ label:tr('play2'), small:`${tr('starts')}: ${fmtHM(new Date())}`, fn:()=>openQuickConfirm(names, new Date(), 120) });
        actions.push({ label:tr('play3'), small:`${tr('starts')}: ${fmtHM(new Date())}`, fn:()=>openQuickConfirm(names, new Date(), 180) });
      } else {
        const nearest = findNearestForAll(names, new Date(), 120);
        actions.push({
          label:tr('bookAt'),
          small: nearest ? `${tr('starts')}: ${fmtHM(nearest)}` : tr('taken'),
          fn:()=>openNearestConfirm(names)
        });
        actions.push({
          label:tr('queue'),
          small:tr('queueHint'),
          fn:()=>openNearestConfirm(names)
        });
      }
    } else {
      actions.push({
        label:tr('group2'),
        small:`${tr('pcs')}: ${names.join(', ')}`,
        fn:()=>openQuickConfirm(names, new Date(), 120)
      });
      actions.push({
        label:tr('group3'),
        small:`${tr('pcs')}: ${names.join(', ')}`,
        fn:()=>openQuickConfirm(names, new Date(), 180)
      });
    }

    actions.push({ label:tr('exact'), small:tr('saveNickHint'), fn:()=>showCustom() });

    $('quickActions').innerHTML = '';
    actions.forEach((a, i) => {
      const div = document.createElement('div');
      div.className = 'quickItem';
      div.innerHTML = `
        <div>
          <b>${esc(a.label)}</b>
          <small>${esc(a.small)}</small>
        </div>
        <button class="mini ${i===0 ? 'primary' : ''}" type="button">→</button>
      `;
      div.querySelector('button').onclick = a.fn;
      $('quickActions').appendChild(div);
    });

    buildCustomTimes();
  }

  function buildCustomTimes() {
    const sel = $('customTime');
    sel.innerHTML = '';

    if (!selectedPCs.size) {
      const o = document.createElement('option');
      o.value = '';
      o.textContent = '—';
      sel.appendChild(o);
      return;
    }

    const pcs = [...selectedPCs];
    const dateKey = $('customDate').value || toISODate(new Date());
    const dur = Number($('customDuration').value || 60);

    const [y,m,d] = dateKey.split('-').map(Number);
    const base = new Date(y, m-1, d, 0, 0, 0, 0);
    const open = addMinutes(base, WORK_START);
    const close = addDays(base, 1);
    close.setHours(Math.floor(WORK_END_NEXTDAY / 60), WORK_END_NEXTDAY % 60, 0, 0);

    for (let cur = new Date(open); addMinutes(cur, dur) <= close; cur = addMinutes(cur, SLOT_STEP)) {
      const end = addMinutes(cur, dur);
      if (cur.getTime() < Date.now()) continue;
      if (!isFreeRangeForAll(pcs, cur.getTime(), end.getTime())) continue;

      const o = document.createElement('option');
      o.value = String(cur.getTime());
      o.textContent = `${fmtHM(cur)} → ${fmtHM(end)}`;
      sel.appendChild(o);
    }

    if (!sel.children.length) {
      const o = document.createElement('option');
      o.value = '';
      o.textContent = tr('noTimes');
      sel.appendChild(o);
    }
  }

  function openAuth() {
    $('authBackdrop').classList.add('show');
  }

  function closeAuth() {
    $('authBackdrop').classList.remove('show');
  }

  function openConfirm() {
    $('confirmBackdrop').classList.add('show');
  }

  function closeConfirm() {
    $('confirmBackdrop').classList.remove('show');
  }

  function needLogin() {
    openAuth();
    $('authMsg').textContent = tr('loginNeeded');
  }

  function fillConfirm() {
    if (!pendingBooking) return;

    const s = new Date(pendingBooking.startAtMs);
    const e = new Date(pendingBooking.endAtMs);

    $('confirmInfo').innerHTML = `
      <b>${esc(tr('pcs'))}:</b> ${esc(pendingBooking.pcs.join(', '))}<br>
      <b>${esc(tr('starts'))}:</b> ${esc(toISODate(s))} ${esc(fmtHM(s))}<br>
      <b>${esc(tr('ends'))}:</b> ${esc(toISODate(e))} ${esc(fmtHM(e))}<br>
      <b>${esc(tr('nick'))}:</b> ${esc(pendingBooking.nick)}
      ${pendingBooking.note ? `<br><b>${esc(tr('note'))}:</b> ${esc(pendingBooking.note)}` : ''}
    `;
  }

  function showCustom(focusNick=false) {
    if (!selectedPCs.size) return toast(tr('chooseAtLeastOne'), 'warn');
    $('customSection').classList.remove('hidden');
    $('customDate').value = $('customDate').value || toISODate(new Date());
    buildCustomTimes();
    if (focusNick) setTimeout(() => $('nickInput').focus(), 50);
  }

  function hideCustom() {
    $('customSection').classList.add('hidden');
  }

  function openQuickConfirm(pcs, start, dur) {
    if (!currentUser) return needLogin();

    const nick = ($('nickInput').value || '').trim() || localStorage.getItem(NICK_KEY) || '';
    if (!nick) return showCustom(true);

    const safe = findNearestForAll(pcs, start, dur);
    if (!safe) return toast(tr('taken'), 'bad');

    pendingBooking = {
      pcs:[...pcs],
      startAtMs:safe.getTime(),
      endAtMs:addMinutes(safe, dur).getTime(),
      nick,
      note:($('noteInput').value || '').trim()
    };

    fillConfirm();
    openConfirm();
  }

  function openNearestConfirm(pcs) {
    if (!currentUser) return needLogin();

    const nick = ($('nickInput').value || '').trim() || localStorage.getItem(NICK_KEY) || '';
    if (!nick) return showCustom(true);

    const safe = findNearestForAll(pcs, new Date(), 120);
    if (!safe) return toast(tr('taken'), 'bad');

    pendingBooking = {
      pcs:[...pcs],
      startAtMs:safe.getTime(),
      endAtMs:addMinutes(safe, 120).getTime(),
      nick,
      note:($('noteInput').value || '').trim()
    };

    fillConfirm();
    openConfirm();
  }

  async function createBooking(data) {
    if (!currentUser) return needLogin();

    const pcs = [...new Set((data.pcs || []).map(String))].slice(0, 10);
    const startAtMs = Number(data.startAtMs);
    const endAtMs = Number(data.endAtMs);
    const nick = String(data.nick || '').trim().slice(0, 32);
    const note = String(data.note || '').trim().slice(0, 120);

    if (!pcs.length) return toast(tr('chooseAtLeastOne'), 'warn');
    if (!nick) return toast(tr('enterNick'), 'warn');
    if (!startAtMs || !endAtMs || endAtMs <= startAtMs) return toast(tr('pickTime'), 'warn');
    if (!isFreeRangeForAll(pcs, startAtMs, endAtMs)) return toast(tr('taken'), 'bad');

    try {
      await db.collection('users').doc(String(currentUser.uid)).set(
        { nick, updatedAtMs:Date.now() },
        { merge:true }
      );

      const batch = db.batch();
      pcs.forEach(pc => {
        const ref = db.collection('bookings').doc();
        batch.set(ref, {
          uid:String(currentUser.uid),
          userEmail:String(currentUser.email || ''),
          nick,
          pc,
          note,
          startAtMs,
          endAtMs,
          createdAtMs:Date.now()
        });
      });

      await batch.commit();

      localStorage.setItem(NICK_KEY, nick);
      $('nickInput').value = nick;
      toast(tr('booked'), 'good');
      closeConfirm();
      pendingBooking = null;
      $('mySection').scrollIntoView({behavior:'smooth', block:'start'});
      renderMyBookings();
      renderAdminBookings();
    } catch(e) {
      handleFsError(e);
    }
  }

  function renderMyBookings() {
    const box = $('myBookings');
    box.innerHTML = '';

    if (!currentUser) {
      box.innerHTML = `<div class="notice">${esc(tr('authNeed'))}</div>`;
      return;
    }

    const mine = allBookings
      .filter(b => b.uid === currentUser.uid && b.endAtMs > Date.now() - 86400000)
      .sort((a,b) => a.startAtMs - b.startAtMs);

    if (!mine.length) {
      box.innerHTML = `<div class="notice">${esc(tr('empty'))}</div>`;
      return;
    }

    mine.forEach(b => {
      const s = new Date(b.startAtMs);
      const e = new Date(b.endAtMs);
      const item = document.createElement('div');
      item.className = 'bookingItem';
      item.innerHTML = `
        <div>
          <b>${esc(b.pc)}</b>
          <div class="meta">${esc(toISODate(s))} • ${esc(fmtHM(s))} → ${esc(fmtHM(e))}</div>
        </div>
        <button class="mini bad" type="button">${esc(tr('remove'))}</button>
      `;

      item.querySelector('button').onclick = async () => {
        if (!confirm(tr('remove') + '?')) return;
        try {
          await db.collection('bookings').doc(b.id).delete();
          toast(tr('canceled'), 'good');
        } catch(e) {
          handleFsError(e);
        }
      };

      box.appendChild(item);
    });
  }

  function renderAdminBookings() {
    const panel = $('adminSection');
    const box = $('adminBookings');

    panel.classList.toggle('hidden', !isAdmin);
    if (!isAdmin) return;

    const q = String($('adminSearch').value || '').trim().toLowerCase();
    box.innerHTML = '';

    let list = allBookings
      .filter(b => b.endAtMs > Date.now())
      .sort((a,b) => a.startAtMs - b.startAtMs);

    if (q) {
      list = list.filter(b => {
        const hay = [
          b.pc || '',
          b.nick || '',
          b.userEmail || '',
          b.note || ''
        ].join(' ').toLowerCase();
        return hay.includes(q);
      });
    }

    if (!list.length) {
      box.innerHTML = `<div class="notice">${esc(q ? tr('nothingFound') : tr('empty'))}</div>`;
      return;
    }

    list.forEach(b => {
      const s = new Date(b.startAtMs);
      const e = new Date(b.endAtMs);
      const item = document.createElement('div');
      item.className = 'bookingItem';
      item.innerHTML = `
        <div>
          <b>${esc(b.pc)}</b>
          <div class="meta">${esc(b.nick || '')} • ${esc(b.userEmail || '')}</div>
          <div class="meta">${esc(toISODate(s))} • ${esc(fmtHM(s))} → ${esc(fmtHM(e))}</div>
        </div>
        <button class="mini bad" type="button">${esc(tr('remove'))}</button>
      `;

      item.querySelector('button').onclick = async () => {
        if (!confirm(tr('remove') + '?')) return;
        try {
          await db.collection('bookings').doc(b.id).delete();
          toast(tr('canceled'), 'good');
        } catch(e) {
          handleFsError(e);
        }
      };

      box.appendChild(item);
    });
  }

  function updateUserUI() {
    $('userPill').textContent = currentUser ? (currentUser.email || currentUser.uid.slice(0,6)) : '—';
    isAdmin = !!(currentUser && ADMIN_EMAILS.includes(String(currentUser.email || '').toLowerCase()));

    $('openAuthBtn').classList.toggle('hidden', !!currentUser);
    $('logoutBtn').classList.toggle('hidden', !currentUser);
    $('logoutTopBtn').classList.toggle('hidden', !currentUser);

    if (currentUser) $('authMsg').textContent = tr('authOk') + (currentUser.email || currentUser.uid.slice(0,6));
    else $('authMsg').textContent = '—';

    renderAdminBookings();
  }

  function findFreeNow() {
    const free = rankFreeGroupCandidates(ALL.filter(pc => getPcStatus(pc).state === 'free'));
    if (!free.length) return toast(tr('noFree'), 'warn');

    if (multiMode) {
      selectedPCs = new Set(free.slice(0, 3));
      selectedPc = [...selectedPCs][0] || null;
    } else {
      selectedPc = free[0];
      selectedPCs = new Set([free[0]]);
    }

    renderStats();
    renderHall();
    renderSelected();
  }

  async function startRealtime() {
    if (!db) return;

    if (unsub) {
      try { unsub(); } catch(_) {}
    }

    const { start, end } = dayBoundsNow();

    unsub = db.collection('bookings')
      .where('startAtMs', '<', end)
      .onSnapshot(snap => {
        allBookings = snap.docs
          .map(d => ({ id:d.id, ...d.data() }))
          .map(x => ({ ...x, startAtMs:Number(x.startAtMs || 0), endAtMs:Number(x.endAtMs || 0) }))
          .filter(x => x.endAtMs > start);

        setCloud(tr('statusLive'), true);
        renderStats();
        renderHall();
        renderSelected();
        renderMyBookings();
        renderAdminBookings();
      }, handleFsError);
  }

  function startTicker() {
    clearInterval(timer);
    timer = setInterval(() => {
      renderStats();
      renderHall();
      renderSelected();
    }, 30000);
  }

  function closeLangMenu() {
    $('langMenu').classList.remove('show');
  }

  function toggleLangMenu() {
    $('langMenu').classList.toggle('show');
  }

  function setLanguage(newLang) {
    lang = newLang;
    localStorage.setItem(LANG_KEY, lang);
    closeLangMenu();
    applyTexts();
  }

  function toggleMy() {
    $('mySection').scrollIntoView({behavior:'smooth', block:'start'});
    renderMyBookings();
  }

  async function signOutNow() {
    if (!auth) return;
    try { await auth.signOut(); } catch(_) {}
  }

  function bind() {
    document.querySelectorAll('.langFlagBtn').forEach(btn => {
      btn.onclick = () => setLanguage(btn.dataset.lang);
    });

    $('langMenuBtn').onclick = e => {
      e.stopPropagation();
      toggleLangMenu();
    };

    document.addEventListener('click', e => {
      if (!e.target.closest('.langWrap')) closeLangMenu();
    });

    $('themeToggleBtn').onclick = () => {
      theme = theme === 'dark' ? 'light' : 'dark';
      localStorage.setItem(THEME_KEY, theme);
      applyTheme();
    };

    $('logoutTopBtn').onclick = signOutNow;
    $('logoutBtn').onclick = signOutNow;

    $('filterAll').onclick = () => {
      currentFilter = 'all';
      setFilterUI();
      renderHall();
    };

    $('filterFree').onclick = () => {
      currentFilter = 'free';
      setFilterUI();
      renderHall();
    };

    $('filterSoon').onclick = () => {
      currentFilter = 'soon';
      setFilterUI();
      renderHall();
    };

    $('findNowBtn').onclick = findFreeNow;

    $('toggleMultiBtn').onclick = () => {
      multiMode = !multiMode;
      if (!multiMode && selectedPCs.size > 1) {
        const first = [...selectedPCs][0];
        selectedPCs = new Set(first ? [first] : []);
        selectedPc = first || null;
      }
      applyTexts();
    };

    $('clearSelectedBtn').onclick = () => {
      selectedPCs.clear();
      selectedPc = null;
      renderStats();
      renderHall();
      renderSelected();
      buildCustomTimes();
    };

    $('openMyBtn').onclick = toggleMy;
    $('mobileMyBtn').onclick = toggleMy;

    $('mobileBookBtn').onclick = () => {
      if (!currentUser) return needLogin();
      if (!selectedPCs.size) return toast(tr('chooseAtLeastOne'), 'warn');
      showCustom();
      $('customSection').scrollIntoView({behavior:'smooth', block:'start'});
    };

    $('openAdminBtn').onclick = () => {
      if (!currentUser) return toast(tr('loginNeeded'), 'warn');
      if (!isAdmin) return toast(tr('adminDenied'), 'bad');
      $('adminSection').scrollIntoView({behavior:'smooth', block:'start'});
    };

    $('openAuthBtn').onclick = openAuth;

    $('closeAuthBtn').onclick = closeAuth;
    $('authBackdrop').onclick = e => {
      if (e.target === $('authBackdrop')) closeAuth();
    };

    $('closeConfirmBtn').onclick = closeConfirm;
    $('cancelConfirmBtn').onclick = closeConfirm;
    $('confirmBackdrop').onclick = e => {
      if (e.target === $('confirmBackdrop')) closeConfirm();
    };

    $('customDate').value = toISODate(new Date());
    $('nickInput').value = localStorage.getItem(NICK_KEY) || '';

    $('nickInput').addEventListener('input', () => {
      localStorage.setItem(NICK_KEY, $('nickInput').value.trim());
    });

    $('customDate').addEventListener('change', buildCustomTimes);
    $('customDuration').addEventListener('change', buildCustomTimes);
    $('adminSearch').addEventListener('input', renderAdminBookings);

    $('hideCustomBtn').onclick = hideCustom;

    $('bookCustomBtn').onclick = () => {
      if (!currentUser) return needLogin();
      if (!selectedPCs.size) return toast(tr('chooseAtLeastOne'), 'warn');

      const startAtMs = Number($('customTime').value || 0);
      if (!startAtMs) return toast(tr('pickTime'), 'warn');

      const duration = Number($('customDuration').value || 60);

      pendingBooking = {
        pcs:[...selectedPCs],
        startAtMs,
        endAtMs:startAtMs + duration * 60000,
        nick:($('nickInput').value || '').trim(),
        note:($('noteInput').value || '').trim()
      };

      fillConfirm();
      openConfirm();
    };

    $('confirmBookBtn').onclick = () => {
      if (pendingBooking) createBooking(pendingBooking);
    };

    $('loginBtn').onclick = async () => {
      const email = ($('authEmail').value || '').trim();
      const pass = ($('authPass').value || '').trim();
      if (!email || !pass) return $('authMsg').textContent = tr('loginErr');
      if (!auth) return $('authMsg').textContent = tr('fsErr');

      try {
        await auth.signInWithEmailAndPassword(email, pass);
        closeAuth();
      } catch(e) {
        console.error(e);
        $('authMsg').textContent = e.message || tr('fsErr');
      }
    };

    $('registerBtn').onclick = async () => {
      const email = ($('authEmail').value || '').trim();
      const pass = ($('authPass').value || '').trim();
      if (!email || !pass) return $('authMsg').textContent = tr('loginErr');
      if (!auth) return $('authMsg').textContent = tr('fsErr');

      try {
        await auth.createUserWithEmailAndPassword(email, pass);
        closeAuth();
      } catch(e) {
        console.error(e);
        $('authMsg').textContent = e.message || tr('fsErr');
      }
    };

    $('resetBtn').onclick = async () => {
      const email = ($('authEmail').value || '').trim();
      if (!email) return $('authMsg').textContent = tr('loginErr');
      if (!auth) return $('authMsg').textContent = tr('fsErr');

      try {
        await auth.sendPasswordResetEmail(email);
        $('authMsg').textContent = tr('resetSent');
      } catch(e) {
        console.error(e);
        $('authMsg').textContent = e.message || tr('fsErr');
      }
    };

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        closeAuth();
        closeConfirm();
        closeLangMenu();
      }
    });

    window.addEventListener('beforeunload', () => {
      try { if (unsub) unsub(); } catch(_) {}
      clearInterval(timer);
    });
  }

  async function boot() {
    applyTheme();
    bind();
    applyTexts();
    setCloud(tr('statusWait'), null);
    startTicker();

    if (!db || !auth) {
      setCloud(tr('statusErr'), false);
      toast('Firebase init failed', 'bad');
      return;
    }

    startRealtime();

    auth.onAuthStateChanged(async u => {
      currentUser = u || null;
      updateUserUI();
      renderMyBookings();

      if (currentUser && !$('nickInput').value.trim()) {
        try {
          const doc = await db.collection('users').doc(String(currentUser.uid)).get();
          const nick = doc.exists ? (doc.data().nick || '') : '';
          if (nick) {
            $('nickInput').value = nick;
            localStorage.setItem(NICK_KEY, nick);
          }
        } catch(_) {}
      }

      applyTexts();
    });
  }

  boot();
})();
</script>
</body>
</html>
