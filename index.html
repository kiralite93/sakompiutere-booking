<!doctype html>
<html lang="ka">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Sakompiutere Gaming — Live Hall</title>
  <meta name="theme-color" content="#0b1020" />
  <link rel="icon" href="data:," />

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    :root{
      --bg:#070a12;
      --card:#0d1324;
      --text:#edf3ff;
      --muted:#9aa7c7;
      --line:rgba(255,255,255,.09);
      --free:#34d399;
      --soon:#fbbf24;
      --busy:#fb7185;
      --accent:#6ee7ff;
      --accent2:#a78bfa;
      --shadow:0 18px 60px rgba(0,0,0,.45);
    }

    body[data-theme="light"]{
      --bg:#eef4ff;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#5b6b86;
      --line:rgba(15,23,42,.10);
      --free:#059669;
      --soon:#d97706;
      --busy:#e11d48;
      --accent:#0284c7;
      --accent2:#7c3aed;
      --shadow:0 18px 45px rgba(15,23,42,.10);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    html{-webkit-text-size-adjust:100%}
    body{
      margin:0;
      color:var(--text);
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:
        radial-gradient(1000px 600px at 10% -10%, rgba(110,231,255,.12), transparent 60%),
        radial-gradient(900px 700px at 90% 0%, rgba(167,139,250,.14), transparent 60%),
        radial-gradient(1200px 700px at 50% 120%, rgba(52,211,153,.08), transparent 60%),
        var(--bg);
      overflow-x:hidden;
      transition:background .2s ease,color .2s ease;
      word-wrap:break-word;
      overflow-wrap:anywhere;
    }
    body[data-theme="light"]{
      background:
        radial-gradient(1000px 600px at 10% -10%, rgba(2,132,199,.10), transparent 60%),
        radial-gradient(900px 700px at 90% 0%, rgba(124,58,237,.10), transparent 60%),
        radial-gradient(1200px 700px at 50% 120%, rgba(5,150,105,.08), transparent 60%),
        var(--bg);
    }

    .wrap{
      max-width:1320px;
      margin:0 auto;
      padding:14px;
      padding-bottom:max(14px, env(safe-area-inset-bottom));
    }
    .glass{
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      backdrop-filter:blur(12px)
    }
    body[data-theme="light"] .glass{
      background:linear-gradient(180deg, rgba(255,255,255,.88), rgba(255,255,255,.72))
    }

    .headerShell{
      border-radius:24px;
      position:sticky;
      top:10px;
      z-index:50;
      overflow:visible;
    }
    .headerMain{
      display:grid;
      grid-template-columns:minmax(0,1fr) auto;
      align-items:center;
      gap:12px;
      padding:14px 16px 10px;
      min-width:0;
    }
    .headerMeta{
      display:flex;
      flex-wrap:wrap;
      justify-content:flex-end;
      gap:8px;
      padding:0 16px 14px;
      min-width:0;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }
    .brand > div:last-child{
      min-width:0;
      flex:1 1 auto;
    }
    h1{
      margin:0;
      font-size:22px;
      line-height:1.15;
      overflow-wrap:anywhere;
    }
    .logo{
      width:56px;
      height:56px;
      flex:0 0 56px;
      border-radius:14px;
      background-image:url("./logo.png");
      background-repeat:no-repeat;
      background-position:center;
      background-size:contain;
      background-color:transparent;
      border:none;
      box-shadow:none;
      overflow:hidden;
    }
    .sub{
      margin:4px 0 0;
      color:var(--muted);
      font-size:12px;
      line-height:1.35;
      overflow-wrap:anywhere;
    }

    .topbar{
      display:flex;
      gap:8px;
      align-items:center;
      justify-content:flex-end;
      min-width:0;
      flex-wrap:nowrap;
    }

    .pill,.langTrigger{
      display:flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      font-size:12px;
      color:var(--muted);
      min-width:0;
      max-width:100%;
      line-height:1.2;
    }
    body[data-theme="light"] .pill,
    body[data-theme="light"] .langTrigger{
      background:rgba(255,255,255,.75)
    }
    .pill b,
    .pill span{
      min-width:0;
      overflow-wrap:anywhere;
    }
    .headerMeta .pill{
      min-width:0;
      overflow:hidden;
    }
    .headerMeta .pill b{
      display:block;
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      max-width:160px;
    }

    .btn,.mini,.langTrigger,.langOption,.filterBtn,.tinyAction{
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--text);
      cursor:pointer;
      transition:.15s ease;
      font-weight:800;
      min-width:0;
    }
    body[data-theme="light"] .btn,
    body[data-theme="light"] .mini,
    body[data-theme="light"] .langTrigger,
    body[data-theme="light"] .langOption,
    body[data-theme="light"] .filterBtn,
    body[data-theme="light"] .tinyAction{
      background:rgba(255,255,255,.75)
    }
    .btn:hover,.mini:hover,.langTrigger:hover,.langOption:hover,.filterBtn:hover,.tinyAction:hover{
      transform:translateY(-1px);
      border-color:rgba(110,231,255,.45)
    }
    body[data-theme="light"] .btn:hover,
    body[data-theme="light"] .mini:hover,
    body[data-theme="light"] .langTrigger:hover,
    body[data-theme="light"] .langOption:hover,
    body[data-theme="light"] .filterBtn:hover,
    body[data-theme="light"] .tinyAction:hover{
      border-color:rgba(2,132,199,.35)
    }

    .langWrap{position:relative}
    .langTrigger{
      padding:8px 12px;
      white-space:nowrap;
    }
    .langTrigger .flag{font-size:15px;line-height:1}
    .langMenu{
      position:absolute;
      top:calc(100% + 8px);
      right:0;
      width:180px;
      border-radius:18px;
      padding:8px;
      display:none;
      z-index:60;
    }
    .langMenu.show{display:block}
    .langOption{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 12px;
      border-radius:14px;
      margin:0 0 6px;
      text-align:left;
    }
    .langOption:last-child{margin-bottom:0}
    .langLeft{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }
    .langFlag{font-size:18px;line-height:1}
    .langCode{color:var(--muted);font-size:11px;font-weight:700}
    .langOption.active{
      border-color:rgba(110,231,255,.45);
      background:rgba(110,231,255,.10);
    }
    body[data-theme="light"] .langOption.active{
      border-color:rgba(2,132,199,.35);
      background:rgba(2,132,199,.08);
    }

    .dot{width:8px;height:8px;border-radius:999px;background:#fff2;flex:0 0 8px}
    .dot.ok{background:var(--free);box-shadow:0 0 0 0 rgba(52,211,153,.35);animation:pulse 1.8s infinite}
    .dot.err{background:var(--busy)}
    @keyframes pulse{70%{box-shadow:0 0 0 10px rgba(52,211,153,0)}100%{box-shadow:0 0 0 0 rgba(52,211,153,0)}}

    .layout{
      display:grid;
      grid-template-columns:1fr 360px;
      gap:16px;
      margin-top:14px;
      min-width:0
    }
    @media (max-width:1120px){
      .layout{grid-template-columns:1fr}
    }

    .panel{border-radius:24px;min-width:0}
    .panelHead{
      padding:14px 16px;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      min-width:0;
      flex-wrap:wrap;
    }
    .panelHead > div{min-width:0}
    .panelTitle{
      font-size:15px;
      font-weight:900;
      line-height:1.25;
      overflow-wrap:anywhere;
    }
    .panelBody{padding:16px;min-width:0}

    .hallTopCompact{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      flex-wrap:wrap;
      margin-bottom:14px;
    }
    .hallTopInfo{
      min-width:0;
      flex:1 1 360px;
    }
    .hallTitle{
      margin:0;
      font-size:20px;
      font-weight:1000;
      line-height:1.15;
      overflow-wrap:anywhere;
    }
    .hallHint{
      margin:6px 0 0;
      color:var(--muted);
      font-size:13px;
      line-height:1.4;
      overflow-wrap:anywhere;
    }
    .hallTools{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:flex-end;
    }

    .filterBtn{
      padding:10px 14px;
      border-radius:14px;
      white-space:nowrap;
      font-size:13px;
      background:rgba(255,255,255,.03);
    }
    .filterBtn.active{
      background:linear-gradient(180deg, rgba(110,231,255,.18), rgba(167,139,250,.12));
      border-color:rgba(110,231,255,.45);
    }
    body[data-theme="light"] .filterBtn.active{
      background:linear-gradient(180deg, rgba(2,132,199,.12), rgba(124,58,237,.10));
      border-color:rgba(2,132,199,.35);
    }

    .miniStatsRow{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      margin-bottom:14px;
    }
    .miniStat{
      padding:10px 12px;
      border-radius:16px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      min-width:0;
    }
    body[data-theme="light"] .miniStat{
      background:rgba(255,255,255,.72)
    }
    .miniStat span{
      display:block;
      color:var(--muted);
      font-size:11px;
      line-height:1.25;
      overflow-wrap:anywhere;
    }
    .miniStat b{
      display:block;
      margin-top:4px;
      font-size:17px;
      line-height:1.15;
      overflow-wrap:anywhere;
    }

    .toast{
      margin-bottom:12px;
      border-radius:16px;
      padding:12px 13px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      font-size:12px;
      line-height:1.4;
      overflow-wrap:anywhere;
    }
    body[data-theme="light"] .toast{background:rgba(255,255,255,.72)}
    .toast.good{border-color:rgba(52,211,153,.28);background:rgba(52,211,153,.08)}
    .toast.bad{border-color:rgba(251,113,133,.28);background:rgba(251,113,133,.08)}
    .toast.warn{border-color:rgba(251,191,36,.28);background:rgba(251,191,36,.08)}
    .hidden{display:none !important}

    .hall{display:grid;grid-template-columns:1fr 80px 1fr;gap:14px;align-items:start;min-width:0}
    .side{display:grid;gap:10px;min-width:0}
    .aisle{
      min-height:100%;
      border-radius:20px;
      border:1px dashed rgba(255,255,255,.08);
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--muted);
      font-size:12px;
      letter-spacing:.18em;
      text-transform:uppercase;
      writing-mode:vertical-rl;
      transform:rotate(180deg);
      padding:14px 0
    }
    body[data-theme="light"] .aisle{
      border-color:rgba(15,23,42,.08);
      background:linear-gradient(180deg, rgba(255,255,255,.55), rgba(255,255,255,.35))
    }
    @media (max-width:900px){
      .hall{grid-template-columns:1fr 1fr}
      .aisle{display:none}
    }

    .pc{
      position:relative;
      padding:14px;
      border-radius:20px;
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));
      overflow:hidden;
      cursor:pointer;
      transition:.18s ease;
      min-width:0;
    }
    body[data-theme="light"] .pc{
      background:linear-gradient(180deg, rgba(255,255,255,.88), rgba(255,255,255,.72))
    }
    .pc:hover{transform:translateY(-2px)}
    .pc.active{border-color:rgba(110,231,255,.55);box-shadow:0 0 0 3px rgba(110,231,255,.08)}
    body[data-theme="light"] .pc.active{border-color:rgba(2,132,199,.35);box-shadow:0 0 0 3px rgba(2,132,199,.08)}
    .pc.selectedMulti{box-shadow:0 0 0 3px rgba(167,139,250,.13), inset 0 0 0 1px rgba(167,139,250,.28)}
    .pc.free{box-shadow:inset 0 0 0 1px rgba(52,211,153,.14)}
    .pc.soon{box-shadow:inset 0 0 0 1px rgba(251,191,36,.14)}
    .pc.busy{box-shadow:inset 0 0 0 1px rgba(251,113,133,.14)}
    .pc::before{
      content:"";
      position:absolute;
      inset:-20% auto auto -10%;
      width:160px;height:110px;
      border-radius:999px;
      filter:blur(18px);
      opacity:.3
    }
    .pc.free::before{background:rgba(52,211,153,.25)}
    .pc.soon::before{background:rgba(251,191,36,.22)}
    .pc.busy::before{background:rgba(251,113,133,.22)}
    .pcTop{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
      min-width:0;
      flex-wrap:wrap;
    }
    .pcName{
      font-size:17px;
      font-weight:1000;
      letter-spacing:.02em;
      min-width:0;
      flex:1 1 120px;
      line-height:1.2;
      overflow-wrap:anywhere;
    }
    .statusTag{
      font-size:11px;
      font-weight:900;
      padding:7px 9px;
      border-radius:999px;
      border:1px solid var(--line);
      white-space:normal;
      text-align:center;
      line-height:1.15;
      max-width:100%;
      overflow-wrap:anywhere;
      flex:0 1 auto;
    }
    .statusTag.free{color:var(--free);background:rgba(52,211,153,.09);border-color:rgba(52,211,153,.25)}
    .statusTag.soon{color:var(--soon);background:rgba(251,191,36,.09);border-color:rgba(251,191,36,.25)}
    .statusTag.busy{color:var(--busy);background:rgba(251,113,133,.09);border-color:rgba(251,113,133,.25)}
    .pcMeta{
      margin-top:10px;
      display:grid;
      gap:6px;
      font-size:13px;
      color:var(--muted);
      min-width:0;
    }
    .pcMeta div{
      min-width:0;
      overflow-wrap:anywhere;
      line-height:1.35;
    }
    .pcMeta b{color:var(--text)}
    .progress{
      height:8px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      overflow:hidden;
      margin-top:6px
    }
    body[data-theme="light"] .progress{background:rgba(15,23,42,.07)}
    .bar{height:100%;background:linear-gradient(90deg, rgba(251,113,133,.8), rgba(251,191,36,.8));width:0%}
    .pcBottom{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      margin-top:12px;
      min-width:0;
    }
    .mini{
      padding:8px 10px;
      border-radius:12px;
      font-size:12px;
      white-space:normal;
      line-height:1.2;
      text-align:center;
      overflow-wrap:anywhere;
    }
    .mini.primary{background:linear-gradient(180deg, rgba(110,231,255,.18), rgba(167,139,250,.10));border-color:rgba(110,231,255,.42)}
    body[data-theme="light"] .mini.primary{background:linear-gradient(180deg, rgba(2,132,199,.12), rgba(124,58,237,.08));border-color:rgba(2,132,199,.32)}
    .mini.soft{background:rgba(167,139,250,.10);border-color:rgba(167,139,250,.22)}
    .mini.bad{background:rgba(251,113,133,.10);border-color:rgba(251,113,133,.28)}

    .sideCard{border-radius:24px;position:sticky;top:82px;min-width:0}
    @media (max-width:1120px){.sideCard{position:static}}

    .topActionCluster{
      display:grid;
      gap:10px;
      margin-bottom:14px;
    }
    .topActionRow{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }
    .topActionRow.single{grid-template-columns:1fr}
    .tinyAction{
      padding:10px 12px;
      border-radius:14px;
      text-align:center;
      line-height:1.2;
      font-size:12px;
      background:rgba(255,255,255,.03);
    }
    .tinyAction.primary{
      background:linear-gradient(180deg, rgba(110,231,255,.18), rgba(167,139,250,.12));
      border-color:rgba(110,231,255,.42);
    }
    body[data-theme="light"] .tinyAction.primary{
      background:linear-gradient(180deg, rgba(2,132,199,.12), rgba(124,58,237,.08));
      border-color:rgba(2,132,199,.32);
    }

    .bigStatus{
      padding:14px;
      border-radius:18px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      margin-bottom:14px;
      min-width:0;
    }
    body[data-theme="light"] .bigStatus{background:rgba(255,255,255,.72)}
    .bigStatus h3{
      margin:0 0 6px;
      font-size:20px;
      line-height:1.2;
      overflow-wrap:anywhere;
    }
    .quickList{display:grid;gap:10px;min-width:0}
    .quickItem{
      border:1px solid var(--line);
      border-radius:18px;
      padding:12px;
      background:rgba(255,255,255,.03);
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      min-width:0;
    }
    .quickItem > div{min-width:0;flex:1 1 auto}
    .quickItem b,.quickItem small{
      overflow-wrap:anywhere;
      display:block;
      line-height:1.3;
    }
    body[data-theme="light"] .quickItem{background:rgba(255,255,255,.72)}
    .quickItem small{color:var(--muted);margin-top:3px}

    .chipRow{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;min-width:0}
    .chip{
      padding:7px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      font-size:12px;
      color:var(--muted);
      max-width:100%;
      overflow-wrap:anywhere;
      line-height:1.2;
    }
    body[data-theme="light"] .chip{background:rgba(255,255,255,.78)}
    .chip b{color:var(--text)}

    .formRow{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:10px;
      min-width:0;
    }
    .formRow > div{min-width:0}
    @media (max-width:520px){
      .formRow{grid-template-columns:1fr}
    }

    label{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin:0 0 6px;
      line-height:1.3;
      overflow-wrap:anywhere;
    }
    input,select{
      width:100%;
      padding:11px 12px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.22);
      color:var(--text);
      outline:none;
      min-width:0;
      font:inherit;
    }
    body[data-theme="light"] input,
    body[data-theme="light"] select{background:#fff}
    input:focus,select:focus{
      border-color:rgba(110,231,255,.5);
      box-shadow:0 0 0 3px rgba(110,231,255,.1)
    }
    body[data-theme="light"] input:focus,
    body[data-theme="light"] select:focus{
      border-color:rgba(2,132,199,.35);
      box-shadow:0 0 0 3px rgba(2,132,199,.10)
    }

    .small{font-size:12px;line-height:1.35}
    .muted{color:var(--muted)}

    .notice{
      border:1px dashed rgba(110,231,255,.3);
      padding:12px 13px;
      border-radius:16px;
      background:rgba(110,231,255,.06);
      font-size:12px;
      color:var(--muted);
      line-height:1.45;
      overflow-wrap:anywhere;
    }
    body[data-theme="light"] .notice{
      border-color:rgba(2,132,199,.20);
      background:rgba(2,132,199,.06)
    }

    .myBookings{
      display:grid;
      gap:10px;
      margin-top:14px;
      min-width:0
    }
    .bookingItem{
      padding:12px;
      border-radius:18px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      min-width:0;
    }
    .bookingItem > div{min-width:0;flex:1 1 auto}
    .bookingItem b,.bookingItem .meta{overflow-wrap:anywhere}
    body[data-theme="light"] .bookingItem{background:rgba(255,255,255,.72)}
    .bookingItem .meta{
      font-size:12px;
      color:var(--muted);
      margin-top:4px;
      line-height:1.35;
    }

    .backdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.6);
      display:none;
      align-items:center;
      justify-content:center;
      padding:16px;
      z-index:80
    }
    .backdrop.show{display:flex}
    .modal{
      width:min(560px,100%);
      border-radius:24px;
      min-width:0;
      max-height:min(90vh,900px);
      overflow:auto;
    }
    .modalHead{

  function progressFor(b) {
    const now = Date.now();
    if (!b || !b.startAtMs || !b.endAtMs) return 0;
    if (now <= b.startAtMs) return 0;
    if (now >= b.endAtMs) return 100;
    return Math.max(0, Math.min(100, ((now - b.startAtMs) / (b.endAtMs - b.startAtMs)) * 100));
  }

  function getPcBookings(pc) {
    return allBookings.filter(b => b.pc === pc).sort((a,b)=>a.startAtMs-b.startAtMs);
  }

  function getPcStatus(pc) {
    const now = Date.now();
    const future = getPcBookings(pc).filter(b => b.endAtMs > now);
    const active = future.find(b => b.startAtMs <= now && b.endAtMs > now);
    if (active) {
      const mins = Math.max(1, Math.ceil((active.endAtMs - now) / 60000));
      return { state: mins <= SOON_MIN ? 'soon' : 'busy', active, next:null, freeAtMs:active.endAtMs, minsToFree:mins };
    }
    const next = future.find(b => b.startAtMs > now);
    if (next && next.startAtMs - now <= SOON_MIN * 60000) {
      return { state:'soon', active:null, next, freeAtMs:next.startAtMs, minsToFree:Math.max(1, Math.ceil((next.startAtMs - now) / 60000)) };
    }
    return { state:'free', active:null, next, freeAtMs:now, minsToFree:0 };
  }

  const statusLabel = s => s.state === 'free' ? tr('freeTag') : s.state === 'soon' ? tr('soonTag') : tr('busyTag');

  function clampToOpen(date) {
    const d = new Date(date);
    const base = new Date(d.getFullYear(), d.getMonth(), d.getDate(), 0,0,0,0);
    const open = addMinutes(base, WORK_START);
    const close = addDays(base, 1);
    close.setHours(Math.floor(WORK_END_NEXTDAY / 60), WORK_END_NEXTDAY % 60, 0, 0);
    if (d < open) return open;
    if (d > close) return null;
    return d;
  }

  function roundUp(date) {
    const d = new Date(date);
    d.setSeconds(0,0);
    const m = d.getMinutes();
    const extra = (SLOT_STEP - (m % SLOT_STEP)) % SLOT_STEP;
    if (extra) d.setMinutes(m + extra);
    return d;
  }

  function isFreeRangeForAll(pcs, startMs, endMs) {
    return pcs.every(pc => !getPcBookings(pc).some(b => overlaps(startMs, endMs, b.startAtMs, b.endAtMs)));
  }

  function findNearestForAll(pcs, earliest, dur) {
    let clamped = clampToOpen(earliest);
    let cur = roundUp(clamped || earliest);
    const until = addDays(new Date(), 5).getTime();
    while (cur && cur.getTime() < until) {
      const end = addMinutes(cur, dur);
      const a = clampToOpen(cur), b = clampToOpen(end);
      if (a && b && isFreeRangeForAll(pcs, cur.getTime(), end.getTime())) return cur;
      cur = addMinutes(cur, SLOT_STEP);
    }
    return null;
  }

  const openAuth = () => $('authBackdrop').classList.add('show');
  const closeAuth = () => $('authBackdrop').classList.remove('show');

  function openQuickConfirm(pcs, start, dur) {
    if (!currentUser) return needLogin();

    const safe = findNearestForAll(pcs, start, dur);

    pendingBooking = {

      startAtMs:safe.getTime(),
      endAtMs:addMinutes(safe, dur).getTime(),

      note:($('noteInput').value || '').trim()

  function openNearestConfirm(pcs) {

      startAtMs:safe.getTime(),
      endAtMs:addMinutes(safe, 120).getTime(),

  function buildCustomTimes() {
    const sel = $('customTime');
    sel.innerHTML = '';
    if (!selectedPCs.size) {
      const o = document.createElement('option');
      o.value = '';
      o.textContent = '—';
      sel.appendChild(o);
      return;
    }

    const pcs = [...selectedPCs];
    const dateKey = $('customDate').value || toISODate(new Date());
    const dur = Number($('customDuration').value || 60);

    const [y,m,d] = dateKey.split('-').map(Number);
    const base = new Date(y, m-1, d, 0, 0, 0, 0);
    const open = addMinutes(base, WORK_START);
    const close = addDays(base, 1);
    close.setHours(Math.floor(WORK_END_NEXTDAY / 60), WORK_END_NEXTDAY % 60, 0, 0);

    for (let cur = new Date(open); addMinutes(cur, dur) <= close; cur = addMinutes(cur, SLOT_STEP)) {
      const end = addMinutes(cur, dur);
      if (cur.getTime() < Date.now()) continue;
      if (!isFreeRangeForAll(pcs, cur.getTime(), end.getTime())) continue;
      const o = document.createElement('option');
      o.value = String(cur.getTime());
      o.textContent = `${fmtHM(cur)} → ${fmtHM(end)}`;
      sel.appendChild(o);
    }

    if (!sel.children.length) {
      const o = document.createElement('option');
      o.value = '';
      o.textContent = '—';
      sel.appendChild(o);
    }
  }

  async function createBooking(data) {
    if (!currentUser) return needLogin();
    const pcs = [...new Set((data.pcs || []).map(String))].slice(0, 10);
    const startAtMs = Number(data.startAtMs);
    const endAtMs = Number(data.endAtMs);
    const nick = String(data.nick || '').trim().slice(0, 32);
    const note = String(data.note || '').trim().slice(0, 120);

    if (!pcs.length) return toast(tr('chooseAtLeastOne'), 'warn');
    if (!nick) return toast(tr('enterNick'), 'warn');
    if (!isFreeRangeForAll(pcs, startAtMs, endAtMs)) return toast(tr('taken'), 'bad');

    try {
      await db.collection('users').doc(String(currentUser.uid)).set({ nick, updatedAtMs:Date.now() }, { merge:true });
      const batch = db.batch();
      pcs.forEach(pc => {
        const ref = db.collection('bookings').doc();
        batch.set(ref, {
          uid:String(currentUser.uid),
          userEmail:String(currentUser.email || ''),
          nick,
          pc,
          note,
          startAtMs,
          endAtMs,
          createdAtMs:Date.now()
        });
      });
      await batch.commit();
      localStorage.setItem(NICK_KEY, nick);
      $('nickInput').value = nick;
      toast(tr('booked'), 'good');
      closeConfirm();
      pendingBooking = null;
      $('mySection').scrollIntoView({behavior:'smooth', block:'start'});
      renderMyBookings();
      renderAdminBookings();
    } catch(e) {
      handleFsError(e);
    }
  }

  function renderMyBookings() {
    const box = $('myBookings');
    if (!box) return;
    box.innerHTML = '';

    if (!currentUser) {
      box.innerHTML = `<div class="notice">${esc(tr('authNeed'))}</div>`;
      return;
    }

    const mine = allBookings
      .filter(b => b.uid === currentUser.uid && b.endAtMs > Date.now() - 86400000)
      .sort((a,b)=>a.startAtMs-b.startAtMs);

    if (!mine.length) {
      box.innerHTML = `<div class="notice">${esc(tr('empty'))}</div>`;
      return;
    }

    mine.forEach(b => {
      const s = new Date(b.startAtMs), e = new Date(b.endAtMs);
      const item = document.createElement('div');
      item.className = 'bookingItem';
      item.innerHTML = `<div><b>${esc(b.pc)}</b><div class="meta">${esc(toISODate(s))} • ${esc(fmtHM(s))} → ${esc(fmtHM(e))}</div></div><button class="mini bad">${esc(tr('remove'))}</button>`;
      item.querySelector('button').onclick = async () => {
        if (!confirm(tr('remove') + '?')) return;
        try {
          await db.collection('bookings').doc(b.id).delete();
          toast(tr('canceled'), 'good');
        } catch(e) {
          handleFsError(e);
        }
      };
      box.appendChild(item);
    });
  }

  function renderAdminBookings() {
    const panel = $('adminSection');
    const box = $('adminBookings');
    panel.classList.toggle('hidden', !isAdmin);
    if (!isAdmin) return;

    box.innerHTML = '';
    const list = allBookings.filter(b => b.endAtMs > Date.now()).sort((a,b)=>a.startAtMs-b.startAtMs);

    if (!list.length) {
      box.innerHTML = `<div class="notice">${esc(tr('empty'))}</div>`;
      return;
    }

    list.forEach(b => {
      const s = new Date(b.startAtMs), e = new Date(b.endAtMs);
      const item = document.createElement('div');
      item.className = 'bookingItem';
      item.innerHTML = `<div><b>${esc(b.pc)}</b><div class="meta">${esc(b.nick || '')} • ${esc(toISODate(s))} • ${esc(fmtHM(s))} → ${esc(fmtHM(e))}</div></div><button class="mini bad">${esc(tr('remove'))}</button>`;
      item.querySelector('button').onclick = async () => {
        if (!confirm(tr('remove') + '?')) return;
        try {
          await db.collection('bookings').doc(b.id).delete();
          toast(tr('canceled'), 'good');
        } catch(e) {
          handleFsError(e);
        }
      };
      box.appendChild(item);
    });
  }

  function toggleMy() {
    $('mySection').scrollIntoView({behavior:'smooth', block:'start'});
    renderMyBookings();
  }

  function updateUserUI() {
    $('userPill').textContent = currentUser ? (currentUser.email || currentUser.uid.slice(0,6)) : '—';
    isAdmin = !!(currentUser && ADMIN_EMAILS.includes(String(currentUser.email || '').toLowerCase()));
    $('openAuthBtn').classList.toggle('hidden', !!currentUser);
    $('logoutBtn').classList.toggle('hidden', !currentUser);
    if (currentUser) $('authMsg').textContent = tr('authOk') + (currentUser.email || currentUser.uid.slice(0,6));
    renderAdminBookings();
  }

  function findFreeNow() {
    const free = ALL.filter(pc => getPcStatus(pc).state === 'free');
    if (!free.length) return toast(tr('noFree'), 'warn');

    if (multiMode) {
      selectedPCs = new Set(free.slice(0, 3));
      selectedPc = [...selectedPCs][0] || null;
    } else {
      selectedPc = free[0];
      selectedPCs = new Set([free[0]]);
    }
    renderStats();
    renderHall();
    renderSelected();
  }

  async function startRealtime() {
    if (unsub) {
      try { unsub(); } catch(_) {}
    }
    const { start, end } = dayBoundsNow();
    unsub = db.collection('bookings')
      .where('startAtMs', '<', end)
      .onSnapshot(snap => {
        allBookings = snap.docs
          .map(d => ({ id:d.id, ...d.data() }))
          .map(x => ({ ...x, startAtMs:Number(x.startAtMs||0), endAtMs:Number(x.endAtMs||0) }))
          .filter(x => x.endAtMs > start);

        setCloud(tr('statusLive'), true);
        renderStats();
        renderHall();
        renderSelected();
        renderMyBookings();
        renderAdminBookings();
      }, handleFsError);
  }

  function startTicker() {
    clearInterval(timer);
    timer = setInterval(() => {
      renderStats();
      renderHall();
      renderSelected();
    }, 30000);
  }

  function closeLangMenu() {
    $('langMenu').classList.remove('show');
  }

  function toggleLangMenu() {
    $('langMenu').classList.toggle('show');
  }

  function setLanguage(newLang) {
    lang = newLang;
    localStorage.setItem(LANG_KEY, lang);
    closeLangMenu();
    setLangUI();
  }

  function bind() {
    document.querySelectorAll('.langOption').forEach(btn => {
      btn.onclick = () => setLanguage(btn.dataset.lang);
    });

    $('langMenuBtn').onclick = e => {
      e.stopPropagation();
      toggleLangMenu();
    };

    document.addEventListener('click', e => {
      if (!e.target.closest('.langWrap')) closeLangMenu();
    });

    $('themeToggleBtn').onclick = () => {
      theme = theme === 'dark' ? 'light' : 'dark';
      localStorage.setItem(THEME_KEY, theme);
      applyTheme();
    };

    $('filterAll').onclick = () => {
      currentFilter = 'all';
      setFilterUI();
      renderHall();
    };
    $('filterFree').onclick = () => {
      currentFilter = 'free';
      setFilterUI();
      renderHall();
    };
    $('filterSoon').onclick = () => {
      currentFilter = 'soon';
      setFilterUI();
      renderHall();
    };

    $('findNowBtn').onclick = findFreeNow;

    $('toggleMultiBtn').onclick = () => {
      multiMode = !multiMode;
      if (!multiMode && selectedPCs.size > 1) {
        const first = [...selectedPCs][0];
        selectedPCs = new Set(first ? [first] : []);
        selectedPc = first || null;
      }
      setLangUI();
    };

    $('clearSelectedBtn').onclick = () => {
      selectedPCs.clear();
      selectedPc = null;
      renderStats();
      renderHall();
      renderSelected();
      buildCustomTimes();
    };

    $('openMyBtn').onclick = toggleMy;
    $('mobileMyBtn').onclick = toggleMy;

    $('mobileBookBtn').onclick = () => {
      if (!selectedPCs.size) return toast(tr('chooseAtLeastOne'), 'warn');
      showCustom();
      $('customSection').scrollIntoView({behavior:'smooth', block:'start'});
    };

    $('openAdminBtn').onclick = () => {
      if (!currentUser) return toast(tr('loginNeeded'), 'warn');
      if (!isAdmin) return toast(tr('adminDenied'), 'bad');
      $('adminSection').scrollIntoView({behavior:'smooth', block:'start'});
    };

    $('openAuthBtn').onclick = openAuth;
    $('logoutBtn').onclick = async () => {
      try { await auth.signOut(); } catch(_) {}
    };

    $('closeAuthBtn').onclick = closeAuth;
    $('authBackdrop').onclick = e => {
      if (e.target === $('authBackdrop')) closeAuth();
    };

    $('closeConfirmBtn').onclick = closeConfirm;
    $('cancelConfirmBtn').onclick = closeConfirm;
    $('confirmBackdrop').onclick = e => {
      if (e.target === $('confirmBackdrop')) closeConfirm();
    };

    $('customDate').value = toISODate(new Date());
    $('nickInput').value = localStorage.getItem(NICK_KEY) || '';
    $('nickInput').addEventListener('input', () => localStorage.setItem(NICK_KEY, $('nickInput').value.trim()));
    $('customDate').addEventListener('change', buildCustomTimes);
    $('customDuration').addEventListener('change', buildCustomTimes);

    $('hideCustomBtn').onclick = hideCustom;

    $('bookCustomBtn').onclick = () => {
      if (!selectedPCs.size) return toast(tr('chooseAtLeastOne'), 'warn');
      const startAtMs = Number($('customTime').value || 0);
      if (!startAtMs) return toast(tr('pickTime'), 'warn');
      const duration = Number($('customDuration').value || 60);
      pendingBooking = {
        pcs:[...selectedPCs],
        startAtMs,
        endAtMs:startAtMs + duration * 60000,
        nick:($('nickInput').value || '').trim(),
        note:($('noteInput').value || '').trim()
      };
      fillConfirm();
      openConfirm();
    };

    $('confirmBookBtn').onclick = () => {
      if (pendingBooking) createBooking(pendingBooking);
    };

    $('loginBtn').onclick = async () => {
      const email = ($('authEmail').value || '').trim();
      const pass = ($('authPass').value || '').trim();
      if (!email || !pass) return $('authMsg').textContent = tr('loginErr');
      try {
        await auth.signInWithEmailAndPassword(email, pass);
        closeAuth();
      } catch(e) {
        console.error(e);
        $('authMsg').textContent = e.message || tr('fsErr');
      }
    };

    $('registerBtn').onclick = async () => {
      const email = ($('authEmail').value || '').trim();
      const pass = ($('authPass').value || '').trim();
      if (!email || !pass) return $('authMsg').textContent = tr('loginErr');
      try {
        await auth.createUserWithEmailAndPassword(email, pass);
        closeAuth();
      } catch(e) {
        console.error(e);
        $('authMsg').textContent = e.message || tr('fsErr');
      }
    };

    $('resetBtn').onclick = async () => {
      const email = ($('authEmail').value || '').trim();
      if (!email) return $('authMsg').textContent = tr('loginErr');
      try {
        await auth.sendPasswordResetEmail(email);
        $('authMsg').textContent = tr('resetSent');
      } catch(e) {
        console.error(e);
        $('authMsg').textContent = e.message || tr('fsErr');
      }
    };

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        closeAuth();
        closeConfirm();
        closeLangMenu();
      }
    });
  }

  async function boot() {
    applyTheme();
    setLangUI();
    bind();
    setCloud(tr('statusOk'), true);
    startTicker();
    if (db) startRealtime();

    auth.onAuthStateChanged(async u => {
      currentUser = u || null;
      updateUserUI();
      renderMyBookings();

      if (currentUser && !$('nickInput').value.trim()) {
        try {
          const doc = await db.collection('users').doc(String(currentUser.uid)).get();
          const nick = doc.exists ? (doc.data().nick || '') : '';
          if (nick) {
            $('nickInput').value = nick;
            localStorage.setItem(NICK_KEY, nick);
          }
        } catch(_) {}
      }
    });
  }

  boot();
})();
</script>
</body>
</html>
