<!doctype html>
<html lang="ka">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Sakompiutere Gaming — Live Hall</title>
  <meta name="theme-color" content="#0b1020" />
  <link rel="icon" href="data:," />

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    :root{
      --bg:#070a12;
      --card:#0d1324;
      --text:#edf3ff;
      --muted:#9aa7c7;
      --line:rgba(255,255,255,.09);
      --free:#34d399;
      --soon:#fbbf24;
      --busy:#fb7185;
      --accent:#6ee7ff;
      --accent2:#a78bfa;
      --shadow:0 18px 60px rgba(0,0,0,.45);
      --glassA:rgba(255,255,255,.07);
      --glassB:rgba(255,255,255,.03);
    }

    body[data-theme="light"]{
      --bg:#eef4ff;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#5b6b86;
      --line:rgba(15,23,42,.10);
      --free:#059669;
      --soon:#d97706;
      --busy:#e11d48;
      --accent:#0284c7;
      --accent2:#7c3aed;
      --shadow:0 18px 45px rgba(15,23,42,.10);
      --glassA:rgba(255,255,255,.88);
      --glassB:rgba(255,255,255,.72);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    html{-webkit-text-size-adjust:100%}

    body{
      margin:0;
      color:var(--text);
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:
        radial-gradient(1000px 600px at 10% -10%, rgba(110,231,255,.12), transparent 60%),
        radial-gradient(900px 700px at 90% 0%, rgba(167,139,250,.14), transparent 60%),
        radial-gradient(1200px 700px at 50% 120%, rgba(52,211,153,.08), transparent 60%),
        var(--bg);
      overflow-x:hidden;
      transition:background .2s ease,color .2s ease;
      word-wrap:break-word;
      overflow-wrap:anywhere;
    }

    body[data-theme="light"]{
      background:
        radial-gradient(1000px 600px at 10% -10%, rgba(2,132,199,.10), transparent 60%),
        radial-gradient(900px 700px at 90% 0%, rgba(124,58,237,.10), transparent 60%),
        radial-gradient(1200px 700px at 50% 120%, rgba(5,150,105,.08), transparent 60%),
        var(--bg);
    }

    .wrap{
      max-width:1360px;
      margin:0 auto;
      padding:10px;
      padding-bottom:max(10px, env(safe-area-inset-bottom));
    }

    .glass{
      background:linear-gradient(180deg, var(--glassA), var(--glassB));
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
    }

    .hidden{display:none !important}

    .headerShell{
      border-radius:24px;
      position:sticky;
      top:8px;
      z-index:50;
      overflow:visible;
      transition:all .22s ease;
    }

    .headerShell.compact{
      border-radius:18px;
      box-shadow:0 12px 34px rgba(0,0,0,.30);
    }

    .headerMain{
      display:grid;
      grid-template-columns:minmax(0,1fr) auto;
      gap:10px;
      align-items:start;
      padding:12px 14px;
      transition:padding .22s ease;
    }

    .headerShell.compact .headerMain{
      padding:8px 10px;
      gap:8px;
    }

    .brand{
      display:flex;
      align-items:flex-start;
      gap:10px;
      min-width:0;
    }

    .logo{
      width:52px;
      height:52px;
      flex:0 0 52px;
      border-radius:14px;
      background-image:url("./logo.png");
      background-repeat:no-repeat;
      background-position:center;
      background-size:contain;
      background-color:transparent;
      border:none;
      box-shadow:none;
      overflow:hidden;
      transition:all .22s ease;
      margin-top:2px;
    }

    .headerShell.compact .logo{
      width:38px;
      height:38px;
      flex-basis:38px;
      border-radius:10px;
      margin-top:0;
    }

    .brandText{
      min-width:0;
      flex:1 1 auto;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }
      100%{box-shadow:0 0 0 0 rgba(52,211,153,0)}
    }

    h1{
      margin:0;
      font-size:17px;
      line-height:1.15;
      font-weight:1000;
      overflow-wrap:anywhere;
      transition:font-size .22s ease;
    }

    .headerShell.compact h1{
      font-size:14px;
    }

    .userInline{
      margin-top:6px;
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
      color:var(--muted);
      font-size:13px;
      font-weight:700;
      transition:all .22s ease;
    }

    .headerShell.compact .userInline{
      margin-top:4px;
      font-size:11px;
      gap:6px;
    }

    .userInline b{
      color:var(--text);
      max-width:100%;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .topbar{
      display:flex;
      align-items:flex-start;
      justify-content:flex-end;
      gap:6px;
      min-width:0;
      flex-wrap:wrap;
    }

    .iconBtn,.statusMini,.mini,.btn,.tinyAction,.filterBtn{
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--text);
    }

    body[data-theme="light"] .iconBtn,
    body[data-theme="light"] .statusMini,
    body[data-theme="light"] .mini,
    body[data-theme="light"] .btn,
    body[data-theme="light"] .tinyAction,
    body[data-theme="light"] .filterBtn{
      background:rgba(255,255,255,.80);
    }

    .iconBtn{
      width:34px;
      height:34px;
      border-radius:11px;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      font-size:15px;
      transition:.18s ease;
      padding:0;
    }

    .headerShell.compact .iconBtn{
      width:28px;
      height:28px;
      border-radius:9px;
      font-size:13px;
    }

    .iconBtn:hover{
      transform:translateY(-1px);
      border-color:rgba(110,231,255,.45);
    }

    body[data-theme="light"] .iconBtn:hover{
      border-color:rgba(2,132,199,.35);
    }

    .iconBtn.danger{
      color:#fff;
      background:rgba(251,113,133,.12);
      border-color:rgba(251,113,133,.25);
    }

    .statusMini{
      height:34px;
      padding:0 9px;
      border-radius:11px;
      display:flex;
      align-items:center;
      gap:7px;
      font-size:11px;
      color:var(--muted);
      white-space:nowrap;
      transition:.18s ease;
      font-weight:800;
    }

    .headerShell.compact .statusMini{
      height:28px;
      padding:0 7px;
      border-radius:9px;
      font-size:10px;
    }

    .statusMini b{
      color:var(--text);
      max-width:72px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .dot{
      width:8px;
      height:8px;
      border-radius:999px;
      background:#fff2;
      flex:0 0 8px;
    }

    .dot.ok{
      background:var(--free);
      box-shadow:0 0 0 0 rgba(52,211,153,.35);
      animation:pulse 1.8s infinite;
    }

    .dot.err{background:var(--busy)}

    .langWrap{position:relative}

    .langMenu{
      position:absolute;
      top:calc(100% + 8px);
      right:0;
      width:150px;
      border-radius:16px;
      padding:8px;
      display:none;
      z-index:70;
    }

    .langMenu.show{display:block}

    .langGrid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
    }

    .langFlagBtn{
      height:38px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--text);
      font-size:20px;
      cursor:pointer;
      transition:.15s ease;
    }

    body[data-theme="light"] .langFlagBtn{
      background:rgba(255,255,255,.78);
    }

    .langFlagBtn.active{
      background:rgba(110,231,255,.10);
      border-color:rgba(110,231,255,.45);
    }

    body[data-theme="light"] .langFlagBtn.active{
      background:rgba(2,132,199,.08);
      border-color:rgba(2,132,199,.35);
    }

    .layout{
      display:grid;
      grid-template-columns:minmax(0,1fr) 360px;
      gap:14px;
      margin-top:12px;
      min-width:0;
    }

    .panel{border-radius:22px;min-width:0}

    .panelHead{
      padding:14px 16px;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      min-width:0;
      flex-wrap:wrap;
    }

    .panelHead > div{min-width:0}

    .panelTitle{
      font-size:15px;
      font-weight:900;
      line-height:1.25;
      overflow-wrap:anywhere;
    }

    .panelBody{
      padding:14px;
      min-width:0;
    }

    .hallTopCompact{
      display:flex;
      justify-content:flex-end;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      margin-bottom:12px;
      min-height:0;
    }

    .hallTopInfo{
      display:none !important;
    }

    .hallTitle{
      display:none !important;
    }

    .hallTools{
      display:grid;
      grid-template-columns:repeat(3,minmax(82px,1fr));
      gap:8px;
      width:min(100%, 340px);
      margin-left:auto;
    }

    .filterBtn{
      padding:9px 10px;
      border-radius:14px;
      white-space:nowrap;
      font-size:12px;
      border:1px solid var(--line);
      color:var(--text);
      cursor:pointer;
      font-weight:900;
      line-height:1.1;
      transition:.15s ease;
    }

    .filterBtn.active{
      background:linear-gradient(180deg, rgba(110,231,255,.18), rgba(167,139,250,.12));
      border-color:rgba(110,231,255,.45);
      box-shadow:0 0 0 2px rgba(110,231,255,.07) inset;
    }

    body[data-theme="light"] .filterBtn.active{
      background:linear-gradient(180deg, rgba(2,132,199,.12), rgba(124,58,237,.10));
      border-color:rgba(2,132,199,.35);
      box-shadow:0 0 0 2px rgba(2,132,199,.07) inset;
    }

    .miniStatsRow{
      display:grid;
      grid-template-columns:repeat(6,1fr);
      gap:8px;
      margin-bottom:14px;
    }

    .miniStat{
      padding:10px 11px;
      border-radius:16px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      min-width:0;
    }

    body[data-theme="light"] .miniStat{
      background:rgba(255,255,255,.72);
    }

    .miniStat span{
      display:block;
      color:var(--muted);
      font-size:10px;
      line-height:1.25;
      overflow-wrap:anywhere;
    }

    .miniStat b{
      display:block;
      margin-top:4px;
      font-size:17px;
      line-height:1.1;
      overflow-wrap:anywhere;
    }

    .toast{
      margin-bottom:12px;
      border-radius:16px;
      padding:12px 13px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      font-size:12px;
      line-height:1.4;
      overflow-wrap:anywhere;
    }

    body[data-theme="light"] .toast{background:rgba(255,255,255,.72)}
    .toast.good{border-color:rgba(52,211,153,.28);background:rgba(52,211,153,.08)}
    .toast.bad{border-color:rgba(251,113,133,.28);background:rgba(251,113,133,.08)}
    .toast.warn{border-color:rgba(251,191,36,.28);background:rgba(251,191,36,.08)}

    .hall{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
      align-items:start;
      min-width:0;
    }

    .side{
      display:grid;
      gap:12px;
      min-width:0;
    }

    .aisle{display:none !important}

    .pc{
      position:relative;
      padding:14px;
      border-radius:24px;
      border:1px solid rgba(110,231,255,.14);
      background:
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03)),
        radial-gradient(140% 120% at 0% 0%, rgba(52,211,153,.08), transparent 60%),
        radial-gradient(140% 120% at 100% 100%, rgba(110,231,255,.08), transparent 60%);
      overflow:hidden;
      cursor:pointer;
      transition:.18s ease;
      min-width:0;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.025),
        0 8px 28px rgba(0,0,0,.18);
    }

    body[data-theme="light"] .pc{
      background:
        linear-gradient(180deg, rgba(255,255,255,.90), rgba(255,255,255,.76)),
        radial-gradient(140% 120% at 0% 0%, rgba(5,150,105,.07), transparent 60%),
        radial-gradient(140% 120% at 100% 100%, rgba(2,132,199,.06), transparent 60%);
    }

    .pc:hover{transform:translateY(-2px)}

    .pc.active{
      border-color:rgba(110,231,255,.55);
      box-shadow:0 0 0 3px rgba(110,231,255,.08), 0 10px 28px rgba(0,0,0,.22);
    }

    body[data-theme="light"] .pc.active{
      border-color:rgba(2,132,199,.35);
      box-shadow:0 0 0 3px rgba(2,132,199,.08), 0 10px 26px rgba(15,23,42,.1);
    }

    .pc.selectedMulti{
      box-shadow:0 0 0 3px rgba(167,139,250,.13), inset 0 0 0 1px rgba(167,139,250,.28);
    }

    .pc.free{box-shadow:inset 0 0 0 1px rgba(52,211,153,.14), 0 8px 26px rgba(0,0,0,.18)}
    .pc.soon{box-shadow:inset 0 0 0 1px rgba(251,191,36,.14), 0 8px 26px rgba(0,0,0,.18)}
    .pc.busy{box-shadow:inset 0 0 0 1px rgba(251,113,133,.14), 0 8px 26px rgba(0,0,0,.18)}

    .pc::before{
      content:"";
      position:absolute;
      inset:-28% auto auto -8%;
      width:170px;
      height:120px;
      border-radius:999px;
      filter:blur(22px);
      opacity:.36;
    }

    .pc.free::before{background:rgba(52,211,153,.22)}
    .pc.soon::before{background:rgba(251,191,36,.18)}
    .pc.busy::before{background:rgba(251,113,133,.18)}

    .pcTop{
      display:flex;
      justify-content:space-between;
      gap:8px;
      align-items:flex-start;
      min-width:0;
      flex-wrap:wrap;
    }

    .pcName{
      font-size:18px;
      font-weight:1000;
      letter-spacing:.01em;
      min-width:0;
      flex:1 1 90px;
      line-height:1.1;
      overflow-wrap:anywhere;
    }

    .statusTag{
      font-size:11px;
      font-weight:900;
      padding:8px 11px;
      border-radius:999px;
      border:1px solid var(--line);
      white-space:normal;
      text-align:center;
      line-height:1.15;
      max-width:100%;
      overflow-wrap:anywhere;
      flex:0 1 auto;
    }

    .statusTag.free{
      color:var(--free);
      background:rgba(52,211,153,.10);
      border-color:rgba(52,211,153,.25);
    }

    .statusTag.soon{
      color:var(--soon);
      background:rgba(251,191,36,.10);
      border-color:rgba(251,191,36,.25);
    }

    .statusTag.busy{
      color:var(--busy);
      background:rgba(251,113,133,.10);
      border-color:rgba(251,113,133,.25);
    }

    .pcMeta{
      margin-top:12px;
      display:grid;
      gap:7px;
      font-size:13px;
      color:var(--muted);
      min-width:0;
      min-height:48px;
    }

    .pcMeta div{
      min-width:0;
      overflow-wrap:anywhere;
      line-height:1.35;
    }

    .pcMeta b{color:var(--text)}

    .progress{
      height:8px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      overflow:hidden;
      margin-top:6px;
    }

    body[data-theme="light"] .progress{background:rgba(15,23,42,.07)}

    .bar{
      height:100%;
      background:linear-gradient(90deg, rgba(251,113,133,.8), rgba(251,191,36,.8));
      width:0%;
    }

    .pcBottom{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      margin-top:14px;
      min-width:0;
    }

    .mini,.btn,.tinyAction{
      cursor:pointer;
      transition:.15s ease;
      font-weight:800;
      min-width:0;
    }

    .mini{
      padding:11px 12px;
      border-radius:16px;
      font-size:15px;
      white-space:normal;
      line-height:1.2;
      text-align:center;
      overflow-wrap:anywhere;
    }

    .mini.primary,.btn.primary{
      background:linear-gradient(180deg, rgba(110,231,255,.18), rgba(167,139,250,.10));
      border-color:rgba(110,231,255,.42);
    }

    body[data-theme="light"] .mini.primary,
    body[data-theme="light"] .btn.primary{
      background:linear-gradient(180deg, rgba(2,132,199,.12), rgba(124,58,237,.08));
      border-color:rgba(2,132,199,.32);
    }

    .mini.soft{background:rgba(167,139,250,.10);border-color:rgba(167,139,250,.22)}
    .mini.bad{background:rgba(251,113,133,.10);border-color:rgba(251,113,133,.28)}
    .pcCta{font-size:13px;padding:10px 12px;width:100%}

    .sideCard{
      border-radius:22px;
      position:sticky;
      top:74px;
      min-width:0;
    }

    .topActionCluster{
      display:grid;
      gap:10px;
      margin-bottom:14px;
    }

    .topActionRow{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }

    .topActionRow.single{grid-template-columns:1fr}

    .tinyAction{
      padding:10px 12px;
      border-radius:14px;
      text-align:center;
      line-height:1.2;
      font-size:12px;
      background:rgba(255,255,255,.03);
    }

    .tinyAction.primary{
      background:linear-gradient(180deg, rgba(110,231,255,.18), rgba(167,139,250,.12));
      border-color:rgba(110,231,255,.42);
    }

    body[data-theme="light"] .tinyAction.primary{
      background:linear-gradient(180deg, rgba(2,132,199,.12), rgba(124,58,237,.08));
      border-color:rgba(2,132,199,.32);
    }

    .bigStatus{
      padding:14px;
      border-radius:18px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      margin-bottom:14px;
      min-width:0;
    }

    body[data-theme="light"] .bigStatus{background:rgba(255,255,255,.72)}

    .bigStatus h3{
      margin:0 0 6px;
      font-size:20px;
      line-height:1.2;
      overflow-wrap:anywhere;
    }

    .quickList{
      display:grid;
      gap:10px;
      min-width:0;
    }

    .quickItem{
      border:1px solid var(--line);
      border-radius:18px;
      padding:12px;
      background:rgba(255,255,255,.03);
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      min-width:0;
    }

    body[data-theme="light"] .quickItem{background:rgba(255,255,255,.72)}

    .quickItem > div{
      min-width:0;
      flex:1 1 auto;
    }

    .quickItem b,.quickItem small{
      overflow-wrap:anywhere;
      display:block;
      line-height:1.3;
    }

    .quickItem small{color:var(--muted);margin-top:3px}

    .chipRow{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
      min-width:0;
    }

    .chip{
      padding:7px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      font-size:12px;
      color:var(--muted);
      max-width:100%;
      overflow-wrap:anywhere;
      line-height:1.2;
    }

    body[data-theme="light"] .chip{background:rgba(255,255,255,.78)}
    .chip b{color:var(--text)}

    .formRow{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:10px;
      min-width:0;
    }

    .formRow > div{min-width:0}

    label{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin:0 0 6px;
      line-height:1.3;
      overflow-wrap:anywhere;
    }

    input,select{
      width:100%;
      padding:11px 12px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.22);
      color:var(--text);
      outline:none;
      min-width:0;
      font:inherit;
    }

    body[data-theme="light"] input,
    body[data-theme="light"] select{
      background:#fff;
    }

    input:focus,select:focus{
      border-color:rgba(110,231,255,.5);
      box-shadow:0 0 0 3px rgba(110,231,255,.1);
    }

    body[data-theme="light"] input:focus,
    body[data-theme="light"] select:focus{
      border-color:rgba(2,132,199,.35);
      box-shadow:0 0 0 3px rgba(2,132,199,.10);
    }

    .small{font-size:12px;line-height:1.35}
    .muted{color:var(--muted)}

    .onboard{
      font-size:12px;
      color:var(--muted);
      line-height:1.7;
      padding:4px 2px;
    }

    .notice{
      border:1px dashed rgba(110,231,255,.3);
      padding:12px 13px;
      border-radius:16px;
      background:rgba(110,231,255,.06);
      font-size:12px;
      color:var(--muted);
      line-height:1.45;
      overflow-wrap:anywhere;
    }

  /** Returns { startMs, endMs } for the full window we query from Firestore.
   *  Window: from midnight today → midnight today + MAX_BOOKING_DAYS + 1
   */
  function queryWindow() {
    const now  = new Date();
    const todayMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0, 0);
    const startMs = todayMidnight.getTime();
    const endMs   = addDays(todayMidnight, MAX_BOOKING_DAYS + 1).getTime();
    return { startMs, endMs };
  }

  // ─── Booking helpers ──────────────────────────────────────────────────────
  function getPcBookings(pc) {
    return allBookings
      .filter(b => b.pc === pc && b.status !== 'rejected')
      .sort((a, b) => a.startAtMs - b.startAtMs);
  }

  function progressFor(b) {
    const now = Date.now();
    if (!b || !Number.isFinite(b.startAtMs) || !Number.isFinite(b.endAtMs)) return 0;
    if (now <= b.startAtMs) return 0;
    if (now >= b.endAtMs)   return 100;
    return Math.max(0, Math.min(100,
      ((now - b.startAtMs) / (b.endAtMs - b.startAtMs)) * 100
    ));
  }

  function getPcStatus(pc) {
    const now    = Date.now();
    const future = getPcBookings(pc).filter(b => b.endAtMs > now);
    const active = future.find(b => b.startAtMs <= now && b.endAtMs > now);

    if (active) {
      const mins = Math.max(1, Math.ceil((active.endAtMs - now) / 60000));
      if (mins <= SOON_MIN) {
        return { state:'soon', subState:'soon_busy', active, freeAtMs:active.endAtMs, minsToFree:mins };
      }
      return { state:'busy', subState:'busy', active, freeAtMs:active.endAtMs, minsToFree:mins };
    }

    const next = future.find(b => b.startAtMs > now);
    if (next && next.startAtMs - now <= SOON_MIN * 60000) {
      return {
        state:'soon', subState:'soon_free', next,
        nextStartMs: next.startAtMs,
        minsToStart: Math.max(1, Math.ceil((next.startAtMs - now) / 60000))
      };
    }

    return { state:'free', subState:'free' };
  }

  function getDisplayTag(status) {
    if (status.subState === 'soon_free') return tr('soonFreeTag');
    if (status.subState === 'soon_busy') return tr('soonBusyTag');
    if (status.state === 'busy' && status.active &&
        (status.active.status === 'pending_payment' || status.active.status === 'payment_submitted'))
      return tr('pendingTag');
    if (status.state === 'busy') return tr('busyTag');
    return tr('freeTag');
  }

  function isFreeRangeForAll(pcs, startMs, endMs) {
    // Guard against NaN / invalid timestamps and minimum session length
    if (!Number.isFinite(startMs) || !Number.isFinite(endMs)) return false;
    if (endMs - startMs < MIN_SESSION_MIN * 60000) return false;
    return pcs.every(pc =>
      !getPcBookings(pc).some(b =>
        Number.isFinite(b.startAtMs) && Number.isFinite(b.endAtMs) &&
        overlaps(startMs, endMs, b.startAtMs, b.endAtMs)
      )
    );
  }

  // 24/7 — always open, no clamping needed
  function getWorkBoundsForDay(_date) {
    // Open = now, Close = far in the future (no restriction)
    return {
      open:  new Date(0),
      close: new Date(Date.now() + (MAX_BOOKING_DAYS + 2) * 86400000)
    };
  }

  function clampToOpen(date) {
    // 24/7: always within bounds — just return the date as-is
    return new Date(date);
  }

  function roundUp(date) {
    const d = new Date(date);
    d.setSeconds(0, 0);
    const m     = d.getMinutes();
    const extra = (SLOT_STEP - (m % SLOT_STEP)) % SLOT_STEP;
    if (extra) d.setMinutes(m + extra);
    return d;
  }

  function findNearestForAll(pcs, earliest, dur) {
    const limit = addDays(new Date(), MAX_BOOKING_DAYS).getTime();
    // Start from the later of: earliest requested time or now (rounded up to slot)
    let cur = roundUp(new Date(Math.max(earliest.getTime(), Date.now())));

    while (cur.getTime() < limit) {
      const end = addMinutes(cur, dur);
      if (isFreeRangeForAll(pcs, cur.getTime(), end.getTime())) {
        return cur;
      }
      cur = addMinutes(cur, SLOT_STEP);
    }

    return null;
  }

  function rankFreeGroupCandidates(freeList) {
    const indexMap = ALL.reduce((acc, name, idx) => {
      acc[name] = idx;
      return acc;
    }, {});
    return [...freeList].sort((a, b) => indexMap[a] - indexMap[b]);
  }

      meta = `
        <div>${tr('playing')}: <b>${esc(s.active.nick || tr('guest'))}</b></div>
        <div>${tr('occupiedUntil')}: <b>${fmtHM(new Date(s.freeAtMs))}</b></div>
        <div>${tr('endsIn')}: <b>${s.minsToFree} ${tr('minutes')}</b></div>
        <div class="progress"><div class="bar" style="width:${progressFor(s.active)}%"></div></div>

  function buildCustomTimes() {
    const sel = $('customTime');
    sel.innerHTML = '';

    const today = new Date();
    const minDate = toISODate(today);
    const maxDate = toISODate(addDays(today, MAX_BOOKING_DAYS));
    $('customDate').min = minDate;
    $('customDate').max = maxDate;
    if (!$('customDate').value || $('customDate').value < minDate) $('customDate').value = minDate;
    if ($('customDate').value > maxDate) $('customDate').value = maxDate;

    if (!selectedPCs.size) {
      const o = document.createElement('option');
      o.value = '';
      o.textContent = '—';
      sel.appendChild(o);
      return;
    }

    const pcs     = [...selectedPCs];
    const dateKey = $('customDate').value || toISODate(new Date());
    const dur     = Number($('customDuration').value) || 60;
    const [y, m, d] = dateKey.split('-').map(Number);

    const base  = new Date(y, m - 1, d, 0, 0, 0, 0);
    const open  = base;                              // 00:00 — 24/7
    const close = addDays(base, 1);                  // 24:00 same day

    for (let cur = new Date(open); addMinutes(cur, dur) <= close; cur = addMinutes(cur, SLOT_STEP)) {
      if (cur.getTime() < Date.now()) continue;
      const end = addMinutes(cur, dur);
      if (!isFreeRangeForAll(pcs, cur.getTime(), end.getTime())) continue;

      const o = document.createElement('option');
      o.value = String(cur.getTime());
      o.textContent = `${fmtHM(cur)} → ${fmtHM(end)}`;
      sel.appendChild(o);
    }

    if (!sel.children.length) {
      const o = document.createElement('option');
      o.value = '';
      o.textContent = tr('noTimes');
      sel.appendChild(o);
    }
  }

  // ─── Quick confirm helpers ────────────────────────────────────────────────
  function openQuickConfirm(pcs, start, dur) {
    if (!currentUser) return needLogin();
    const nick = ($('nickInput').value || '').trim() || localStorage.getItem(NICK_KEY) || '';
    if (!nick) return showCustom(true);

    const safe = findNearestForAll(pcs, start, dur);
    if (!safe) return toast(tr('taken'), 'bad');

    pendingBooking = {
      pcs:      [...pcs],
      startAtMs: safe.getTime(),
      endAtMs:   addMinutes(safe, dur).getTime(),
      nick,
      note: ($('noteInput').value || '').trim()
    };
    fillConfirm();
    openConfirm();
  }

  function openNearestConfirm(pcs) {
    if (!currentUser) return needLogin();
    const nick = ($('nickInput').value || '').trim() || localStorage.getItem(NICK_KEY) || '';
    if (!nick) return showCustom(true);

    const safe = findNearestForAll(pcs, new Date(), 120);
    if (!safe) return toast(tr('taken'), 'bad');

    pendingBooking = {
      pcs:      [...pcs],
      startAtMs: safe.getTime(),
      endAtMs:   addMinutes(safe, 120).getTime(),
      nick,
      note: ($('noteInput').value || '').trim()
    };
    fillConfirm();
    openConfirm();
  }

  // ─── Payment helpers ─────────────────────────────────────────────────────
  const openPayModal  = () => $('payBackdrop').classList.add('show');
  const closePayModal = () => $('payBackdrop').classList.remove('show');

  function calcPrice(numPcs, startMs, endMs) {
    const hours = (endMs - startMs) / 3600000;
    return Math.round(numPcs * hours * PRICE_PER_HOUR * 100) / 100;
  }

  function fmtDur(startMs, endMs) {
    const m = Math.round((endMs - startMs) / 60000);
    const h = Math.floor(m / 60), min = m % 60;
    if (h === 0) return m + ' ' + tr('minutes');
    if (min === 0) return h + ' ' + (lang === 'en' ? 'h' : lang === 'ru' ? 'ч' : 'სთ');
    return h + ':' + String(min).padStart(2,'0');
  }

  function showPayModal(bookingData) {
    const { pcs, startAtMs, endAtMs, nick, note, allIds } = bookingData;
    const total = calcPrice(pcs.length, startAtMs, endAtMs);
    const s = new Date(startAtMs), e = new Date(endAtMs);

    $('t_payTitle').textContent = tr('payTitle');
    $('t_payHint').textContent  = tr('payHint');

    const bankHtml = PAYMENT_BANKS.map(bank => `
      <div class="payCard">

            <button class="copyBtn" id="copyBtn_${esc(bank.short)}" type="button">📋 Copy</button>
          </div>
        </div>
        <div class="payRow"><span class="payLabel" style="opacity:.6">${esc(bank.name)}</span><span class="pendingChip">${esc(bank.short)}</span></div>
      </div>`).join('');

    $('payBody').innerHTML = `
      <div class="payCard" style="border-color:rgba(52,211,153,.35);background:rgba(52,211,153,.07);margin-bottom:12px;text-align:center">
        <div class="payAmount">${total} ₾</div>
        <div style="font-size:11px;opacity:.6;margin-top:4px">${esc(pcs.join(', '))} · ${esc(fmtDur(startAtMs,endAtMs))} · ${esc(fmtHM(s))}–${esc(fmtHM(e))}</div>
      </div>
      ${bankHtml}
      <div class="notice" style="margin-bottom:14px">${esc(tr('payHint'))}</div>
      <div class="topActionRow">
        <button class="btn primary" id="payDoneBtn" type="button">${esc(tr('payConfirmBtn'))}</button>
        <button class="btn" id="payCancelBtn" type="button">${esc(tr('payCancel'))}</button>
      </div>`;

    // Wire copy buttons
    PAYMENT_BANKS.forEach(bank => {
      const btn = $('copyBtn_' + bank.short);
      if (btn) btn.onclick = () => {
        navigator.clipboard.writeText(bank.account).then(() => {
          btn.textContent = tr('payCopied');
          setTimeout(() => { btn.textContent = '📋 Copy'; }, 1800);
        }).catch(() => {
          btn.textContent = bank.account; // fallback: show account
        });
      };
    });

    $('payCancelBtn').onclick = () => {
      closePayModal();
      // Delete the pending booking docs
      if (allIds && allIds.length) {
        const b = db.batch();
        allIds.forEach(id => b.delete(db.collection('bookings').doc(id)));
        b.commit().catch(() => {});
      }
    };

    $('payDoneBtn').onclick = async () => {
      $('payDoneBtn').disabled = true;
      $('payDoneBtn').textContent = '...';
      try {
        // Mark as payment_submitted
        const b2 = db.batch();
        allIds.forEach(id => b2.update(db.collection('bookings').doc(id), { status: 'payment_submitted' }));
        await b2.commit();

        // Notify admin
        await db.collection('notifications').add({
          type:        'payment_submitted',
          uid:         String(currentUser.uid),
          userEmail:   String(currentUser.email || ''),
          nick, pcs: pcs.join(', '), note: note || '',
          startAtMs, endAtMs,
          startFmt:    toISODate(s) + ' ' + fmtHM(s),
          endFmt:      fmtHM(e),
          amountGEL:   total,
          bookingIds:  allIds,
          createdAtMs: Date.now(),
          read:        false
        });

        toast(tr('payDone'), 'good');
        closePayModal();
        selectedPCs.clear(); selectedPc = null;
        renderStats(); renderHall(); renderSelected(); updateMobileBookBtn();
        $('mySection').scrollIntoView({ behavior:'smooth', block:'start' });
        renderMyBookings(); renderAdminBookings();
      } catch(err) {
        handleFsError(err);
        $('payDoneBtn').disabled = false;
        $('payDoneBtn').textContent = tr('payConfirmBtn');
      }
    };

    openPayModal();
  }

  // ─── Create booking ───────────────────────────────────────────────────────
  async function createBooking(data) {
    if (!currentUser) return needLogin();

    const nowMs = Date.now();
    const latestMs = addDays(new Date(), MAX_BOOKING_DAYS).getTime();

    const pcs      = [...new Set((data.pcs || []).map(String).filter(p => VALID_PCS.has(p)))].slice(0, 10);
    const startAtMs = Number(data.startAtMs);
    const endAtMs   = Number(data.endAtMs);
    const nick      = String(data.nick || '').trim().slice(0, 32);
    const note      = String(data.note || '').trim().slice(0, 120);

    if (!pcs.length)        return toast(tr('chooseAtLeastOne'), 'warn');
    if (!nick)              return toast(tr('enterNick'), 'warn');
    if (!Number.isFinite(startAtMs) || !Number.isFinite(endAtMs) || endAtMs <= startAtMs)
                            return toast(tr('invalidData'), 'warn');
    if (startAtMs < nowMs - 60000)   return toast(tr('invalidData'), 'warn');
    if (startAtMs > latestMs)        return toast(tr('invalidData'), 'warn');
    if (endAtMs - startAtMs < MIN_SESSION_MIN * 60000) return toast(tr('invalidData'), 'warn');
    if (endAtMs - startAtMs > MAX_SESSION_MIN * 60000) return toast(tr('invalidData'), 'warn');

    if (!isFreeRangeForAll(pcs, startAtMs, endAtMs)) return toast(tr('taken'), 'bad');

    try {
      await db.collection('users').doc(String(currentUser.uid)).set(
        { nick, updatedAtMs: Date.now() }, { merge: true }
      );

      localStorage.setItem(NICK_KEY, nick);
      $('nickInput').value = nick;

      // ── Write slots as pending_payment (blocks the time) ──────
      const total  = calcPrice(pcs.length, startAtMs, endAtMs);
      const allIds = [];
      const batch  = db.batch();
      pcs.forEach(pc => {
        const ref = db.collection('bookings').doc();
        allIds.push(ref.id);
        batch.set(ref, {
          uid:        String(currentUser.uid),
          userEmail:  String(currentUser.email || ''),
          nick, pc, note, startAtMs, endAtMs,
          createdAtMs: Date.now(),
          status:     'pending_payment',
          amountGEL:  total
        });
      });
      await batch.commit();

      closeConfirm();
      hideCustom();
      pendingBooking = null;

      // ── Show payment modal ─────────────────────────────────────
      showPayModal({ pcs, startAtMs, endAtMs, nick, note, allIds });

    } catch (e) {
      handleFsError(e);
    }
  }

      box.appendChild(n);

    }

    const mine = allBookings
      .filter(b => b.uid === currentUser.uid && b.endAtMs > Date.now() - 86400000)
      .sort((a, b) => a.startAtMs - b.startAtMs);

    if (!mine.length) {
      box.innerHTML = `<div class="notice">${esc(tr('empty'))}</div>`;
      return;
    }

    mine.forEach(b => {
      const s    = new Date(b.startAtMs);
      const e    = new Date(b.endAtMs);
      const item = document.createElement('div');
      item.className = 'bookingItem';
      const nowMs = Date.now();
      const isActive  = b.startAtMs <= nowMs && b.endAtMs > nowMs;
      const isFuture  = b.startAtMs > nowMs;
      const isPending = b.status === 'pending_payment' || b.status === 'payment_submitted';
      const dot = isPending ? '⏳' : isActive ? '🟢' : isFuture ? '🟡' : '⚪';
      const pendingLine = isPending
        ? `<div class="meta" style="color:var(--soon);font-weight:800">${esc(tr('paymentPending'))}${b.amountGEL ? ' · ' + b.amountGEL + ' ₾' : ''}</div>`
        : '';
      item.innerHTML = `
        <div>
          <b>${dot} ${esc(b.pc)}</b>
          <div class="meta">${esc(toISODate(s))} • ${esc(fmtHM(s))} → ${esc(fmtHM(e))}</div>
          ${pendingLine}
          ${b.note ? `<div class="meta">${esc(b.note)}</div>` : ''}
        </div>
        <button class="mini bad" type="button">${esc(tr('remove'))}</button>
      `;
      item.querySelector('button').onclick = async () => {
        if (!confirm(tr('cancelConfirmQ'))) return;
        try {
          await db.collection('bookings').doc(b.id).delete();
          toast(tr('canceled'), 'good');
        } catch (e) {
          handleFsError(e);
        }
      };
      box.appendChild(item);
    });
  }

  // ─── Admin bookings ───────────────────────────────────────────────────────
  function renderAdminBookings() {
    const panel = $('adminSection');
    const box   = $('adminBookings');

    panel.classList.toggle('hidden', !isAdmin);
    if (!isAdmin) return;

    const q    = String($('adminSearch').value || '').trim().toLowerCase();
    box.innerHTML = '';

    let list = allBookings
      .filter(b => b.endAtMs > Date.now())
      .sort((a, b) => a.startAtMs - b.startAtMs);

    if (q) {
      list = list.filter(b => {
        const hay = [b.pc || '', b.nick || '', b.userEmail || '', b.note || '']
          .join(' ').toLowerCase();
        return hay.includes(q);
      });
    }

    if (!list.length) {
      box.innerHTML = `<div class="notice">${esc(q ? tr('nothingFound') : tr('empty'))}</div>`;
      return;
    }

    list.forEach(b => {
      const s    = new Date(b.startAtMs);
      const e    = new Date(b.endAtMs);
      const item = document.createElement('div');
      item.className = 'bookingItem';
      item.innerHTML = `
        <div>
          <b>${esc(b.pc)}</b>
          <div class="meta">${esc(b.nick || '')} • ${esc(b.userEmail || '')}</div>
          <div class="meta">${esc(toISODate(s))} • ${esc(fmtHM(s))} → ${esc(fmtHM(e))}</div>
        </div>
        <button class="mini bad" type="button">${esc(tr('remove'))}</button>
      `;
      item.querySelector('button').onclick = async () => {
        if (!confirm(tr('cancelConfirmQ'))) return;
        try {
          await db.collection('bookings').doc(b.id).delete();
          toast(tr('canceled'), 'good');
        } catch (e) {
          handleFsError(e);
        }
      };
      box.appendChild(item);
    });
  }

  // ─── Mobile book button smart label ─────────────────────────────────────
  function updateMobileBookBtn() {
    if (!currentUser) {
      $('mobileBookBtn').textContent = tr('auth');
      return;
    }
    const cnt = selectedPCs.size;
    if (cnt === 0) {
      $('mobileBookBtn').textContent = tr('mobileBook');
    } else {
      $('mobileBookBtn').textContent = `${tr('mobileBook')} (${cnt} ${tr('pcs')})`;
    }
  }

  // ─── Auth state ───────────────────────────────────────────────────────────
  function updateUserUI() {
    const loggedIn = !!currentUser;
    isAdmin = !!(currentUser && ADMIN_EMAILS.includes(String(currentUser.email || '').toLowerCase()));

    // Header pill + top logout btn
    $('userPill').textContent = loggedIn
      ? (currentUser.email || currentUser.uid.slice(0, 6))
      : '—';
    $('logoutTopBtn').classList.toggle('hidden', !loggedIn);
    $('loginTopBtn').classList.toggle('hidden',  loggedIn);

    // Side panel rows
    $('authRow').classList.toggle('hidden',   loggedIn);
    $('logoutRow').classList.toggle('hidden', !loggedIn);

    // Admin row — only for admins
    $('adminRow').classList.toggle('hidden', !isAdmin);

    // Close booking form + clear nick on logout
    if (!loggedIn) {
      $('customSection').classList.add('hidden');
      $('nickInput').value = '';
    }

    // Auth modal message
    $('authMsg').textContent = loggedIn
      ? tr('authOk') + (currentUser.email || currentUser.uid.slice(0, 6))
      : '—';

    // Mobile book button label
    updateMobileBookBtn();

    renderAdminBookings();
    renderMyBookings();
    renderSelected();

    // Start/stop notification listener based on admin status
    if (isAdmin) {
      startNotifListener();
    } else {
      if (unsubNotif) { try { unsubNotif(); } catch(_){} unsubNotif = null; }
      const btn = $('openAdminBtn');
      if (btn) btn.textContent = tr('admin');
    }
  }

  // ─── Find free now ────────────────────────────────────────────────────────
  function findFreeNow() {
    const free = rankFreeGroupCandidates(ALL.filter(pc => getPcStatus(pc).state === 'free'));
    if (!free.length) return toast(tr('noFree'), 'warn');

    if (multiMode) {
      selectedPCs = new Set(free.slice(0, 3));
      selectedPc  = [...selectedPCs][0] || null;
    } else {
      selectedPc  = free[0];
      selectedPCs = new Set([free[0]]);
    }

    renderStats();
    renderHall();
    renderSelected();
  }

  // ─── Realtime listener ────────────────────────────────────────────────────
  async function startRealtime() {
    if (!db) return;

    if (unsub) {
      try { unsub(); } catch (_) {}
      unsub = null;
    }

    const { startMs, endMs } = queryWindow();

    // Single-field query — no composite index required.
    // Past bookings (endAtMs <= startMs) are filtered client-side.
    unsub = db.collection('bookings')
      .where('startAtMs', '<', endMs)
      .onSnapshot(snap => {
        allBookings = snap.docs
          .map(d => ({ id: d.id, ...d.data() }))
          .map(x => ({
            ...x,
            startAtMs: Number(x.startAtMs || 0),
            endAtMs:   Number(x.endAtMs   || 0)
          }))
          .filter(x =>
            Number.isFinite(x.startAtMs) &&
            Number.isFinite(x.endAtMs)   &&
            x.endAtMs > x.startAtMs      &&
            x.endAtMs > startMs           // discard fully-past bookings client-side
          );

        setCloud(tr('statusLive'), true);
        renderStats();
        renderHall();
        renderSelected();
        renderMyBookings();
        renderAdminBookings();
      }, handleFsError);
  }

  // ─── Admin notifications listener ───────────────────────────────────────
  let unsubNotif = null;

  function startNotifListener() {
    if (!db || !isAdmin) return;
    if (unsubNotif) { try { unsubNotif(); } catch(_){} unsubNotif = null; }

    unsubNotif = db.collection('notifications')
      .where('read', '==', false)
      .limit(50)
      .onSnapshot(snap => {
        const docs = [...snap.docs].sort((a, b) => Number(b.data().createdAtMs || 0) - Number(a.data().createdAtMs || 0)).slice(0, 20);
        const count = docs.length;
        const btn = $('openAdminBtn');
        if (btn) {
          btn.textContent = count > 0
            ? `🔐 Admin 🔴${count}`
            : tr('admin');
        }
        renderNotifications(docs);
      }, () => {});
  }

  function renderNotifications(docs) {
    const box = $('adminNotifBox');
    if (!box) return;
    box.innerHTML = '';
    if (!docs || !docs.length) {
      box.innerHTML = `<div class="notice" style="font-size:11px">✅ ${esc(tr('noNewNotif'))}</div>`;
      return;
    }
    docs.forEach(doc => {
      const d   = doc.data();
      const isPay = d.type === 'payment_submitted';
      const div = document.createElement('div');
      div.className = 'bookingItem';
      div.style.cssText = isPay
        ? 'background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.3);flex-wrap:wrap;gap:10px'
        : 'background:rgba(110,231,255,.06);border-color:rgba(110,231,255,.2)';
      div.innerHTML = `
        <div style="min-width:0;flex:1 1 auto">
          <b>${isPay ? '💳' : '🔔'} ${esc(d.nick || '?')} — ${esc(d.pcs || '')}</b>
          <div class="meta">${esc(d.startFmt || '')} → ${esc(d.endFmt || '')}</div>
          ${isPay && d.amountGEL ? `<div class="meta" style="color:var(--free);font-weight:900">💰 ${d.amountGEL} ₾</div>` : ''}
          ${d.note ? `<div class="meta">💬 ${esc(d.note)}</div>` : ''}
          <div class="meta" style="opacity:.6">${esc(d.userEmail || '')}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0">
          ${isPay ? `
            <button class="mini primary" style="font-size:11px;padding:7px 10px;white-space:nowrap" data-act="confirm" type="button">${esc(tr('confirmBooking'))}</button>
            <button class="mini bad"     style="font-size:11px;padding:7px 10px;white-space:nowrap" data-act="reject"  type="button">${esc(tr('rejectBooking'))}</button>
          ` : `
            <button class="mini" style="font-size:10px;padding:6px 8px" data-act="read" type="button">✓ OK</button>
          `}
        </div>`;

      div.querySelector('[data-act="confirm"]')?.addEventListener('click', async () => {
        try {
          await db.collection('notifications').doc(doc.id).update({ read: true });
          const b3 = db.batch();
          (d.bookingIds || []).forEach(id => b3.update(db.collection('bookings').doc(id), { status: 'confirmed' }));
          await b3.commit();
          toast('✅ Бронь подтверждена!', 'good');
        } catch(e) { handleFsError(e); }
      });

      div.querySelector('[data-act="reject"]')?.addEventListener('click', async () => {
        try {
          await db.collection('notifications').doc(doc.id).update({ read: true });
          const b4 = db.batch();
          (d.bookingIds || []).forEach(id => b4.delete(db.collection('bookings').doc(id)));
          await b4.commit();
          toast('❌ Бронь отклонена.', 'warn');
        } catch(e) { handleFsError(e); }
      });

      div.querySelector('[data-act="read"]')?.addEventListener('click', async () => {
        try { await db.collection('notifications').doc(doc.id).update({ read: true }); } catch(_) {}
      });

      box.appendChild(div);
    });
  }

  // ─── Ticker — only ticks when tab is visible ──────────────────────────────
  function startTicker() {
    clearInterval(timer);

    const tick = () => {
      if (document.visibilityState === 'hidden') return;
      renderStats();
      renderHall();
      renderSelected();
    };

    timer = setInterval(tick, 30000);
    document.addEventListener('visibilitychange', tick);
  }

  // ─── Lang menu ────────────────────────────────────────────────────────────
  const closeLangMenu  = ()  => $('langMenu').classList.remove('show');
  const toggleLangMenu = ()  => $('langMenu').classList.toggle('show');

  function setLanguage(newLang) {
    lang = newLang;
    localStorage.setItem(LANG_KEY, lang);
    closeLangMenu();
    applyTexts();
  }

  // ─── Misc UI helpers ──────────────────────────────────────────────────────
  function toggleMy() {
    $('mySection').scrollIntoView({ behavior:'smooth', block:'start' });
    renderMyBookings();
  }

  async function signOutNow() {
    if (!auth) return;
    try { await auth.signOut(); } catch (_) {}
  }

  function updateHeaderCompact() {
    const header = $('headerShell');
    if (!header) return;
    header.classList.toggle('compact', window.scrollY > 45);
  }

  // ─── Event bindings ───────────────────────────────────────────────────────
  function bind() {
    document.querySelectorAll('.langFlagBtn').forEach(btn => {
      btn.onclick = () => setLanguage(btn.dataset.lang);
    });

    $('langMenuBtn').onclick = e => { e.stopPropagation(); toggleLangMenu(); };
    document.addEventListener('click', e => {
      if (!e.target.closest('.langWrap')) closeLangMenu();
    });

    $('themeToggleBtn').onclick = () => {
      theme = theme === 'dark' ? 'light' : 'dark';
      localStorage.setItem(THEME_KEY, theme);
      applyTheme();
    };

    $('logoutTopBtn').onclick = signOutNow;
    $('logoutBtn').onclick    = signOutNow;
    $('loginTopBtn').onclick  = openAuth;

    $('filterAll').onclick  = () => { currentFilter = 'all';  setFilterUI(); renderHall(); };
    $('filterFree').onclick = () => { currentFilter = 'free'; setFilterUI(); renderHall(); };
    $('filterSoon').onclick = () => { currentFilter = 'soon'; setFilterUI(); renderHall(); };

    $('findNowBtn').onclick = findFreeNow;

    $('toggleMultiBtn').onclick = () => {
      multiMode = !multiMode;
      if (!multiMode && selectedPCs.size > 1) {
        const first = [...selectedPCs][0];
        selectedPCs = new Set(first ? [first] : []);
        selectedPc  = first || null;
      }
      applyTexts();
    };

    $('clearSelectedBtn').onclick = clearSelection;

    $('openMyBtn').onclick    = toggleMy;
    $('mobileMyBtn').onclick  = toggleMy;

    $('mobileBookBtn').onclick = () => {
      if (!currentUser) return openAuth();
      if (!selectedPCs.size) return toast(tr('chooseAtLeastOne'), 'warn');
      showCustom();
      $('customSection').scrollIntoView({ behavior:'smooth', block:'start' });
    };

    $('openAdminBtn').onclick = () => {
      if (!isAdmin) return;
      $('adminSection').scrollIntoView({ behavior:'smooth', block:'start' });
    };

    $('openAuthBtn').onclick = openAuth;

    $('closeAuthBtn').onclick   = closeAuth;
    $('authBackdrop').onclick   = e => { if (e.target === $('authBackdrop'))    closeAuth(); };

    $('closeConfirmBtn').onclick  = closeConfirm;
    $('cancelConfirmBtn').onclick = closeConfirm;
    $('confirmBackdrop').onclick  = e => { if (e.target === $('confirmBackdrop')) closeConfirm(); };

    // Date default
    $('customDate').value = toISODate(new Date());

    // Nick from localStorage
    $('nickInput').value = localStorage.getItem(NICK_KEY) || '';
    $('nickInput').addEventListener('input', () => {
      localStorage.setItem(NICK_KEY, $('nickInput').value.trim());
    });

    $('customDate').addEventListener('change', buildCustomTimes);
    $('customDuration').addEventListener('change', buildCustomTimes);

    // Debounced admin search
    $('adminSearch').addEventListener('input', () => {
      clearTimeout(adminSearchTimer);
      adminSearchTimer = setTimeout(renderAdminBookings, 220);
    });

    $('hideCustomBtn').onclick = hideCustom;

    $('bookCustomBtn').onclick = () => {
      if (!currentUser) return needLogin();
      if (!selectedPCs.size) return toast(tr('chooseAtLeastOne'), 'warn');

      const startAtMs  = Number($('customTime').value || 0);
      if (!startAtMs)  return toast(tr('pickTime'), 'warn');

      const duration   = Number($('customDuration').value) || 60;
      const nick       = ($('nickInput').value || '').trim();
      if (!nick)        return toast(tr('enterNick'), 'warn');

      pendingBooking = {
        pcs:      [...selectedPCs],
        startAtMs,
        endAtMs:  startAtMs + duration * 60000,
        nick,
        note: ($('noteInput').value || '').trim()
      };
      fillConfirm();
      openConfirm();
    };

    $('confirmBookBtn').onclick = () => {
      if (pendingBooking) createBooking(pendingBooking);
    };

    $('loginBtn').onclick = async () => {
      const email = ($('authEmail').value || '').trim();
      const pass  = ($('authPass').value  || '').trim();
      if (!email || !pass) return $('authMsg').textContent = tr('loginErr');
      if (!auth)           return $('authMsg').textContent = tr('fsErr');
      try {
        await auth.signInWithEmailAndPassword(email, pass);
        closeAuth();
      } catch (e) {
        console.error(e);
        $('authMsg').textContent = e.message || tr('fsErr');
      }
    };

    $('registerBtn').onclick = async () => {
      const email = ($('authEmail').value || '').trim();
      const pass  = ($('authPass').value  || '').trim();
      if (!email || !pass) return $('authMsg').textContent = tr('loginErr');
      if (!auth)           return $('authMsg').textContent = tr('fsErr');
      try {
        await auth.createUserWithEmailAndPassword(email, pass);
        closeAuth();
      } catch (e) {
        console.error(e);
        $('authMsg').textContent = e.message || tr('fsErr');
      }
    };

    $('resetBtn').onclick = async () => {
      const email = ($('authEmail').value || '').trim();
      if (!email) return $('authMsg').textContent = tr('loginErr');
      if (!auth)  return $('authMsg').textContent = tr('fsErr');
      try {
        await auth.sendPasswordResetEmail(email);
        $('authMsg').textContent = tr('resetSent');
      } catch (e) {
        console.error(e);
        $('authMsg').textContent = e.message || tr('fsErr');
      }
    };

    $('closePayBtn').onclick = closePayModal;
    $('payBackdrop').onclick = e => { if (e.target === $('payBackdrop')) closePayModal(); };

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeAuth(); closeConfirm(); closePayModal(); closeLangMenu(); }
    });

    window.addEventListener('scroll', updateHeaderCompact, { passive:true });
    window.addEventListener('resize', updateHeaderCompact);

    window.addEventListener('beforeunload', () => {
      try { if (unsub) unsub(); } catch (_) {}
      try { if (unsubNotif) unsubNotif(); } catch (_) {}
      clearInterval(timer);
    });
  }

  // ─── Boot ─────────────────────────────────────────────────────────────────
  async function boot() {
    applyTheme();
    bind();
    applyTexts();
    setCloud(tr('statusWait'), null);
    startTicker();
    updateHeaderCompact();

    if (!db || !auth) {
      setCloud(tr('statusErr'), false);
      toast('Firebase init failed', 'bad');
      return;
    }

    startRealtime();

    auth.onAuthStateChanged(async u => {
      currentUser = u || null;
      updateUserUI();

      if (currentUser && !$('nickInput').value.trim()) {
        try {
          const doc  = await db.collection('users').doc(String(currentUser.uid)).get();
          const nick = doc.exists ? (doc.data().nick || '') : '';
          if (nick) {
            $('nickInput').value = nick;
            localStorage.setItem(NICK_KEY, nick);
          }
        } catch (_) {}
      }
    });
  }

  boot();
})();
</script>
</body>
</html>
