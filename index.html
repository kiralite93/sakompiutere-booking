<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Sakompiutere Gaming — Live Hall</title>
  <meta name="theme-color" content="#0b1020" />
  <link rel="icon" href="data:," />

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    :root{
      --bg:#070a12;
      --card:#0d1324;
      --text:#edf3ff;
      --muted:#9aa7c7;
      --line:rgba(255,255,255,.09);
      --free:#34d399;
      --soon:#fbbf24;
      --busy:#fb7185;
      --accent:#6ee7ff;
      --accent2:#a78bfa;
      --shadow:0 18px 60px rgba(0,0,0,.45);
    }

    body[data-theme="light"]{
      --bg:#eef4ff;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#5b6b86;
      --line:rgba(15,23,42,.10);
      --free:#059669;
      --soon:#d97706;
      --busy:#e11d48;
      --accent:#0284c7;
      --accent2:#7c3aed;
      --shadow:0 18px 45px rgba(15,23,42,.10);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      color:var(--text);
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:
        radial-gradient(1000px 600px at 10% -10%, rgba(110,231,255,.12), transparent 60%),
        radial-gradient(900px 700px at 90% 0%, rgba(167,139,250,.14), transparent 60%),
        radial-gradient(1200px 700px at 50% 120%, rgba(52,211,153,.08), transparent 60%),
        var(--bg);
      overflow-x:hidden;
      transition:background .2s ease,color .2s ease;
    }
    body[data-theme="light"]{
      background:
        radial-gradient(1000px 600px at 10% -10%, rgba(2,132,199,.10), transparent 60%),
        radial-gradient(900px 700px at 90% 0%, rgba(124,58,237,.10), transparent 60%),
        radial-gradient(1200px 700px at 50% 120%, rgba(5,150,105,.08), transparent 60%),
        var(--bg);
    }

    .wrap{max-width:1320px;margin:0 auto;padding:14px}
    .glass{background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(12px)}
    body[data-theme="light"] .glass{background:linear-gradient(180deg, rgba(255,255,255,.88), rgba(255,255,255,.72))}

    header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;border-radius:22px;position:sticky;top:10px;z-index:20}
    .brand{display:flex;align-items:center;gap:12px;min-width:0}
    .logo{
      width:56px;
      height:56px;
      flex:0 0 56px;
      border-radius:14px;
      background-image:url("./logo.png");
      background-repeat:no-repeat;
      background-position:center;
      background-size:contain;
      background-color:transparent;
      border:none;
      box-shadow:none;
      overflow:hidden;
    }
    .sub{margin:4px 0 0;color:var(--muted);font-size:12px}
    .topbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:flex-end}
    .pill,.lang{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.04);font-size:12px;color:var(--muted)}
    body[data-theme="light"] .pill,
    body[data-theme="light"] .lang{background:rgba(255,255,255,.75)}
    .lang button,.btn,.mini{border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text);cursor:pointer;transition:.15s ease;font-weight:800}
    body[data-theme="light"] .lang button,
    body[data-theme="light"] .btn,
    body[data-theme="light"] .mini{background:rgba(255,255,255,.75)}
    .lang button{padding:7px 10px;border-radius:999px;background:transparent;color:var(--muted)}
    .lang button.active{background:rgba(110,231,255,.12);border-color:rgba(110,231,255,.45);color:var(--text)}
    body[data-theme="light"] .lang button.active{background:rgba(2,132,199,.12);border-color:rgba(2,132,199,.35)}
    .lang button:hover,.btn:hover,.mini:hover{transform:translateY(-1px);border-color:rgba(110,231,255,.45)}
    body[data-theme="light"] .lang button:hover,
    body[data-theme="light"] .btn:hover,
    body[data-theme="light"] .mini:hover{border-color:rgba(2,132,199,.35)}
    .dot{width:8px;height:8px;border-radius:999px;background:#fff2}
    .dot.ok{background:var(--free);box-shadow:0 0 0 0 rgba(52,211,153,.35);animation:pulse 1.8s infinite}
    .dot.err{background:var(--busy)}
    @keyframes pulse{70%{box-shadow:0 0 0 10px rgba(52,211,153,0)}100%{box-shadow:0 0 0 0 rgba(52,211,153,0)}}

    .layout{display:grid;grid-template-columns:1fr 360px;gap:16px;margin-top:14px}
    @media (max-width:1120px){.layout{grid-template-columns:1fr}}
    .panel{border-radius:24px}
    .panelHead{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:12px;align-items:center}
    .panelTitle{font-size:15px;font-weight:900}
    .panelBody{padding:16px}
    .actions{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px}
    .btn{padding:11px 14px;border-radius:14px}
    .btn.primary{background:linear-gradient(180deg, rgba(110,231,255,.18), rgba(167,139,250,.12));border-color:rgba(110,231,255,.45)}
    body[data-theme="light"] .btn.primary{background:linear-gradient(180deg, rgba(2,132,199,.12), rgba(124,58,237,.10));border-color:rgba(2,132,199,.35)}
    .btn.ghost{background:transparent}
    .btn.bad{background:rgba(251,113,133,.10);border-color:rgba(251,113,133,.28)}
    .notice{border:1px dashed rgba(110,231,255,.3);padding:12px 13px;border-radius:16px;background:rgba(110,231,255,.06);font-size:12px;color:var(--muted);line-height:1.45;margin-bottom:14px}
    body[data-theme="light"] .notice{border-color:rgba(2,132,199,.20);background:rgba(2,132,199,.06)}
    .toast{margin-bottom:12px;border-radius:16px;padding:12px 13px;border:1px solid var(--line);background:rgba(255,255,255,.04);font-size:12px}
    body[data-theme="light"] .toast{background:rgba(255,255,255,.72)}
    .toast.good{border-color:rgba(52,211,153,.28);background:rgba(52,211,153,.08)}
    .toast.bad{border-color:rgba(251,113,133,.28);background:rgba(251,113,133,.08)}
    .toast.warn{border-color:rgba(251,191,36,.28);background:rgba(251,191,36,.08)}
    .hidden{display:none !important}

    .topStats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
    .stat{padding:12px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.03)}
    body[data-theme="light"] .stat{background:rgba(255,255,255,.72)}
    .stat b{display:block;font-size:18px;margin-top:4px}
    .stat span{font-size:11px;color:var(--muted)}
    @media (max-width:760px){.topStats{grid-template-columns:repeat(2,1fr)}}

    .hall{display:grid;grid-template-columns:1fr 80px 1fr;gap:14px;align-items:start}
    .side{display:grid;gap:10px}
    .aisle{min-height:100%;border-radius:20px;border:1px dashed rgba(255,255,255,.08);background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;letter-spacing:.18em;text-transform:uppercase;writing-mode:vertical-rl;transform:rotate(180deg);padding:14px 0}
    body[data-theme="light"] .aisle{border-color:rgba(15,23,42,.08);background:linear-gradient(180deg, rgba(255,255,255,.55), rgba(255,255,255,.35))}
    @media (max-width:900px){
      .hall{grid-template-columns:1fr 1fr}
      .aisle{display:none}
    }

    .pc{position:relative;padding:14px;border-radius:20px;border:1px solid var(--line);background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));overflow:hidden;cursor:pointer;transition:.18s ease}
    body[data-theme="light"] .pc{background:linear-gradient(180deg, rgba(255,255,255,.88), rgba(255,255,255,.72))}
    .pc:hover{transform:translateY(-2px)}
    .pc.active{border-color:rgba(110,231,255,.55);box-shadow:0 0 0 3px rgba(110,231,255,.08)}
    body[data-theme="light"] .pc.active{border-color:rgba(2,132,199,.35);box-shadow:0 0 0 3px rgba(2,132,199,.08)}
    .pc.selectedMulti{box-shadow:0 0 0 3px rgba(167,139,250,.13), inset 0 0 0 1px rgba(167,139,250,.28)}
    .pc.free{box-shadow:inset 0 0 0 1px rgba(52,211,153,.14)}
    .pc.soon{box-shadow:inset 0 0 0 1px rgba(251,191,36,.14)}
    .pc.busy{box-shadow:inset 0 0 0 1px rgba(251,113,133,.14)}
    .pc::before{content:"";position:absolute;inset:-20% auto auto -10%;width:160px;height:110px;border-radius:999px;filter:blur(18px);opacity:.3}
    .pc.free::before{background:rgba(52,211,153,.25)}
    .pc.soon::before{background:rgba(251,191,36,.22)}
    .pc.busy::before{background:rgba(251,113,133,.22)}
    .pcTop{display:flex;justify-content:space-between;gap:10px;align-items:start}
    .pcName{font-size:17px;font-weight:1000;letter-spacing:.02em}
    .statusTag{font-size:11px;font-weight:900;padding:7px 9px;border-radius:999px;border:1px solid var(--line);white-space:nowrap}
    .statusTag.free{color:var(--free);background:rgba(52,211,153,.09);border-color:rgba(52,211,153,.25)}
    .statusTag.soon{color:var(--soon);background:rgba(251,191,36,.09);border-color:rgba(251,191,36,.25)}
    .statusTag.busy{color:var(--busy);background:rgba(251,113,133,.09);border-color:rgba(251,113,133,.25)}
    .pcMeta{margin-top:10px;display:grid;gap:6px;font-size:13px;color:var(--muted)}
    .pcMeta b{color:var(--text)}
    .progress{height:8px;border-radius:999px;background:rgba(255,255,255,.06);overflow:hidden;margin-top:6px}
    body[data-theme="light"] .progress{background:rgba(15,23,42,.07)}
    .bar{height:100%;background:linear-gradient(90deg, rgba(251,113,133,.8), rgba(251,191,36,.8));width:0%}
    .pcBottom{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:12px}
    .mini{padding:8px 10px;border-radius:12px;font-size:12px}
    .mini.primary{background:linear-gradient(180deg, rgba(110,231,255,.18), rgba(167,139,250,.10));border-color:rgba(110,231,255,.42)}
    body[data-theme="light"] .mini.primary{background:linear-gradient(180deg, rgba(2,132,199,.12), rgba(124,58,237,.08));border-color:rgba(2,132,199,.32)}
    .mini.soft{background:rgba(167,139,250,.10);border-color:rgba(167,139,250,.22)}

    .sideCard{border-radius:24px;position:sticky;top:86px}
    @media (max-width:1120px){.sideCard{position:static}}
    .bigStatus{padding:14px;border-radius:18px;border:1px solid var(--line);background:rgba(255,255,255,.03);margin-bottom:14px}
    body[data-theme="light"] .bigStatus{background:rgba(255,255,255,.72)}
    .bigStatus h3{margin:0 0 6px;font-size:20px}
    .quickList{display:grid;gap:10px}
    .quickItem{border:1px solid var(--line);border-radius:18px;padding:12px;background:rgba(255,255,255,.03);display:flex;justify-content:space-between;gap:10px;align-items:center}
    body[data-theme="light"] .quickItem{background:rgba(255,255,255,.72)}
    .quickItem small{display:block;color:var(--muted);margin-top:3px}
    .chipRow{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
    .chip{padding:7px 10px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.04);font-size:12px;color:var(--muted)}
    body[data-theme="light"] .chip{background:rgba(255,255,255,.78)}
    .chip b{color:var(--text)}

    .formRow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
    @media (max-width:520px){.formRow{grid-template-columns:1fr}}
    label{display:block;font-size:12px;color:var(--muted);margin:0 0 6px}
    input,select{width:100%;padding:11px 12px;border-radius:14px;border:1px solid var(--line);background:rgba(0,0,0,.22);color:var(--text);outline:none}
    body[data-theme="light"] input,
    body[data-theme="light"] select{background:#fff}
    input:focus,select:focus{border-color:rgba(110,231,255,.5);box-shadow:0 0 0 3px rgba(110,231,255,.1)}
    body[data-theme="light"] input:focus,
    body[data-theme="light"] select:focus{border-color:rgba(2,132,199,.35);box-shadow:0 0 0 3px rgba(2,132,199,.10)}
    .small{font-size:12px}.muted{color:var(--muted)}

    .myBookings{display:grid;gap:10px;margin-top:14px}
    .bookingItem{padding:12px;border-radius:18px;border:1px solid var(--line);background:rgba(255,255,255,.03);display:flex;justify-content:space-between;gap:12px;align-items:center}
    body[data-theme="light"] .bookingItem{background:rgba(255,255,255,.72)}
    .bookingItem .meta{font-size:12px;color:var(--muted);margin-top:4px}

    .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;padding:16px;z-index:80}
    .backdrop.show{display:flex}
    .modal{width:min(560px,100%);border-radius:24px}
    .modalHead{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:10px}
    .modalBody{padding:18px}
    .auth{display:grid;gap:10px}

    .mobileBar{display:none}
    @media (max-width:700px){
      .wrap{padding:10px}
      header{position:static;padding:12px}
      h1{font-size:16px}
      .sub{font-size:11px}
      .topbar{justify-content:flex-start}
      .pill{padding:7px 9px}
      .panelHead,.panelBody{padding:12px}
      .pc{padding:12px}
      .pcName{font-size:15px}
      .statusTag{font-size:10px;padding:6px 8px}
      .quickItem{padding:10px}
      .mobileBar{display:flex;position:sticky;bottom:8px;z-index:35;padding:8px;gap:8px;border-radius:18px;margin-top:12px;backdrop-filter:blur(14px)}
      .mobileBar .btn{flex:1;padding:12px 10px}
    }
  </style>
</head>

        if (multiMode) {
          if (!selectedPCs.size) return toast(tr('chooseAtLeastOne'), 'warn');
          showCustom();
        } else {
          if (s.state === 'free') openQuickConfirm([pc], new Date(), 60);
          else openNearestConfirm([pc]);
        }
      };
    }, 0);
    return el;
  }

  function renderHall() {
    $('leftSide').innerHTML = '';
    $('rightSide').innerHTML = '';
    LEFT.forEach(pc => { const c = renderCard(pc); if (c) $('leftSide').appendChild(c); });
    RIGHT.forEach(pc => { const c = renderCard(pc); if (c) $('rightSide').appendChild(c); });
  }

  function renderStats() {
    const freeCount = ALL.filter(pc => getPcStatus(pc).state === 'free').length;
    const busyCount = ALL.length - freeCount;
    $('statAll').textContent = String(ALL.length);
    $('statFree').textContent = String(freeCount);
    $('statBusy').textContent = String(busyCount);
    $('statSelected').textContent = String(selectedPCs.size);
  }

  function renderSelected() {
    $('selectedChips').innerHTML = '';
    if (!selectedPCs.size) {
      $('selectedName').textContent = '—';
      $('selectedStatus').textContent = multiMode ? tr('multiSelectHint') : tr('singleSelectHint');
      $('selectedActions').classList.add('hidden');
      buildCustomTimes();
      return;
    }

    $('selectedActions').classList.remove('hidden');

    const names = [...selectedPCs];
    $('selectedName').textContent = names.length === 1 ? names[0] : `${names.length} ${tr('pcs')}`;
    $('selectedStatus').textContent = multiMode
      ? `${tr('selectedMany')}: ${names.length}. ${tr('multiHelp')}`
      : tr('selectedOne');

    names.forEach(pc => {
      const chip = document.createElement('div');
      chip.className = 'chip';
      chip.innerHTML = `<b>${esc(pc)}</b>`;
      $('selectedChips').appendChild(chip);
    });

    const actions = [];
    if (names.length === 1 && !multiMode) {
      const s = getPcStatus(names[0]);
      if (s.state === 'free') {
        actions.push({ label:tr('play1'), small:`${tr('starts')}: ${fmtHM(new Date())}`, fn:()=>openQuickConfirm(names, new Date(), 60) });
        actions.push({ label:tr('play2'), small:`${tr('starts')}: ${fmtHM(new Date())}`, fn:()=>openQuickConfirm(names, new Date(), 120) });
        actions.push({ label:tr('play3'), small:`${tr('starts')}: ${fmtHM(new Date())}`, fn:()=>openQuickConfirm(names, new Date(), 180) });
      } else {
        actions.push({ label:tr('bookAt'), small:`${tr('starts')}: ${fmtHM(new Date(s.freeAtMs))}`, fn:()=>openNearestConfirm(names) });
        actions.push({ label:tr('queue'), small:tr('queueHint'), fn:()=>openNearestConfirm(names) });
      }
    } else {
      actions.push({ label:tr('group2'), small:`${tr('pcs')}: ${names.join(', ')}`, fn:()=>openQuickConfirm(names, new Date(), 120) });
      actions.push({ label:tr('group3'), small:`${tr('pcs')}: ${names.join(', ')}`, fn:()=>openQuickConfirm(names, new Date(), 180) });
    }
    actions.push({ label:tr('exact'), small:tr('saveNickHint'), fn:()=>showCustom() });

    $('quickActions').innerHTML = '';
    actions.forEach((a,i) => {
      const div = document.createElement('div');
      div.className = 'quickItem';
      div.innerHTML = `<div><b>${esc(a.label)}</b><small>${esc(a.small)}</small></div><button class="mini ${i===0?'primary':''}">→</button>`;
      div.querySelector('button').onclick = a.fn;
      $('quickActions').appendChild(div);
    });

    buildCustomTimes();
  }

  function clampToOpen(date) {
    const d = new Date(date);
    const base = new Date(d.getFullYear(), d.getMonth(), d.getDate(), 0,0,0,0);
    const open = addMinutes(base, WORK_START);
    const close = addDays(base, 1);
    close.setHours(Math.floor(WORK_END_NEXTDAY / 60), WORK_END_NEXTDAY % 60, 0, 0);
    if (d < open) return open;
    if (d > close) return null;
    return d;
  }

  function roundUp(date) {
    const d = new Date(date);
    d.setSeconds(0,0);
    const m = d.getMinutes();
    const extra = (SLOT_STEP - (m % SLOT_STEP)) % SLOT_STEP;
    if (extra) d.setMinutes(m + extra);
    return d;
  }

  function isFreeRangeForAll(pcs, startMs, endMs) {
    return pcs.every(pc => !getPcBookings(pc).some(b => overlaps(startMs, endMs, b.startAtMs, b.endAtMs)));
  }

  function findNearestForAll(pcs, earliest, dur) {
    let cur = roundUp(clampToOpen(earliest) || earliest);
    const until = addDays(new Date(), 5).getTime();
    while (cur && cur.getTime() < until) {
      const end = addMinutes(cur, dur);
      const a = clampToOpen(cur), b = clampToOpen(end);
      if (a && b && isFreeRangeForAll(pcs, cur.getTime(), end.getTime())) return cur;
      cur = addMinutes(cur, SLOT_STEP);
    }
    return null;
  }

  const openAuth = () => $('authBackdrop').classList.add('show');
  const closeAuth = () => $('authBackdrop').classList.remove('show');
  const openConfirm = () => $('confirmBackdrop').classList.add('show');
  const closeConfirm = () => $('confirmBackdrop').classList.remove('show');
  const needLogin = () => { openAuth(); $('authMsg').textContent = tr('loginNeeded'); };

  function openQuickConfirm(pcs, start, dur) {
    if (!currentUser) return needLogin();
    const nick = ($('nickInput').value || '').trim() || localStorage.getItem(NICK_KEY) || '';
    if (!nick) return showCustom(true);
    const safe = findNearestForAll(pcs, start, dur);
    if (!safe) return toast(tr('taken'), 'bad');
    pendingBooking = {
      pcs:[...pcs],
      startAtMs:safe.getTime(),
      endAtMs:addMinutes(safe, dur).getTime(),
      nick,
      note:($('noteInput').value || '').trim()
    };
    fillConfirm();
    openConfirm();
  }

  function openNearestConfirm(pcs) {
    if (!currentUser) return needLogin();
    const nick = ($('nickInput').value || '').trim() || localStorage.getItem(NICK_KEY) || '';
    if (!nick) return showCustom(true);
    const safe = findNearestForAll(pcs, new Date(), 120);
    if (!safe) return toast(tr('taken'), 'bad');
    pendingBooking = {
      pcs:[...pcs],
      startAtMs:safe.getTime(),
      endAtMs:addMinutes(safe, 120).getTime(),
      nick,
      note:($('noteInput').value || '').trim()
    };
    fillConfirm();
    openConfirm();
  }

  function fillConfirm() {
    if (!pendingBooking) return;
    const s = new Date(pendingBooking.startAtMs), e = new Date(pendingBooking.endAtMs);
    $('confirmInfo').innerHTML = `
      <b>${esc(tr('pcs'))}:</b> ${esc(pendingBooking.pcs.join(', '))}<br>
      <b>${esc(tr('starts'))}:</b> ${esc(toISODate(s))} ${esc(fmtHM(s))}<br>
      <b>${esc(tr('ends'))}:</b> ${esc(toISODate(e))} ${esc(fmtHM(e))}<br>
      <b>${esc(tr('nick'))}:</b> ${esc(pendingBooking.nick)}
      ${pendingBooking.note ? `<br><b>${esc(tr('note'))}:</b> ${esc(pendingBooking.note)}` : ''}
    `;
  }

  function showCustom(focusNick=false) {
    if (!selectedPCs.size) return toast(tr('chooseAtLeastOne'), 'warn');
    $('customSection').classList.remove('hidden');
    $('customDate').value = $('customDate').value || toISODate(new Date());
    buildCustomTimes();
    if (focusNick) setTimeout(() => $('nickInput').focus(), 50);
  }

  function hideCustom() { $('customSection').classList.add('hidden'); }

  function buildCustomTimes() {
    const sel = $('customTime');
    sel.innerHTML = '';
    if (!selectedPCs.size) {
      const o = document.createElement('option');
      o.value = '';
      o.textContent = '—';
      sel.appendChild(o);
      return;
    }
    const pcs = [...selectedPCs];
    const dateKey = $('customDate').value || toISODate(new Date());
    const dur = Number($('customDuration').value || 60);

    const [y,m,d] = dateKey.split('-').map(Number);
    const base = new Date(y, m-1, d, 0, 0, 0, 0);
    const open = addMinutes(base, WORK_START);
    const close = addDays(base, 1);
    close.setHours(Math.floor(WORK_END_NEXTDAY / 60), WORK_END_NEXTDAY % 60, 0, 0);

    for (let cur = new Date(open); addMinutes(cur, dur) <= close; cur = addMinutes(cur, SLOT_STEP)) {
      const end = addMinutes(cur, dur);
      if (cur.getTime() < Date.now()) continue;
      if (!isFreeRangeForAll(pcs, cur.getTime(), end.getTime())) continue;
      const o = document.createElement('option');
      o.value = String(cur.getTime());
      o.textContent = `${fmtHM(cur)} → ${fmtHM(end)}`;
      sel.appendChild(o);
    }

    if (!sel.children.length) {
      const o = document.createElement('option');
      o.value = '';
      o.textContent = '—';
      sel.appendChild(o);
    }
  }

  async function createBooking(data) {
    if (!currentUser) return needLogin();
    const pcs = [...new Set((data.pcs || []).map(String))].slice(0, 10);
    const startAtMs = Number(data.startAtMs);
    const endAtMs = Number(data.endAtMs);
    const nick = String(data.nick || '').trim().slice(0, 32);
    const note = String(data.note || '').trim().slice(0, 120);
    if (!pcs.length) return toast(tr('chooseAtLeastOne'), 'warn');
    if (!nick) return toast(tr('enterNick'), 'warn');
    if (!isFreeRangeForAll(pcs, startAtMs, endAtMs)) return toast(tr('taken'), 'bad');

    try {
      await db.collection('users').doc(String(currentUser.uid)).set({ nick, updatedAtMs:Date.now() }, { merge:true });
      const batch = db.batch();
      pcs.forEach(pc => {
        const ref = db.collection('bookings').doc();
        batch.set(ref, {
          uid:String(currentUser.uid),
          userEmail:String(currentUser.email || ''),
          nick,
          pc,
          note,
          startAtMs,
          endAtMs,
          createdAtMs:Date.now()
        });
      });
      await batch.commit();
      localStorage.setItem(NICK_KEY, nick);
      $('nickInput').value = nick;
      toast(tr('booked'), 'good');
      closeConfirm();
      pendingBooking = null;
      $('mySection').scrollIntoView({behavior:'smooth', block:'start'});
      renderMyBookings();
      renderAdminBookings();
    } catch(e) {
      handleFsError(e);
    }
  }

  function renderMyBookings() {
    const box = $('myBookings');
    if (!box) return;
    box.innerHTML = '';
    if (!currentUser) {
      box.innerHTML = `<div class="notice">${esc(tr('authNeed'))}</div>`;
      return;
    }
    const mine = allBookings.filter(b => b.uid === currentUser.uid && b.endAtMs > Date.now() - 86400000).sort((a,b)=>a.startAtMs-b.startAtMs);
    if (!mine.length) {
      box.innerHTML = `<div class="notice">${esc(tr('empty'))}</div>`;
      return;
    }
    mine.forEach(b => {
      const s = new Date(b.startAtMs), e = new Date(b.endAtMs);
      const item = document.createElement('div');
      item.className = 'bookingItem';
      item.innerHTML = `<div><b>${esc(b.pc)}</b><div class="meta">${esc(toISODate(s))} • ${esc(fmtHM(s))} → ${esc(fmtHM(e))}</div></div><button class="mini bad">${esc(tr('remove'))}</button>`;
      item.querySelector('button').onclick = async () => {
        if (!confirm(tr('remove') + '?')) return;
        try { await db.collection('bookings').doc(b.id).delete(); toast(tr('canceled'), 'good'); }
        catch(e) { handleFsError(e); }
      };
      box.appendChild(item);
    });
  }

  function renderAdminBookings() {
    const panel = $('adminSection');
    const box = $('adminBookings');
    panel.classList.toggle('hidden', !isAdmin);
    if (!isAdmin) return;
    box.innerHTML = '';
    const list = allBookings.filter(b => b.endAtMs > Date.now()).sort((a,b)=>a.startAtMs-b.startAtMs);
    if (!list.length) {
      box.innerHTML = `<div class="notice">${esc(tr('empty'))}</div>`;
      return;
    }
    list.forEach(b => {
      const s = new Date(b.startAtMs), e = new Date(b.endAtMs);
      const item = document.createElement('div');
      item.className = 'bookingItem';
      item.innerHTML = `<div><b>${esc(b.pc)}</b><div class="meta">${esc(b.nick || '')} • ${esc(toISODate(s))} • ${esc(fmtHM(s))} → ${esc(fmtHM(e))}</div></div><button class="mini bad">${esc(tr('remove'))}</button>`;
      item.querySelector('button').onclick = async () => {
        if (!confirm(tr('remove') + '?')) return;
        try { await db.collection('bookings').doc(b.id).delete(); toast(tr('canceled'), 'good'); }
        catch(e) { handleFsError(e); }
      };
      box.appendChild(item);
    });
  }

  function toggleMy() {
    $('mySection').scrollIntoView({behavior:'smooth', block:'start'});
    renderMyBookings();
  }

  function updateUserUI() {
    $('userPill').textContent = currentUser ? (currentUser.email || currentUser.uid.slice(0,6)) : '—';
    isAdmin = !!(currentUser && ADMIN_EMAILS.includes(String(currentUser.email || '').toLowerCase()));
    $('openAuthBtn').classList.toggle('hidden', !!currentUser);
    $('logoutBtn').classList.toggle('hidden', !currentUser);
    if (currentUser) $('authMsg').textContent = tr('authOk') + (currentUser.email || currentUser.uid.slice(0,6));
    renderAdminBookings();
  }

  function findFreeNow() {
    const free = ALL.filter(pc => getPcStatus(pc).state === 'free');
    if (!free.length) return toast(tr('noFree'), 'warn');
    if (multiMode) {
      selectedPCs = new Set(free.slice(0, 3));
      selectedPc = [...selectedPCs][0] || null;
    } else {
      selectedPc = free[0];
      selectedPCs = new Set([free[0]]);
    }
    renderStats();
    renderHall();
    renderSelected();
  }

  async function startRealtime() {
    if (unsub) { try { unsub(); } catch(_) {} }
    const { start, end } = dayBoundsNow();
    unsub = db.collection('bookings')
      .where('startAtMs', '<', end)
      .onSnapshot(snap => {
        allBookings = snap.docs
          .map(d => ({ id:d.id, ...d.data() }))
          .map(x => ({ ...x, startAtMs:Number(x.startAtMs||0), endAtMs:Number(x.endAtMs||0) }))
          .filter(x => x.endAtMs > start);
        setCloud(tr('statusLive'), true);
        renderStats();
        renderHall();
        renderSelected();
        renderMyBookings();
        renderAdminBookings();
      }, handleFsError);
  }

  function startTicker() {
    clearInterval(timer);
    timer = setInterval(() => {
      renderStats();
      renderHall();
      renderSelected();
    }, 30000);
  }

  function bind() {
    $('lang_ru').onclick = () => { lang='ru'; localStorage.setItem(LANG_KEY, lang); setLangUI(); };
    $('lang_en').onclick = () => { lang='en'; localStorage.setItem(LANG_KEY, lang); setLangUI(); };
    $('lang_ka').onclick = () => { lang='ka'; localStorage.setItem(LANG_KEY, lang); setLangUI(); };

    $('themeToggleBtn').onclick = () => {
      theme = theme === 'dark' ? 'light' : 'dark';
      localStorage.setItem(THEME_KEY, theme);
      applyTheme();
    };

    $('filterAll').onclick = () => { currentFilter='all'; renderHall(); };
    $('filterFree').onclick = () => { currentFilter='free'; renderHall(); };
    $('filterSoon').onclick = () => { currentFilter='soon'; renderHall(); };

    $('findNowBtn').onclick = findFreeNow;
    $('toggleMultiBtn').onclick = () => {
      multiMode = !multiMode;
      if (!multiMode && selectedPCs.size > 1) {
        const first = [...selectedPCs][0];
        selectedPCs = new Set(first ? [first] : []);
        selectedPc = first || null;
      }
      setLangUI();
    };
    $('clearSelectedBtn').onclick = () => {
      selectedPCs.clear();
      selectedPc = null;
      renderStats();
      renderHall();
      renderSelected();
      buildCustomTimes();
    };

    $('openMyBtn').onclick = toggleMy;
    $('mobileMyBtn').onclick = toggleMy;
    $('mobileBookBtn').onclick = () => {
      if (!selectedPCs.size) return toast(tr('chooseAtLeastOne'), 'warn');
      showCustom();
      $('customSection').scrollIntoView({behavior:'smooth', block:'start'});
    };

    $('openAdminBtn').onclick = () => {
      if (!currentUser) return toast(tr('loginNeeded'), 'warn');
      if (!isAdmin) return toast(tr('adminDenied'), 'bad');
      $('adminSection').scrollIntoView({behavior:'smooth', block:'start'});
    };

    $('openAuthBtn').onclick = () => $('authBackdrop').classList.add('show');
    $('logoutBtn').onclick = async () => { try { await auth.signOut(); } catch(_){} };

    $('closeAuthBtn').onclick = () => $('authBackdrop').classList.remove('show');
    $('authBackdrop').onclick = e => { if (e.target === $('authBackdrop')) $('authBackdrop').classList.remove('show'); };
    $('closeConfirmBtn').onclick = closeConfirm;
    $('cancelConfirmBtn').onclick = closeConfirm;
    $('confirmBackdrop').onclick = e => { if (e.target === $('confirmBackdrop')) closeConfirm(); };

    $('customDate').value = toISODate(new Date());
    $('nickInput').value = localStorage.getItem(NICK_KEY) || '';
    $('nickInput').addEventListener('input', () => localStorage.setItem(NICK_KEY, $('nickInput').value.trim()));
    $('customDate').addEventListener('change', buildCustomTimes);
    $('customDuration').addEventListener('change', buildCustomTimes);

    $('hideCustomBtn').onclick = hideCustom;
    $('bookCustomBtn').onclick = () => {
      if (!selectedPCs.size) return toast(tr('chooseAtLeastOne'), 'warn');
      const startAtMs = Number($('customTime').value || 0);
      if (!startAtMs) return toast(tr('pickTime'), 'warn');
      const duration = Number($('customDuration').value || 60);
      pendingBooking = {
        pcs:[...selectedPCs],
        startAtMs,
        endAtMs:startAtMs + duration * 60000,
        nick:($('nickInput').value || '').trim(),
        note:($('noteInput').value || '').trim()
      };
      fillConfirm();
      openConfirm();
    };

    $('confirmBookBtn').onclick = () => { if (pendingBooking) createBooking(pendingBooking); };

    $('loginBtn').onclick = async () => {
      const email = ($('authEmail').value || '').trim();
      const pass = ($('authPass').value || '').trim();
      if (!email || !pass) return $('authMsg').textContent = tr('loginErr');
      try { await auth.signInWithEmailAndPassword(email, pass); $('authBackdrop').classList.remove('show'); }
      catch(e) { console.error(e); $('authMsg').textContent = e.message || tr('fsErr'); }
    };

    $('registerBtn').onclick = async () => {
      const email = ($('authEmail').value || '').trim();
      const pass = ($('authPass').value || '').trim();
      if (!email || !pass) return $('authMsg').textContent = tr('loginErr');
      try { await auth.createUserWithEmailAndPassword(email, pass); $('authBackdrop').classList.remove('show'); }
      catch(e) { console.error(e); $('authMsg').textContent = e.message || tr('fsErr'); }
    };

    $('resetBtn').onclick = async () => {
      const email = ($('authEmail').value || '').trim();
      if (!email) return $('authMsg').textContent = tr('loginErr');
      try { await auth.sendPasswordResetEmail(email); $('authMsg').textContent = tr('resetSent'); }
      catch(e) { console.error(e); $('authMsg').textContent = e.message || tr('fsErr'); }
    };

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        $('authBackdrop').classList.remove('show');
        closeConfirm();
      }
    });
  }

  async function boot() {
    applyTheme();
    setLangUI();
    bind();
    setCloud(tr('statusOk'), true);
    startTicker();
    if (db) startRealtime();

    auth.onAuthStateChanged(async u => {
      currentUser = u || null;
      updateUserUI();
      renderMyBookings();
      if (currentUser && !$('nickInput').value.trim()) {
        try {
          const doc = await db.collection('users').doc(String(currentUser.uid)).get();
          const nick = doc.exists ? (doc.data().nick || '') : '';
          if (nick) {
            $('nickInput').value = nick;
            localStorage.setItem(NICK_KEY, nick);
          }
        } catch(_) {}
      }
    });
  }

  boot();
})();
</script>
</body>
</html>
