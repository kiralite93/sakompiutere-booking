};

const isHappyHour = () => { const h = new Date().getHours(); return (h >= 14 && h < 16) || (h >= 22 && h < 24); };
const getTier = h => { for (let i = TIERS.length - 1; i >= 0; i--) if (h >= TIERS[i].hrs) return TIERS[i]; return TIERS[0]; };
const getNextTier = h => { for (let i = 0; i < TIERS.length; i++) if (h < TIERS[i].hrs) return TIERS[i]; return null; };

const calcPrice = (hrs, user) => {
  const tier = getTier(user?.hr || 0);
  const base = hrs * RATE;
  const final = Math.round(base * (1 - tier.disc / 100) * 100) / 100;
  const coins = Math.round(hrs * COIN_RATE * tier.mul * (isHappyHour() ? 2 : 1));
  return { base, disc: tier.disc, final, coins };
};

@keyframes modalIn { from { opacity:0; transform:translate(-50%,-50%) scale(.92); } to { opacity:1; transform:translate(-50%,-50%) scale(1); } }
.sheet-bar { width:32px; height:3px; background:var(--s4); border-radius:2px; margin:0 auto 12px; }
.sheet h3 { font-family:Nunito; font-weight:800; font-size:16px; margin-bottom:10px; }

/* Stat bar */
.stat-bar { display:flex; gap:8px; margin-bottom:8px; }

/* Filter tabs */
.filter-row { display:flex; gap:4px; margin-bottom:8px; flex-wrap:wrap; }
.ftab { padding:4px 11px; border-radius:16px; background:var(--s2); border:1px solid var(--s3); color:var(--tx2); font-size:10px; font-weight:600; cursor:pointer; font-family:'DM Sans'; }
.ftab:active { transform:scale(.93); }
.ftab.act { background:var(--t1); color:var(--teal); border-color:rgba(78,205,196,.25); }

/* Wings layout */

/* PC Card */
.pc-card { background:var(--s2); border:1.5px solid var(--s3); border-radius:12px; padding:9px; position:relative; overflow:hidden; cursor:pointer; animation:popIn .3s ease backwards; transition:all .1s; display:flex; flex-direction:column; height:100%; }
.pc-card:active { transform:scale(.95); }
.pc-card .pc-icon { font-size:24px; margin-bottom:1px; }
.pc-card .pc-name { font-family:Nunito; font-weight:800; font-size:12px; }
.pc-card .pc-status { font-size:9px; font-weight:700; margin-top:1px; }
.pc-card .pc-user { font-size:8px; color:var(--tx2); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.pc-card .pc-prog { height:2px; background:var(--s3); border-radius:1px; margin-top:3px; overflow:hidden; }
.pc-card .pc-prog-fill { height:100%; border-radius:1px; background:linear-gradient(90deg,var(--coral),var(--gold)); }
.pc-card .pc-time { font-size:7px; color:var(--tx2); margin-top:1px; text-align:right; }
.pc-card .pc-queue { font-size:8px; color:var(--lav); margin-top:2px; font-weight:600; }
.pc-card .pc-badge { position:absolute; top:3px; right:5px; font-size:7px; padding:0 4px; border-radius:5px; font-weight:800; }
.pc-card.free-glow { animation:breathe 3s infinite; }
.pc-card.my-active { border-color:var(--teal) !important; box-shadow:0 0 10px rgba(78,205,196,.15); }
.pc-card.multi-sel { border-color:var(--teal) !important; background:rgba(78,205,196,.05); box-shadow:0 0 12px rgba(78,205,196,.12); }

/* Happy hour bar */
.happy-bar { background:linear-gradient(90deg,rgba(255,217,61,.08),rgba(255,107,107,.04)); border:1px solid rgba(255,217,61,.12); border-radius:10px; padding:6px 12px; text-align:center; font-size:10px; font-weight:800; color:var(--gold); margin-bottom:8px; font-family:Nunito; }

/* Booking card */
.bk-card { background:var(--s2); border:1px solid var(--s3); border-radius:10px; padding:8px; margin-bottom:5px; display:flex; align-items:center; gap:7px; transition:all .12s; }
.bk-card:hover { background:rgba(28,35,51,.8); }

/* Messages */
.msg-list { display:flex; flex-direction:column; gap:4px; padding:4px 0; overflow-y:auto; }
.msg { max-width:80%; padding:7px 10px; border-radius:12px; font-size:11px; line-height:1.35; word-break:break-word; }
.msg-me { align-self:flex-end; background:linear-gradient(135deg,rgba(78,205,196,.12),rgba(56,189,248,.06)); border:1px solid rgba(78,205,196,.12); border-bottom-right-radius:3px; }
.msg-them { align-self:flex-start; background:var(--s2); border:1px solid var(--s3); border-bottom-left-radius:3px; }
.msg-sys { align-self:center; background:var(--l1); border:1px solid rgba(192,132,252,.08); text-align:center; font-size:9px; color:var(--lav); border-radius:8px; }
.msg .msg-time { font-size:7px; color:var(--tx2); margin-top:1px; }
.msg .msg-sender { font-size:8px; color:var(--teal); font-weight:600; margin-bottom:1px; }
.chat-input { display:flex; gap:5px; padding-top:5px; border-top:1px solid var(--s3); }
.chat-input input { flex:1; }

/* User row */
.user-row { display:flex; align-items:center; gap:7px; padding:7px 9px; background:var(--s2); border:1px solid var(--s3); border-radius:10px; margin-bottom:4px; cursor:pointer; }
.user-row:active { background:var(--s3); }

/* Topic card */
.topic-card { background:var(--s2); border:1px solid var(--s3); border-radius:10px; padding:9px; margin-bottom:5px; cursor:pointer; }
.topic-card:active { background:rgba(37,45,64,.6); }
.vote-btn { display:inline-flex; align-items:center; gap:2px; background:var(--s3); border:none; color:var(--tx2); padding:1px 6px; border-radius:6px; font-size:9px; cursor:pointer; font-weight:700; }
.vote-btn.voted { background:var(--t1); color:var(--teal); }
.vote-btn:active { transform:scale(.9); }

/* Profile */
.tier-hero { border-radius:14px; padding:16px; text-align:center; border:1px solid var(--s3); }
.stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:5px; margin:8px 0; }
.stat-card { background:var(--s2); border:1px solid var(--s3); border-radius:10px; padding:8px; text-align:center; }
.stat-card .sv { font-family:Nunito; font-weight:800; font-size:16px; }
.stat-card .sl { font-size:8px; color:var(--tx2); font-weight:600; margin-top:1px; }
.daily-box { border:2px dashed rgba(255,217,61,.3); border-radius:10px; padding:10px; display:flex; align-items:center; gap:8px; margin:8px 0; background:var(--g1); cursor:pointer; }
.streak-row { display:flex; align-items:center; gap:8px; padding:8px 0; }
.streak-dots { display:flex; gap:3px; }
.streak-dot { width:8px; height:8px; border-radius:50%; background:var(--s3); }
.streak-dot.on { background:var(--gold); box-shadow:0 0 5px rgba(255,217,61,.35); }

/* Dashboard */
.dash-grid { display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-bottom:10px; }
.dash-card { border-radius:12px; padding:10px; border:1px solid var(--s3); }
.dash-card .dv { font-family:Nunito; font-weight:900; font-size:20px; }
.dash-card .dl { font-size:8px; color:var(--tx2); font-weight:600; }
.usage-bar { display:flex; align-items:center; gap:5px; margin-bottom:4px; }
.usage-bar .un { font-size:9px; width:68px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.usage-bar .ub { flex:1; height:3px; background:var(--s3); border-radius:2px; overflow:hidden; }
.usage-bar .ub .uf { height:100%; border-radius:2px; }

/* Misc */
.confetti { position:fixed; top:-20px; font-size:20px; z-index:999; animation:confettiDrop 3s ease-in forwards; pointer-events:none; }
.toast { position:fixed; top:56px; left:50%; transform:translateX(-50%); background:var(--s2); border:1px solid var(--s3); border-radius:10px; padding:6px 16px; z-index:300; font-size:11px; font-weight:600; animation:fadeIn .15s; box-shadow:0 6px 20px rgba(0,0,0,.35); white-space:nowrap; }
.notif-panel { position:fixed; top:46px; right:4px; width:260px; max-width:calc(100vw - 8px); max-height:320px; overflow-y:auto; background:var(--s1); border:1px solid var(--s3); border-radius:12px; z-index:150; padding:4px; animation:fadeIn .1s; box-shadow:0 6px 24px rgba(0,0,0,.4); }
.notif-item { display:flex; gap:5px; padding:5px; border-radius:6px; font-size:10px; align-items:flex-start; }
.notif-item:hover { background:var(--s2); }
.role-badge { font-size:7px; font-weight:800; padding:0 4px; border-radius:5px; }
.role-admin { background:var(--c1); color:var(--coral); }
.role-mod { background:var(--l1); color:var(--lav); }
.dur-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:4px; margin-bottom:8px; }
.price-box { background:var(--s2); border:1px solid var(--s3); border-radius:10px; padding:10px; margin-bottom:8px; text-align:center; }
.price-big { font-family:Nunito; font-weight:900; font-size:24px; color:var(--teal); }
.coins-earn { font-family:Nunito; font-weight:700; color:var(--gold); font-size:12px; }
.queue-box { border:2px dashed rgba(192,132,252,.25); border-radius:10px; padding:10px; background:var(--l1); margin:5px 0; }
.issue-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:4px; margin-top:5px; }
.issue-btn { background:var(--s2); border:1px solid var(--s3); border-radius:8px; padding:6px 2px; text-align:center; cursor:pointer; font-size:8px; font-weight:600; }
.issue-btn:active { background:var(--s3); transform:scale(.93); }
.issue-btn .issue-icon { font-size:18px; display:block; margin-bottom:1px; }
.section-title { font-family:Nunito; font-weight:700; font-size:11px; color:var(--tx2); margin:10px 0 5px; }
.empty { text-align:center; color:var(--tx2); padding:30px 0; font-size:11px; }
.multi-fab { position:fixed; bottom:64px; left:50%; transform:translateX(-50%); z-index:50; }
.lb-row { display:flex; align-items:center; gap:7px; padding:6px 8px; background:var(--s2); border:1px solid var(--s3); border-radius:9px; margin-bottom:4px; }
.lb-row.me { border-color:rgba(78,205,196,.25); background:var(--t1); }
.reply-card { display:flex; gap:5px; padding:5px 0; border-bottom:1px solid var(--s3); }
.reply-card .reply-av { width:24px; height:24px; border-radius:50%; background:var(--s3); display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; flex-shrink:0; color:var(--tx); }
.verify-inputs { display:flex; gap:6px; justify-content:center; margin:12px 0; }
.verify-inputs input { width:38px; height:42px; text-align:center; font-size:17px; font-weight:800; font-family:Nunito; background:var(--s2); border:1.5px solid var(--s3); border-radius:9px; color:var(--tx); outline:none; }
.verify-inputs input:focus { border-color:var(--teal); }
`;

// ═══════════════════════════
// MAIN APP COMPONENT
// ═══════════════════════════
function App() {
  // ── ALL DATA IN REACT STATE (no localStorage!) ──
  const [users, setUsers] = useState(INIT_USERS);
  const [bookings, setBookings] = useState([]);
  const [chats, setChats] = useState({});
  const [reports, setReports] = useState([]);
  const [forum, setForum] = useState([]);
  const [notifs, setNotifs] = useState({});

  // ── UI State ──
  const [lang, setLang] = useState("en");
  const [tab, setTab] = useState("home");
  const [user, setUser] = useState(null);
  const [sheet, setSheet] = useState(null);
  const [sheetData, setSheetData] = useState(null);
  const [toast, setToast] = useState(null);
  const [tick, setTick] = useState(0);
  const [filter, setFilter] = useState("all");
  const [multi, setMulti] = useState(false);
  const [multiSel, setMultiSel] = useState([]);
  const [notifOpen, setNotifOpen] = useState(false);
  const [confetti, setConfetti] = useState(false);
  const [chatUid, setChatUid] = useState(null);
  const [forumTid, setForumTid] = useState(null);
  const [profTab, setProfTab] = useState("ranks");
  const [adminTab, setAdminTab] = useState("dash");
  const [adminFil, setAdminFil] = useState("all");
  const [chatSearch, setChatSearch] = useState("");
  const [chatInp, setChatInp] = useState("");
  const [fShowNew, setFShowNew] = useState(false);
  const [fTitle, setFTitle] = useState("");
  const [fBody, setFBody] = useState("");
  const [fReply, setFReply] = useState("");
  const [aSearch, setASearch] = useState("");
  const [adminBulk, setAdminBulk] = useState(false);
  const [adminBkSel, setAdminBkSel] = useState([]);
  const [showAddUser, setShowAddUser] = useState(false);
  const [addNick, setAddNick] = useState("");
  const [addEmail, setAddEmail] = useState("");
  const [addPw, setAddPw] = useState("");
  const [addRole, setAddRole] = useState("user");
  const [addCoins, setAddCoins] = useState(0);
  const [addHours, setAddHours] = useState(0);
  const [editUid, setEditUid] = useState(null);
  const [editFields, setEditFields] = useState({});
  const [announcements, setAnnouncements] = useState([]);
  const [annText, setAnnText] = useState("");

  // Auth form
  const [authMode, setAuthMode] = useState("login");
  const [aNick, setANick] = useState("");
  const [aEmail, setAEmail] = useState("");
  const [aPw, setAPw] = useState("");
  const [verData, setVerData] = useState(null);
  const [verDigits, setVerDigits] = useState(["", "", "", "", "", ""]);

  // Sheets sub-state
  const [showIss, setShowIss] = useState(false);
  const [issDet, setIssDet] = useState("");
  const [aqDur, setAqDur] = useState(1);
  const [bkDur, setBkDur] = useState(1);
  const [bkCustom, setBkCustom] = useState(false);
  const [bkT0, setBkT0] = useState(fmtDT(new Date()));
  const [bkT1, setBkT1] = useState(fmtDT(new Date(Date.now() + 3600000)));

  const msgRef = useRef(null);
  const verRefs = useRef([]);
  const L = useCallback((k, v) => tx(k, lang, v), [lang]);

  // Tick for time-based updates
  useEffect(() => { const iv = setInterval(() => setTick(t => t + 1), 15000); return () => clearInterval(iv); }, []);
  useEffect(() => { if (msgRef.current) msgRef.current.scrollTop = msgRef.current.scrollHeight; });

  const showToast = msg => { setToast(msg); setTimeout(() => setToast(null), 2200); };
  const addNotif = (nuid, icon, text) => setNotifs(n => {
    const o = { ...n }; if (!o[nuid]) o[nuid] = [];
    o[nuid] = [{ id: uid(), icon, text, ts: Date.now(), read: false }, ...o[nuid]].slice(0, 15);
    return o;
  });
  const tier = user ? getTier(user.hr) : TIERS[0];

  // ── PC Status ──
  const pcStatus = useCallback(pid => {
    const now = Date.now();
    const bks = bookings.filter(b => b.pid === pid && ["active", "pending", "playing"].includes(b.s) && b.t1 > now);
    const act = bks.find(b => b.s === "active" || b.s === "playing");
    if (act) return act.t1 - now <= 900000 ? { s: "soon", bk: act, q: bks.length } : { s: "busy", bk: act, q: bks.length };
    const up = bks.find(b => b.s === "pending" && b.t0 - now <= 900000 && b.t0 > now);
    if (up) return { s: "soon", bk: up, q: bks.length };
    return { s: "free", q: bks.length };
  }, [bookings, tick]);

  const pcPop = useMemo(() => {
    const c = {}; ALL_PCS.forEach(p => { c[p.id] = bookings.filter(b => b.pid === p.id).length; });
    return { c, mx: Math.max(...Object.values(c), 1) };
  }, [bookings]);

  const favPc = useMemo(() => {
    if (!user) return null;
    const c = {}; bookings.filter(b => b.uid === user.id).forEach(b => { c[b.pid] = (c[b.pid] || 0) + 1; });
    const top = Object.entries(c).sort((a, b) => b[1] - a[1])[0];
    return top ? { pid: top[0], n: top[1] } : null;
  }, [user, bookings]);

  const myNotifs = user ? (notifs[user.id] || []) : [];
  const unreadN = myNotifs.filter(n => !n.read).length;

  const chatUnread = useMemo(() => {
    if (!user) return 0;
    if (user.role === "admin" || user.role === "mod")
      return Object.values(chats).reduce((a, m) => a + m.filter(x => !x.read && x.from !== user.id && !x.isSystem).length, 0);
    return (chats[user.id] || []).filter(m => !m.read && m.from !== user.id).length;
  }, [user, chats]);

  // ── Update user helper ──
  const updUser = (targetId, fn) => {
    setUsers(us => {
      const next = us.map(x => x.id === targetId ? fn({ ...x }) : x);
      const me = next.find(x => x.id === user?.id);
      if (me) setUser(me);
      return next;
    });
  };

  // ── AUTH ──
  const doLogin = () => {
    const u = users.find(x => (x.email === aEmail || x.nick === aEmail) && x.pw === aPw);
    if (!u) return showToast("❌ Invalid credentials");
    if (!u.verified) return showToast("❌ Verify email first");
    const today = dayKey(), yest = dayKey(new Date(Date.now() - 86400000));
    const nu = { ...u };
    if (nu.lv === yest) nu.st += 1; else if (nu.lv !== today) nu.st = 1;
    nu.lv = today;
    setUsers(us => us.map(x => x.id === nu.id ? nu : x));
    setUser(nu); setSheet(null);
    showToast(`👋 ${L("welcome")} ${nu.nick}`);
  };

  const doRegister = () => {
    if (!aNick.trim() || !aEmail.trim() || !aPw.trim()) return showToast("❌ Fill all fields");
    if (users.find(x => x.email === aEmail)) return showToast("❌ Email exists");
    if (users.find(x => x.nick.toLowerCase() === aNick.toLowerCase())) return showToast("❌ Nick taken");
    const code = String(Math.floor(100000 + Math.random() * 900000));
    const u = { id: uid(), nick: aNick.trim(), email: aEmail.trim(), pw: aPw, role: "user", verified: false, co: 0, ce: 0, hr: 0, bk: 0, ts: 0, st: 0, lv: "", dc: "", rw: [] };
    setUsers(us => [...us, u]);
    setVerData({ oduid: u.id, code, email: u.email });
    setVerDigits(["", "", "", "", "", ""]);
    setSheet("verify");
    showToast(`${L("registered")} Code: ${code}`);
  };

  const doVerify = (directCode) => {
    const code = directCode || verDigits.join("");
    if (code.length !== 6 || code !== verData?.code) return showToast("❌ Wrong code");
    setUsers(us => us.map(x => x.id === verData.oduid ? { ...x, verified: true } : x));
    const u = users.find(x => x.id === verData.oduid);
    if (u) setUser({ ...u, verified: true });
    setSheet(null); showToast("✅ Verified!");
  };

  const doLogout = () => { setUser(null); setTab("home"); setSheet(null); setChatUid(null); };

  // ── ADMIN ADD USER ──
  const doAddUser = () => {
    if (!addNick.trim() || !addEmail.trim() || !addPw.trim()) return showToast("❌ Fill all fields");
    if (users.find(x => x.email === addEmail)) return showToast("❌ Email exists");
    if (users.find(x => x.nick.toLowerCase() === addNick.toLowerCase())) return showToast("❌ Nick taken");
    const u = {
      id: uid(), nick: addNick.trim(), email: addEmail.trim(), pw: addPw,
      role: addRole, verified: true, co: Number(addCoins) || 0, ce: Number(addCoins) || 0,
      hr: Number(addHours) || 0, bk: 0, ts: 0, st: 0, lv: "", dc: "", rw: []
    };
    setUsers(us => [...us, u]);
    setAddNick(""); setAddEmail(""); setAddPw(""); setAddRole("user"); setAddCoins(0); setAddHours(0);
    setShowAddUser(false);
    showToast(`✅ User ${u.nick} created!`);
  };

  const openEditUser = (u) => {
    setEditUid(u.id);
    setEditFields({ nick: u.nick, email: u.email, pw: "", co: u.co, hr: u.hr, st: u.st, ce: u.ce, role: u.role, verified: u.verified });
    setSheet("edituser");
  };

  const saveEditUser = () => {
    if (!editUid) return;
    setUsers(us => us.map(u => {
      if (u.id !== editUid) return u;
      const nk = editFields.nick?.trim() || u.nick;
      const em = editFields.email?.trim() || u.email;
      // Check duplicates excluding self
      if (us.some(x => x.id !== editUid && x.nick.toLowerCase() === nk.toLowerCase())) { showToast("❌ Nick taken"); return u; }
      if (us.some(x => x.id !== editUid && x.email === em)) { showToast("❌ Email exists"); return u; }
      return {
        ...u,
        nick: nk, email: em,
        pw: editFields.pw?.trim() || u.pw,
        co: Number(editFields.co) || 0,
        ce: Number(editFields.ce) || 0,
        hr: Number(editFields.hr) || 0,
        st: Number(editFields.st) || 0,
        role: editFields.role || u.role,
        verified: editFields.verified,
      };
    }));
    setSheet(null); setEditUid(null);
    showToast("✅ User updated!");
  };

  // ── BOOKING ──
  const createBooking = (pid, t0, t1) => {
    if (!user) return setSheet("auth");
    const hrs = (t1 - t0) / 3600000;
    if (hrs <= 0) return showToast("❌ Invalid");
    if (bookings.some(b => b.pid === pid && ["active", "pending", "playing"].includes(b.s) && b.t0 < t1 && b.t1 > t0))
      return showToast("❌ " + L("conflict"));
    const calc = calcPrice(hrs, user);
    const bk = { id: uid(), pid, uid: user.id, un: user.nick, t0, t1, price: calc.final, coins: calc.coins, hrs: Math.round(hrs * 100) / 100, s: "pending", ca: Date.now() };
    setBookings(bs => [...bs, bk]);
    updUser(user.id, u => ({ ...u, bk: u.bk + 1 }));
    addNotif(user.id, "📋", `Booked ${ALL_PCS.find(p => p.id === pid)?.name}`);
    setSheetData(bk); setSheet("pay");
  };

  const doAdminAction = (bkId, action) => {
    setBookings(bs => bs.map(bk => {
      if (bk.id !== bkId) return bk;
      const nb = { ...bk };
      if (action === "approve") { nb.s = "active"; addNotif(bk.uid, "✅", "Approved"); }
      else if (action === "reject") { nb.s = "rejected"; addNotif(bk.uid, "❌", "Rejected"); }
      else if (action === "play") { nb.s = "playing"; }
      else if (action === "end") {
        nb.s = "completed";
        updUser(bk.uid, u => {
          const oT = getTier(u.hr);
          const nu = { ...u, hr: u.hr + bk.hrs, co: u.co + bk.coins, ce: u.ce + bk.coins, ts: u.ts + bk.price };
          addNotif(bk.uid, "🪙", `+${bk.coins} coins`);
          if (getTier(nu.hr).id !== oT.id) {
            addNotif(bk.uid, "🏆", L("tierUp"));
            if (bk.uid === user?.id) { setConfetti(true); setTimeout(() => setConfetti(false), 3500); }
          }
          return nu;
        });
      }
      else if (action === "cancel") {
        nb.s = "cancelled";
        updUser(bk.uid, u => ({ ...u, co: u.co + Math.round(bk.coins * .25), ce: u.ce + Math.round(bk.coins * .25) }));
        addNotif(bk.uid, "🚫", "Cancelled");
      }
      return nb;
    }));
  };

  // ── BULK ADMIN ACTION ──
  const doBulkAction = (action) => {
    adminBkSel.forEach(bkId => doAdminAction(bkId, action));
    setAdminBkSel([]);
    showToast(`✅ ${action} applied to ${adminBkSel.length} bookings`);
  };

  // ── CHAT ──
  const sendMsg = (targetUid, text, isSys) => {
    if (!text.trim()) return;
    setChats(c => {
      const nc = { ...c };
      if (!nc[targetUid]) nc[targetUid] = [];
      nc[targetUid] = [...nc[targetUid], { id: uid(), from: isSys ? "system" : user?.id, fromNick: isSys ? "System" : user?.nick, text: text.trim(), ts: Date.now(), read: false, isSystem: !!isSys }];
      return nc;
    });
  };

  const claimDaily = () => {
    if (!user || user.dc === dayKey()) return;
    const amt = Math.round(5 * tier.mul);
    updUser(user.id, u => ({ ...u, co: u.co + amt, ce: u.ce + amt, dc: dayKey() }));
    showToast(`🎁 +${amt} coins!`);
  };

  const buyReward = rw => {
    if (!user || user.co < rw.cost) return;
    updUser(user.id, u => ({ ...u, co: u.co - rw.cost }));
    showToast(`✅ ${rw[lang] || rw.en}!`);
  };

  // ── PC Card component — fixed height, consistent layout ──
  const PcCard = ({ pc, idx }) => {
    const now = Date.now();
    const info = pcStatus(pc.id);
    const isFree = info.s === "free", isBusy = info.s === "busy", isMy = info.bk?.uid === user?.id;
    const isHot = pcPop.c[pc.id] >= pcPop.mx * .8 && pcPop.mx > 0;
    const isYou = favPc?.pid === pc.id && isFree;
    const sel = multiSel.includes(pc.id);
    const prog = isBusy && info.bk ? Math.min(100, ((now - info.bk.t0) / (info.bk.t1 - info.bk.t0)) * 100) : 0;
    const remMin = info.bk ? Math.max(0, Math.round((info.bk.t1 - now) / 60000)) : 0;
    const remH = Math.floor(remMin / 60);
    const remM = remMin % 60;
    const remStr = remH > 0 ? `${remH}h ${remM}m` : `${remM}m`;

    return (
      <div
        className={`pc-card ${isFree ? "free-glow" : ""} ${isMy ? "my-active" : ""} ${sel ? "multi-sel" : ""}`}
        style={{ animationDelay: `${idx * 0.05}s`, paddingLeft: multi ? 28 : 9 }}
        onClick={() => {
          if (multi) setMultiSel(s => s.includes(pc.id) ? s.filter(x => x !== pc.id) : [...s, pc.id]);
          else { setSheetData(pc); setSheet("pcinfo"); setShowIss(false); setIssDet(""); setAqDur(1); }
        }}
      >
        <div className="glow" style={{ background: isFree ? "var(--teal)" : isBusy ? "var(--coral)" : "var(--gold)", top: "-16px", right: "-16px" }} />
        {isHot && !isYou && <div className="pc-badge" style={{ background: "var(--c1)", color: "var(--coral)" }}>🔥HOT</div>}
        {isYou && <div className="pc-badge" style={{ background: "var(--g1)", color: "var(--gold)" }}>★YOU</div>}
        {multi && <div style={{ position: "absolute", top: 5, left: 5, width: 18, height: 18, borderRadius: "50%", border: sel ? "2.5px solid var(--teal)" : "2px solid var(--s4)", background: sel ? "var(--teal)" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", transition: "all .15s", boxShadow: sel ? "0 0 8px rgba(78,205,196,.4)" : "none" }}>{sel && <span style={{ color: "var(--bg)", fontSize: 10, fontWeight: 900 }}>✓</span>}</div>}
        <div className="pc-icon">{pc.icon}</div>
        <div className="pc-name">{pc.name}</div>
        <div className="pc-status" style={{ color: isFree ? "var(--teal)" : info.s === "soon" ? "var(--gold)" : "var(--coral)" }}>
          {L(info.s === "busy" ? "busy" : info.s)}
        </div>
        {/* Spacer to push bottom content down */}
        <div style={{ flex: 1 }} />
        {isBusy && info.bk ? (
          <React.Fragment>
            <div className="pc-user">🎮 {info.bk.un}</div>
            <div className="pc-prog"><div className="pc-prog-fill" style={{ width: `${prog}%` }} /></div>
            <div className="pc-time">{remStr}</div>
          </React.Fragment>
        ) : isFree ? (
          <div style={{ fontSize: 8, color: "var(--teal)", opacity: .5, marginTop: 2 }}>
            {lang === "ka" ? "ხელმისაწვდომია" : "Available now"}
          </div>
        ) : info.s === "soon" && info.bk ? (
          <div style={{ fontSize: 8, color: "var(--gold)", marginTop: 2 }}>
            {info.bk.un} · {remStr}
          </div>
        ) : null}
        {info.q > 1 && <div className="pc-queue">📋{info.q} {L("queued")}</div>}
      </div>
    );
  };

  // ═══════════════════
  // TAB RENDERERS
  // ═══════════════════

  const renderHome = () => {
    const allStatus = ALL_PCS.map(p => ({ ...p, ...pcStatus(p.id) }));
    const freeCount = allStatus.filter(s => s.s === "free").length;
    const busyCount = allStatus.filter(s => s.s === "busy").length;
    const soonCount = allStatus.filter(s => s.s === "soon").length;
    const filterPcs = list => list.filter(p => { const s = pcStatus(p.id).s; return filter === "all" || filter === s; });

    return (
      <div>
        {isHappyHour() && <div className="happy-bar">{L("happyHour")}</div>}

        {/* Announcements banner */}
        {announcements.length > 0 && (
          <div style={{ background: "linear-gradient(90deg, rgba(192,132,252,.08), rgba(56,189,248,.06))", border: "1px solid rgba(192,132,252,.15)", borderRadius: 10, padding: "7px 10px", marginBottom: 8 }}>
            {announcements.slice(0, 2).map(a => (
              <div key={a.id} style={{ fontSize: 10, marginBottom: announcements.length > 1 ? 3 : 0 }}>
                <span style={{ color: "var(--lav)", fontWeight: 700 }}>📢</span>{" "}
                <span style={{ color: "var(--tx)" }}>{a.text}</span>
                <span style={{ fontSize: 7, color: "var(--tx2)", marginLeft: 4 }}>{a.by} · {ago(a.ts, lang)}</span>
              </div>
            ))}
          </div>
        )}
        <div className="stat-bar">
          <div className="stat-dot"><span style={{ background: "var(--teal)" }} /> {freeCount} {L("free")}</div>
          <div className="stat-dot"><span style={{ background: "var(--coral)" }} /> {busyCount} {L("playing")}</div>
          <div className="stat-dot"><span style={{ background: "var(--gold)" }} /> {soonCount} {L("soon")}</div>
        </div>
        <div className="filter-row">
          {["all", "free", "soon", "busy"].map(f => (
            <button key={f} className={`ftab ${filter === f ? "act" : ""}`} onClick={() => setFilter(f)}>{L(f)}</button>
          ))}
          <button className={`ftab ${multi ? "act" : ""}`} onClick={() => { setMulti(!multi); setMultiSel([]); }} style={{ marginLeft: "auto" }}>
            {multi ? "✕ Done" : "☰ Multi"}
          </button>
        </div>

        <div className="wings-box">
          {/* Headers */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", borderBottom: "1px solid var(--s3)" }}>
            <div className="wing-label" style={{ borderRight: "1px solid var(--s3)" }}>{L("leftWing")}</div>
            <div className="wing-label">{L("rightWing")}</div>
          </div>
          {/* Paired grid — each row = 1 left PC + 1 right PC at SAME height */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 0 }}>
            {Array.from({ length: 5 }).map((_, row) => {
              const lp = filterPcs(LEFT_PCS)[row];
              const rp = filterPcs(RIGHT_PCS)[row];
              return <React.Fragment key={row}>
                <div style={{ padding: 6, borderRight: "1px solid var(--s3)", borderBottom: row < 4 ? "1px solid rgba(37,45,64,.3)" : "none" }}>
                  {lp ? <PcCard pc={lp} idx={row} /> : <div style={{ minHeight: 100 }} />}
                </div>
                <div style={{ padding: 6, borderBottom: row < 4 ? "1px solid rgba(37,45,64,.3)" : "none" }}>
                  {rp ? <PcCard pc={rp} idx={row} /> : <div style={{ minHeight: 100 }} />}
                </div>
              </React.Fragment>;
            })}
          </div>
        </div>

        {multi && multiSel.length > 0 && (
          <div className="multi-fab">
            <div style={{ background: "var(--s1)", border: "1px solid var(--s3)", borderRadius: 16, padding: "8px 14px", display: "flex", alignItems: "center", gap: 8, boxShadow: "0 8px 32px rgba(0,0,0,.5)" }}>
              <div style={{ display: "flex", gap: 2 }}>
                {multiSel.slice(0, 4).map(pid => { const p = ALL_PCS.find(x => x.id === pid); return <span key={pid} style={{ fontSize: 16 }}>{p?.icon}</span>; })}
                {multiSel.length > 4 && <span style={{ fontSize: 11, color: "var(--tx2)", fontWeight: 700 }}>+{multiSel.length - 4}</span>}
              </div>
              <button className="btn btn-teal" onClick={() => {
                setSheetData({ pids: [...multiSel] });
                setSheet("book"); setBkDur(1); setBkCustom(false);
              }}>
                {L("book")} {multiSel.length} PCs
              </button>
            </div>
          </div>
        )}

        {/* Social links + info bar */}
        <div style={{ marginTop: 16, padding: "14px 0 4px", borderTop: "1px solid var(--s3)" }}>
          <div style={{ display: "flex", justifyContent: "center", gap: 12, marginBottom: 10 }}>
            {[
              { name: "Facebook", href: "#", svg: <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3V2z" stroke="var(--tx2)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg> },
              { name: "Instagram", href: "#", svg: <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="5" stroke="var(--tx2)" strokeWidth="2"/><circle cx="12" cy="12" r="5" stroke="var(--tx2)" strokeWidth="2"/><circle cx="17.5" cy="6.5" r="1.5" fill="var(--tx2)"/></svg> },
              { name: "TikTok", href: "#", svg: <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M9 12a4 4 0 104 4V4a5 5 0 005 5" stroke="var(--tx2)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg> },
              { name: "Discord", href: "#", svg: <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M9.09 9a3 3 0 015.83 0M5.5 15c1.5 2 4 3 6.5 3s5-1 6.5-3M8.5 9C5 9.5 3 11 3 11s1 5 9 8c8-3 9-8 9-8s-2-1.5-5.5-2" stroke="var(--tx2)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/><circle cx="9" cy="13" r="1" fill="var(--tx2)"/><circle cx="15" cy="13" r="1" fill="var(--tx2)"/></svg> },
              { name: "YouTube", href: "#", svg: <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="2" y="4" width="20" height="16" rx="4" stroke="var(--tx2)" strokeWidth="2"/><path d="M10 9l5 3-5 3V9z" fill="var(--tx2)"/></svg> },
            ].map(s => (
              <a key={s.name} href={s.href} onClick={e => e.preventDefault()} title={s.name}
                style={{ width: 36, height: 36, borderRadius: 10, background: "var(--s2)", border: "1px solid var(--s3)", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", transition: "all .12s" }}
                onMouseEnter={e => { e.currentTarget.style.borderColor = "var(--teal)"; e.currentTarget.style.background = "var(--t1)"; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor = "var(--s3)"; e.currentTarget.style.background = "var(--s2)"; }}
              >{s.svg}</a>
            ))}
          </div>
          <div style={{ textAlign: "center", fontSize: 8, color: "var(--s4)", fontFamily: "Nunito", fontWeight: 600 }}>
            📍 Batumi, Georgia · ₾{RATE}/hr · {lang === "ka" ? "ყოველდღე" : "Open Daily"}
          </div>
        </div>
      </div>
    );
  };

  const renderBookings = () => {
    if (!user) return <div className="empty" onClick={() => setSheet("auth")} style={{ cursor: "pointer" }}>🔒 {L("login")}</div>;
    const bks = [...bookings].filter(b => b.uid === user.id).sort((a, b) => b.ca - a.ca);
    if (!bks.length) return <div className="empty">📋 {L("noBookings")}</div>;

    const canEdit = s => s === "pending" || s === "active";
    const canCancel = s => s === "pending" || s === "active";

    return <div>{bks.map(bk => {
      const pc = ALL_PCS.find(p => p.id === bk.pid);
      return <div key={bk.id} className="bk-card" style={{ flexDirection: "column", gap: 6 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 7, width: "100%" }}>
          <div style={{ fontSize: 20 }}>{pc?.icon}</div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontFamily: "Nunito", fontWeight: 700, fontSize: 11, display: "flex", alignItems: "center", gap: 4 }}>
              {pc?.name} <StatusPill status={bk.s} L={L} />
            </div>
            <div style={{ fontSize: 9, color: "var(--tx2)" }}>
              {fmtDate(bk.t0, lang)} {fmt(bk.t0)}–{fmt(bk.t1)} · {bk.hrs}h
            </div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontFamily: "Nunito", fontWeight: 700, fontSize: 11, color: "var(--teal)" }}>₾{bk.price}</div>
            <div style={{ fontSize: 8, color: "var(--gold)" }}>🪙{bk.coins}</div>
          </div>
        </div>
        {/* Action buttons for user */}
        {(canEdit(bk.s) || canCancel(bk.s)) && (
          <div style={{ display: "flex", gap: 4, width: "100%" }}>
            {canEdit(bk.s) && (
              <button className="btn btn-ghost btn-sm" style={{ flex: 1, fontSize: 9 }} onClick={() => {
                const pc = ALL_PCS.find(p => p.id === bk.pid);
                setSheetData({ editBk: bk, pc });
                setBkDur(Math.round(bk.hrs));
                setBkCustom(true);
                setBkT0(fmtDT(new Date(bk.t0)));
                setBkT1(fmtDT(new Date(bk.t1)));
                setSheet("editbk");
              }}>
                ✏️ {lang === "ka" ? "რედაქტირება" : "Edit"}
              </button>
            )}
            {canCancel(bk.s) && (
              <button className="btn btn-coral btn-sm" style={{ flex: 1, fontSize: 9 }} onClick={() => {
                doAdminAction(bk.id, "cancel");
                showToast(lang === "ka" ? "გაუქმებულია" : "Cancelled");
              }}>
                🚫 {L("cancel")}
              </button>
            )}
          </div>
        )}
      </div>;
    })}</div>;
  };

  const renderChat = () => {
    if (!user) return <div className="empty" onClick={() => setSheet("auth")} style={{ cursor: "pointer" }}>🔒 {L("login")}</div>;
    const isAdm = user.role === "admin" || user.role === "mod";

    if (isAdm && !chatUid) {
      const reps = reports.filter(r => !r.resolved);
      const allU = users.filter(u => u.role === "user");
      const sorted = allU.filter(u => !chatSearch || u.nick.toLowerCase().includes(chatSearch.toLowerCase()))
        .map(u => {
          const msgs = chats[u.id] || [];
          return { ...u, unr: msgs.filter(m => !m.read && m.from !== user.id && !m.isSystem).length, lm: msgs[msgs.length - 1], hasRep: reps.some(r => r.uid === u.id), isLive: bookings.some(b => b.uid === u.id && (b.s === "active" || b.s === "playing") && b.t1 > Date.now()) };
        }).sort((a, b) => (b.hasRep ? 1 : 0) - (a.hasRep ? 1 : 0) || b.unr - a.unr || (b.lm?.ts || 0) - (a.lm?.ts || 0));

      return <div>
        {reps.length > 0 && <div style={{ marginBottom: 8 }}>
          <div className="section-title">🆘 SOS ({reps.length})</div>
          {reps.map(r => <div key={r.id} style={{ background: "var(--c1)", borderRadius: 8, padding: 5, marginBottom: 2, fontSize: 10, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span>{r.issue?.icon} {r.issue?.[lang] || r.issue?.en} — {ALL_PCS.find(p => p.id === r.pid)?.name}</span>
            <button className="btn btn-ghost btn-sm" onClick={() => setReports(rs => rs.map(x => x.id === r.id ? { ...x, resolved: true } : x))}>{L("resolve")}</button>
          </div>)}
        </div>}
        <input className="inp" placeholder={L("search")} value={chatSearch} onChange={e => setChatSearch(e.target.value)} style={{ marginBottom: 6 }} />
        {sorted.map(u => <div key={u.id} className="user-row" onClick={() => { setChatUid(u.id); setChats(c => { const nc = { ...c }; if (nc[u.id]) nc[u.id] = nc[u.id].map(m => m.from !== user.id ? { ...m, read: true } : m); return nc; }); }}>
          <div style={{ width: 30, height: 30, borderRadius: "50%", background: "var(--s3)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, flexShrink: 0 }}>{u.isLive ? "🎮" : "👤"}</div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontWeight: 600, fontSize: 11, display: "flex", alignItems: "center", gap: 3 }}>{u.nick} {u.isLive && <span className="pl pl-t" style={{ fontSize: 6, padding: "0 3px" }}>{L("live")}</span>}{u.hasRep && <span className="pl pl-c" style={{ fontSize: 6, padding: "0 3px" }}>SOS</span>}</div>
            <div style={{ fontSize: 9, color: "var(--tx2)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{u.lm?.text || "..."}</div>
          </div>
          {u.unr > 0 && <div className="badge" style={{ position: "static" }}>{u.unr}</div>}
        </div>)}
      </div>;
    }

    // Chat thread
    const targetUid = isAdm ? chatUid : user.id;
    const msgs = chats[targetUid] || [];
    const doSend = () => { if (!chatInp.trim()) return; sendMsg(targetUid, chatInp.trim()); setChatInp(""); };

    return <div style={{ display: "flex", flexDirection: "column", height: "calc(100vh - 140px)" }}>
      {isAdm && chatUid && <div style={{ display: "flex", alignItems: "center", gap: 5, marginBottom: 5 }}>
        <button className="btn btn-ghost btn-sm" onClick={() => setChatUid(null)}>←</button>
        <span style={{ fontWeight: 700, fontSize: 12 }}>{users.find(u => u.id === chatUid)?.nick}</span>
      </div>}
      {!isAdm && <div style={{ display: "flex", gap: 4, marginBottom: 5 }}>
        <button className="btn btn-sm btn-ghost" onClick={() => sendMsg(user.id, L("imHere"))}>👋 {L("imHere")}</button>
        <button className="btn btn-sm btn-ghost" onClick={() => sendMsg(user.id, L("needHelp"))}>🆘 {L("needHelp")}</button>
      </div>}
      <div ref={msgRef} className="msg-list" style={{ flex: 1 }}>
        {msgs.map(m => {
          const isMe = m.from === user.id;
          if (m.isSystem) return <div key={m.id} className="msg msg-sys">{m.text}<div className="msg-time">{fmt(m.ts)}</div></div>;
          return <div key={m.id} className={`msg ${isMe ? "msg-me" : "msg-them"}`}>
            {!isMe && <div className="msg-sender">{m.fromNick}</div>}
            {m.text}<div className="msg-time">{fmt(m.ts)}</div>
          </div>;
        })}
        {msgs.length === 0 && <div className="empty" style={{ padding: 14 }}>💬</div>}
      </div>
      <div className="chat-input">
        <input className="inp" value={chatInp} onChange={e => setChatInp(e.target.value)} onKeyDown={e => e.key === "Enter" && doSend()} placeholder="..." />
        <button className="btn btn-teal btn-sm" onClick={doSend}>{L("send")}</button>
      </div>
    </div>;
  };

  const renderForum = () => {
    const sorted = [...forum].sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0) || b.ca - a.ca);

    if (forumTid) {
      const tp = forum.find(x => x.id === forumTid);
      if (!tp) { setForumTid(null); return null; }
      const doReply = () => {
        if (!user || !fReply.trim()) return;
        setForum(f => f.map(x => x.id === tp.id ? { ...x, replies: [...x.replies, { id: uid(), uid: user.id, un: user.nick, role: user.role, text: fReply.trim(), ca: Date.now() }] } : x));
        setFReply("");
      };
      return <div>
        <button className="btn btn-ghost btn-sm" onClick={() => setForumTid(null)} style={{ marginBottom: 5 }}>← Back</button>
        <div className="card" style={{ marginBottom: 8 }}>
          <div style={{ fontFamily: "Nunito", fontWeight: 800, fontSize: 14 }}>{tp.pinned && "📌 "}{tp.title}</div>
          <div style={{ fontSize: 9, color: "var(--tx2)", margin: "2px 0" }}>{tp.un} · {ago(tp.ca, lang)}</div>
          {tp.body && <div style={{ fontSize: 11, color: "var(--tx2)", lineHeight: 1.4, marginTop: 3 }}>{tp.body}</div>}
        </div>
        {tp.replies.map(r => <div key={r.id} className="reply-card">
          <div className="reply-av" style={{ background: `hsl(${r.un.charCodeAt(0) * 37 % 360},40%,30%)`, color: "#fff" }}>{r.un[0]?.toUpperCase()}</div>
          <div style={{ flex: 1 }}><div style={{ fontSize: 8, color: "var(--tx2)" }}>{r.un} · {ago(r.ca, lang)}</div><div style={{ fontSize: 10, lineHeight: 1.3, marginTop: 1 }}>{r.text}</div></div>
        </div>)}
        {user && <div className="chat-input" style={{ marginTop: 5 }}>
          <input className="inp" value={fReply} onChange={e => setFReply(e.target.value)} onKeyDown={e => e.key === "Enter" && doReply()} placeholder={L("reply")} />
          <button className="btn btn-teal btn-sm" onClick={doReply}>{L("send")}</button>
        </div>}
      </div>;
    }

    return <div>
      {user && <div style={{ marginBottom: 8 }}>
        {!fShowNew
          ? <button className="btn btn-teal" onClick={() => setFShowNew(true)} style={{ width: "100%" }}>{L("newTopic")}</button>
          : <div className="card">
            <input className="inp" placeholder={L("title")} value={fTitle} onChange={e => setFTitle(e.target.value)} style={{ marginBottom: 4 }} />
            <textarea className="inp" placeholder="..." value={fBody} onChange={e => setFBody(e.target.value)} />
            <div style={{ display: "flex", gap: 4, marginTop: 5 }}>
              <button className="btn btn-teal btn-sm" onClick={() => { if (!fTitle.trim()) return; setForum(f => [...f, { id: uid(), title: fTitle.trim(), body: fBody.trim(), uid: user.id, un: user.nick, role: user.role, votes: [], replies: [], pinned: false, ca: Date.now() }]); setFTitle(""); setFBody(""); setFShowNew(false); }}>{L("post")}</button>
              <button className="btn btn-ghost btn-sm" onClick={() => setFShowNew(false)}>{L("cancel")}</button>
            </div>
          </div>
        }
      </div>}
      {sorted.map(tp => <div key={tp.id} className="topic-card" onClick={() => setForumTid(tp.id)}>
        <div style={{ fontFamily: "Nunito", fontWeight: 800, fontSize: 12 }}>{tp.pinned && "📌 "}{tp.title}</div>
        <div style={{ fontSize: 9, color: "var(--tx2)", display: "flex", gap: 5, marginTop: 2, alignItems: "center", flexWrap: "wrap" }}>
          <span>{tp.un}</span><span>{ago(tp.ca, lang)}</span><span>💬{tp.replies?.length || 0}</span>
          <button className={`vote-btn ${tp.votes?.includes(user?.id) ? "voted" : ""}`} onClick={e => { e.stopPropagation(); if (!user) return; setForum(f => f.map(x => { if (x.id !== tp.id) return x; const nv = [...x.votes]; const idx = nv.indexOf(user.id); if (idx >= 0) nv.splice(idx, 1); else nv.push(user.id); return { ...x, votes: nv }; })); }}>▲{tp.votes?.length || 0}</button>
          {user?.role === "admin" && <React.Fragment>
            <button className="btn btn-ghost btn-sm" onClick={e => { e.stopPropagation(); setForum(f => f.map(x => x.id === tp.id ? { ...x, pinned: !x.pinned } : x)); }} style={{ fontSize: 7, padding: "1px 4px" }}>{tp.pinned ? "Unpin" : "Pin"}</button>
            <button className="btn btn-coral btn-sm" onClick={e => { e.stopPropagation(); setForum(f => f.filter(x => x.id !== tp.id)); }} style={{ fontSize: 7, padding: "1px 4px" }}>Del</button>
          </React.Fragment>}
        </div>
        {tp.body && <div style={{ fontSize: 10, color: "var(--tx2)", marginTop: 3 }}>{tp.body.slice(0, 80)}{tp.body.length > 80 ? "..." : ""}</div>}
      </div>)}
      {sorted.length === 0 && <div className="empty">📢 No topics yet</div>}
    </div>;
  };

  const renderProfile = () => {
    if (!user) return <div className="empty" onClick={() => setSheet("auth")} style={{ cursor: "pointer" }}>🔒 {L("login")}</div>;
    const nxTier = getNextTier(user.hr);
    const prog = nxTier ? ((user.hr - tier.hrs) / (nxTier.hrs - tier.hrs)) * 100 : 100;

    return <div>
      <div className="tier-hero" style={{ background: `linear-gradient(135deg,${tier.c}11,var(--s2))`, borderColor: `${tier.c}33` }}>
        <div style={{ fontSize: 44 }}>{tier.icon}</div>
        <div style={{ fontFamily: "Nunito", fontWeight: 900, fontSize: 18, color: tier.c, marginTop: 2 }}>{tier[lang] || tier.en}</div>
        <div style={{ fontSize: 10, color: "var(--tx2)" }}>{user.nick} · {L("level")} {Math.floor(user.hr / 5) + 1}</div>
        <div style={{ fontFamily: "Nunito", fontWeight: 800, fontSize: 26, color: "var(--gold)", marginTop: 2 }}>🪙 {user.co}</div>
        <div style={{ height: 4, background: "var(--s3)", borderRadius: 2, marginTop: 8, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${prog}%`, borderRadius: 2, background: `linear-gradient(90deg,${tier.c},${nxTier?.c || tier.c})` }} />
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 8, color: "var(--tx2)", marginTop: 2 }}><span>{user.hr}h</span><span>{nxTier ? `${nxTier.hrs}h` : "MAX"}</span></div>
      </div>

      {user.dc !== dayKey() && <div className="daily-box" onClick={claimDaily}>
        <div style={{ fontSize: 26, animation: "bob 2s infinite" }}>🎁</div>
        <div style={{ flex: 1 }}><div style={{ fontWeight: 700, fontSize: 12 }}>{L("dailyGift")}</div><div style={{ fontSize: 10, color: "var(--gold)" }}>+{Math.round(5 * tier.mul)} {L("coins")}</div></div>
        <button className="btn btn-gold btn-sm">{L("claim")}</button>
      </div>}

      <div className="streak-row">
        <div style={{ fontSize: 22 }}>🔥</div>
        <div><div style={{ fontFamily: "Nunito", fontWeight: 900, fontSize: 26, color: "var(--gold)" }}>{user.st}</div><div style={{ fontSize: 9, color: "var(--tx2)" }}>{L("streak")}</div></div>
        <div className="streak-dots" style={{ marginLeft: "auto" }}>{[...Array(7)].map((_, i) => <div key={i} className={`streak-dot ${i < (user.st % 7 || (user.st >= 7 ? 7 : 0)) ? "on" : ""}`} />)}</div>
      </div>

      <div className="stats-grid">
        <div className="stat-card"><div className="sv">{user.hr}h</div><div className="sl">{L("hours")}</div></div>
        <div className="stat-card"><div className="sv">{user.bk}</div><div className="sl">{L("bookings")}</div></div>
        <div className="stat-card"><div className="sv">{tier.mul}×</div><div className="sl">Multi</div></div>
        <div className="stat-card"><div className="sv">{tier.disc}%</div><div className="sl">Disc</div></div>
      </div>

      {favPc && <div style={{ fontSize: 10, color: "var(--tx2)" }}>{L("favPc")}: {ALL_PCS.find(p => p.id === favPc.pid)?.icon} {ALL_PCS.find(p => p.id === favPc.pid)?.name} ({favPc.n})</div>}

      <div style={{ display: "flex", gap: 4, margin: "8px 0" }}>
        {[["ranks", "🏅"], ["trophies", "🏆"], ["shop", "🎁"], ["leaderboard", "📊"]].map(([s, ic]) =>
          <button key={s} className={`ftab ${profTab === s ? "act" : ""}`} onClick={() => setProfTab(s)}>{ic} {L(s)}</button>
        )}
      </div>

      {profTab === "ranks" && TIERS.map(tr => <div key={tr.id} className="card" style={{ marginBottom: 4, opacity: user.hr < tr.hrs ? .3 : 1, borderColor: tr.id === tier.id ? tr.c + "44" : undefined }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}><span style={{ fontSize: 20 }}>{tr.icon}</span><div><div style={{ fontWeight: 700, fontSize: 11, color: tr.id === tier.id ? tr.c : "var(--tx)" }}>{tr[lang] || tr.en}{tr.id === tier.id && " ✓"}</div><div style={{ fontSize: 9, color: "var(--tx2)" }}>{tr.hrs}h · {tr.mul}× · -{tr.disc}%</div></div></div>
      </div>)}

      {profTab === "trophies" && ACHIEVEMENTS.map(a => { const ok = a.cond(user); return <div key={a.id} className="card" style={{ marginBottom: 4, opacity: ok ? 1 : .3 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}><span style={{ fontSize: 18 }}>{ok ? a.icon : "🔒"}</span><div style={{ fontWeight: 700, fontSize: 11 }}>{a[lang] || a.en}{ok && <span style={{ color: "var(--teal)" }}> ✓</span>}</div></div>
      </div>; })}

      {profTab === "shop" && SHOP_ITEMS.map(rw => <div key={rw.id} className="card" style={{ marginBottom: 4, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}><span style={{ fontSize: 18 }}>{rw.icon}</span><div><div style={{ fontWeight: 700, fontSize: 11 }}>{rw[lang] || rw.en}</div><div style={{ fontSize: 10, color: "var(--gold)" }}>🪙{rw.cost}</div></div></div>
        <button className="btn btn-teal btn-sm" disabled={user.co < rw.cost} onClick={() => buyReward(rw)}>{L("get")}</button>
      </div>)}

      {profTab === "leaderboard" && users.filter(u => u.hr > 0).sort((a, b) => b.hr - a.hr).slice(0, 10).map((u, i) => {
        const medals = ["🥇", "🥈", "🥉"]; const uT = getTier(u.hr);
        return <div key={u.id} className={`lb-row ${u.id === user.id ? "me" : ""}`}>
          <div style={{ fontFamily: "Nunito", fontWeight: 800, fontSize: 14, width: 22, textAlign: "center" }}>{medals[i] || `#${i + 1}`}</div>
          <div style={{ flex: 1 }}><div style={{ fontWeight: 700, fontSize: 11, color: uT.c }}>{u.nick}</div><div style={{ fontSize: 8, color: "var(--tx2)" }}>{u.hr}h · 🪙{u.co} · 🔥{u.st}</div></div>
        </div>;
      })}

      {/* Account info footer */}
      <div style={{ marginTop: 16, padding: "12px 0 4px", borderTop: "1px solid var(--s3)" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 6 }}>
          <div>
            <div style={{ fontSize: 10, color: "var(--tx2)" }}>📧 {user.email}</div>
            <div style={{ fontSize: 9, color: "var(--tx2)", marginTop: 2 }}>💰 {lang === "ka" ? "სულ დახარჯული" : "Total spent"}: ₾{Math.round(user.ts)}</div>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={doLogout} style={{ color: "var(--coral)" }}>
            🚪 {lang === "ka" ? "გასვლა" : "Logout"}
          </button>
        </div>
      </div>
    </div>;
  };

  const renderAdmin = () => {
    if (!user || (user.role !== "admin" && user.role !== "mod")) return null;
    const today = dayKey();
    const todayBks = bookings.filter(b => dayKey(new Date(b.ca)) === today);
    const playingNow = bookings.filter(b => b.s === "playing" || (b.s === "active" && b.t1 > Date.now())).length;

    return <div>
      <div style={{ display: "flex", gap: 4, margin: "0 0 8px" }}>
        {[["dash", "📊"], ["bookings", "📋"], ["users", "👥"]].map(([s, ic]) =>
          <button key={s} className={`ftab ${adminTab === s ? "act" : ""}`} onClick={() => setAdminTab(s)}>{ic} {L(s === "dash" ? "dashboard" : s)}</button>
        )}
      </div>

      {adminTab === "dash" && <React.Fragment>
        <div className="dash-grid">
          <div className="dash-card" style={{ background: "var(--t1)" }}><div className="dv" style={{ color: "var(--teal)" }}>{playingNow}</div><div className="dl">{L("playingNow")}</div></div>
          <div className="dash-card" style={{ background: "var(--g1)" }}><div className="dv" style={{ color: "var(--gold)" }}>{bookings.filter(b => b.s === "pending").length}</div><div className="dl">{L("pending")}</div></div>
          <div className="dash-card" style={{ background: "var(--g1)" }}><div className="dv" style={{ color: "var(--gold)" }}>₾{Math.round(todayBks.filter(b => b.s === "completed").reduce((s, b) => s + b.price, 0))}</div><div className="dl">{L("todayRev")}</div></div>
          <div className="dash-card" style={{ background: "var(--l1)" }}><div className="dv" style={{ color: "var(--lav)" }}>{users.length}</div><div className="dl">{L("totalUsers")}</div></div>
        </div>

        {/* All-time stats */}
        <div className="stats-grid">
          <div className="stat-card">
            <div className="sv">{bookings.length}</div>
            <div className="sl">{lang === "ka" ? "სულ ჯავშნები" : "All Bookings"}</div>
          </div>
          <div className="stat-card">
            <div className="sv" style={{ color: "var(--teal)" }}>₾{Math.round(bookings.filter(b => b.s === "completed").reduce((s, b) => s + b.price, 0))}</div>
            <div className="sl">{lang === "ka" ? "სულ შემოსავალი" : "All Revenue"}</div>
          </div>
          <div className="stat-card">
            <div className="sv">{Math.round(bookings.filter(b => b.s === "completed").reduce((s, b) => s + b.hrs, 0) * 10) / 10}h</div>
            <div className="sl">{lang === "ka" ? "სულ საათები" : "All Hours"}</div>
          </div>
          <div className="stat-card">
            <div className="sv">{todayBks.length}</div>
            <div className="sl">{lang === "ka" ? "დღეს" : "Today"}</div>
          </div>
        </div>

        <div className="section-title">{L("pcUsage")}</div>
        {ALL_PCS.map(pc => {
          const cnt = bookings.filter(b => b.pid === pc.id).length;
          const mx = Math.max(...ALL_PCS.map(p => bookings.filter(b => b.pid === p.id).length), 1);
          return <div key={pc.id} className="usage-bar"><div className="un">{pc.icon} {pc.name}</div><div className="ub"><div className="uf" style={{ width: `${(cnt / mx) * 100}%`, background: pc.c }} /></div><div style={{ fontSize: 9, color: "var(--tx2)", width: 18, textAlign: "right" }}>{cnt}</div></div>;
        })}

        {/* Announcements */}
        <div className="section-title">📢 {lang === "ka" ? "განცხადებები" : "Announcements"}</div>
        <div style={{ display: "flex", gap: 4, marginBottom: 6 }}>
          <input className="inp" placeholder={lang === "ka" ? "ახალი განცხადება..." : "New announcement..."} value={annText} onChange={e => setAnnText(e.target.value)}
            onKeyDown={e => {
              if (e.key === "Enter" && annText.trim()) {
                setAnnouncements(a => [{ id: uid(), text: annText.trim(), by: user.nick, ts: Date.now() }, ...a].slice(0, 10));
                setAnnText("");
              }
            }}
          />
          <button className="btn btn-teal btn-sm" disabled={!annText.trim()} onClick={() => {
            if (!annText.trim()) return;
            setAnnouncements(a => [{ id: uid(), text: annText.trim(), by: user.nick, ts: Date.now() }, ...a].slice(0, 10));
            setAnnText("");
          }}>📢</button>
        </div>
        {announcements.slice(0, 5).map(a => (
          <div key={a.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: "var(--s2)", border: "1px solid var(--s3)", borderRadius: 8, padding: "5px 8px", marginBottom: 3, fontSize: 10 }}>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ color: "var(--tx)" }}>{a.text}</div>
              <div style={{ fontSize: 8, color: "var(--tx2)" }}>{a.by} · {ago(a.ts, lang)}</div>
            </div>
            <button className="btn btn-ghost btn-sm" style={{ fontSize: 8, padding: "1px 4px", flexShrink: 0 }}
              onClick={() => setAnnouncements(an => an.filter(x => x.id !== a.id))}>✕</button>
          </div>
        ))}
      </React.Fragment>}

      {adminTab === "bookings" && <React.Fragment>
        <div className="filter-row">
          {["all", "pending", "active", "completed"].map(f => <button key={f} className={`ftab ${adminFil === f ? "act" : ""}`} onClick={() => setAdminFil(f)}>{L(f)}</button>)}
          <button className={`ftab ${adminBulk ? "act" : ""}`} onClick={() => { setAdminBulk(!adminBulk); setAdminBkSel([]); }} style={{ marginLeft: "auto" }}>
            {adminBulk ? "✕" : "☰"} Bulk
          </button>
        </div>

        {/* Bulk action bar */}
        {adminBulk && adminBkSel.length > 0 && (
          <div style={{ background: "var(--s2)", border: "1px solid var(--s3)", borderRadius: 12, padding: "8px 10px", marginBottom: 8, display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
            <span style={{ fontFamily: "Nunito", fontWeight: 700, fontSize: 11, color: "var(--teal)" }}>{adminBkSel.length} selected</span>
            <div style={{ display: "flex", gap: 3, marginLeft: "auto" }}>
              {adminBkSel.every(id => bookings.find(b => b.id === id)?.s === "pending") && (
                <React.Fragment>
                  <button className="btn btn-teal btn-sm" onClick={() => doBulkAction("approve")}>✓ Approve All</button>
                  <button className="btn btn-coral btn-sm" onClick={() => doBulkAction("reject")}>✕ Reject All</button>
                </React.Fragment>
              )}
              {adminBkSel.every(id => bookings.find(b => b.id === id)?.s === "active") && (
                <React.Fragment>
                  <button className="btn btn-lav btn-sm" onClick={() => doBulkAction("play")}>▶ Play All</button>
                  <button className="btn btn-ghost btn-sm" onClick={() => doBulkAction("end")}>⏹ End All</button>
                </React.Fragment>
              )}
              {adminBkSel.every(id => bookings.find(b => b.id === id)?.s === "playing") && (
                <button className="btn btn-ghost btn-sm" onClick={() => doBulkAction("end")}>⏹ End All</button>
              )}
              {adminBkSel.every(id => ["active", "pending", "playing"].includes(bookings.find(b => b.id === id)?.s)) && (
                <button className="btn btn-coral btn-sm" onClick={() => doBulkAction("cancel")}>🚫 Cancel All</button>
              )}
              <button className="btn btn-ghost btn-sm" onClick={() => setAdminBkSel([])}>Clear</button>
            </div>
          </div>
        )}

        {/* Select all for current filter */}
        {adminBulk && (
          <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 4 }}>
            <button className="btn btn-ghost btn-sm" style={{ fontSize: 9 }} onClick={() => {
              const visible = bookings.filter(b => adminFil === "all" || b.s === adminFil || (adminFil === "active" && (b.s === "active" || b.s === "playing"))).map(b => b.id);
              setAdminBkSel(prev => prev.length === visible.length ? [] : visible);
            }}>
              {adminBkSel.length === bookings.filter(b => adminFil === "all" || b.s === adminFil || (adminFil === "active" && (b.s === "active" || b.s === "playing"))).length ? "Deselect All" : "Select All"}
            </button>
          </div>
        )}

        {bookings.filter(b => adminFil === "all" || b.s === adminFil || (adminFil === "active" && (b.s === "active" || b.s === "playing"))).sort((a, b) => b.ca - a.ca).map(bk => {
          const pc = ALL_PCS.find(p => p.id === bk.pid);
          const isSel = adminBkSel.includes(bk.id);
          return <div key={bk.id} className="bk-card" style={{
            borderColor: isSel ? "var(--teal)" : undefined,
            background: isSel ? "rgba(78,205,196,.06)" : undefined,
            cursor: adminBulk ? "pointer" : undefined,
          }} onClick={() => {
            if (adminBulk) setAdminBkSel(s => s.includes(bk.id) ? s.filter(x => x !== bk.id) : [...s, bk.id]);
          }}>
            {adminBulk && (
              <div style={{ width: 20, height: 20, borderRadius: "50%", border: isSel ? "2.5px solid var(--teal)" : "2px solid var(--s4)", background: isSel ? "var(--teal)" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, transition: "all .15s", boxShadow: isSel ? "0 0 6px rgba(78,205,196,.35)" : "none" }}>
                {isSel && <span style={{ color: "var(--bg)", fontSize: 10, fontWeight: 900 }}>✓</span>}
              </div>
            )}
            <div style={{ fontSize: 18 }}>{pc?.icon}</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontFamily: "Nunito", fontWeight: 700, fontSize: 10, display: "flex", alignItems: "center", gap: 3, flexWrap: "wrap" }}>{pc?.name} · {bk.un} <StatusPill status={bk.s} L={L} /></div>
              <div style={{ fontSize: 8, color: "var(--tx2)" }}>{fmtDate(bk.t0, lang)} {fmt(bk.t0)}–{fmt(bk.t1)} ₾{bk.price}</div>
            </div>
            {!adminBulk && (
              <div style={{ display: "flex", gap: 2, flexWrap: "wrap" }}>
                {bk.s === "pending" && <React.Fragment><button className="btn btn-teal btn-sm" onClick={() => doAdminAction(bk.id, "approve")} style={{ fontSize: 8, padding: "2px 6px" }}>✓</button><button className="btn btn-coral btn-sm" onClick={() => doAdminAction(bk.id, "reject")} style={{ fontSize: 8, padding: "2px 6px" }}>✕</button></React.Fragment>}
                {bk.s === "active" && <React.Fragment><button className="btn btn-lav btn-sm" onClick={() => doAdminAction(bk.id, "play")} style={{ fontSize: 8, padding: "2px 6px" }}>▶</button><button className="btn btn-ghost btn-sm" onClick={() => doAdminAction(bk.id, "end")} style={{ fontSize: 8, padding: "2px 6px" }}>⏹</button></React.Fragment>}
                {bk.s === "playing" && <button className="btn btn-ghost btn-sm" onClick={() => doAdminAction(bk.id, "end")} style={{ fontSize: 8, padding: "2px 6px" }}>⏹</button>}
                {["active", "pending", "playing"].includes(bk.s) && <button className="btn btn-coral btn-sm" onClick={() => doAdminAction(bk.id, "cancel")} style={{ fontSize: 8, padding: "2px 6px" }}>🚫</button>}
              </div>
            )}
          </div>;
        })}
      </React.Fragment>}

      {adminTab === "users" && <React.Fragment>
        {/* Add User button / form */}
        {user.role === "admin" && (
          <div style={{ marginBottom: 8 }}>
            {!showAddUser ? (
              <button className="btn btn-teal" style={{ width: "100%" }} onClick={() => setShowAddUser(true)}>
                + {lang === "ka" ? "მომხმარებლის დამატება" : "Add User"}
              </button>
            ) : (
              <div className="card" style={{ border: "1px solid rgba(78,205,196,.2)" }}>
                <div style={{ fontFamily: "Nunito", fontWeight: 700, fontSize: 12, marginBottom: 8, color: "var(--teal)" }}>
                  ✨ {lang === "ka" ? "ახალი მომხმარებელი" : "New User"}
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
                  <input className="inp" placeholder={L("nick")} value={addNick} onChange={e => setAddNick(e.target.value)} />
                  <input className="inp" placeholder={L("email")} value={addEmail} onChange={e => setAddEmail(e.target.value)} />
                  <input className="inp" type="password" placeholder={L("password")} value={addPw} onChange={e => setAddPw(e.target.value)} />
                  <div style={{ display: "flex", gap: 4 }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 8, color: "var(--tx2)", fontWeight: 600, marginBottom: 2 }}>Role</div>
                      <div style={{ display: "flex", gap: 2 }}>
                        {["user", "mod", "admin"].map(r => (
                          <button key={r} className={`btn btn-sm ${addRole === r ? "btn-teal" : "btn-ghost"}`}
                            style={{ flex: 1, fontSize: 9, padding: "4px 0" }}
                            onClick={() => setAddRole(r)}>{r}</button>
                        ))}
                      </div>
                    </div>
                  </div>
                  <div style={{ display: "flex", gap: 4 }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 8, color: "var(--tx2)", fontWeight: 600, marginBottom: 2 }}>🪙 {L("coins")}</div>
                      <input className="inp" type="number" value={addCoins} onChange={e => setAddCoins(e.target.value)} style={{ padding: "6px 8px" }} />
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 8, color: "var(--tx2)", fontWeight: 600, marginBottom: 2 }}>⏱ {L("hours")}</div>
                      <input className="inp" type="number" value={addHours} onChange={e => setAddHours(e.target.value)} style={{ padding: "6px 8px" }} />
                    </div>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 4, marginTop: 8 }}>
                  <button className="btn btn-teal btn-sm" style={{ flex: 1 }} onClick={doAddUser}>
                    {lang === "ka" ? "შექმნა" : "Create"}
                  </button>
                  <button className="btn btn-ghost btn-sm" onClick={() => { setShowAddUser(false); setAddNick(""); setAddEmail(""); setAddPw(""); }}>
                    {L("cancel")}
                  </button>
                </div>
              </div>
            )}
          </div>
        )}

        {/* User count */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
          <input className="inp" placeholder={L("search")} value={aSearch} onChange={e => setASearch(e.target.value)} style={{ flex: 1, marginRight: 8 }} />
          <span style={{ fontSize: 9, color: "var(--tx2)", fontWeight: 700, whiteSpace: "nowrap" }}>{users.length} users</span>
        </div>

        {users.filter(u => !aSearch || u.nick.toLowerCase().includes(aSearch.toLowerCase()) || u.email?.toLowerCase().includes(aSearch.toLowerCase())).map(u => {
          const uT = getTier(u.hr);
          const isLive = bookings.some(b => b.uid === u.id && (b.s === "active" || b.s === "playing") && b.t1 > Date.now());
          const uBks = bookings.filter(b => b.uid === u.id).length;
          return <div key={u.id} className="card" style={{ marginBottom: 5, padding: "10px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ fontSize: 16 }}>{uT.icon}</span>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 700, color: uT.c, fontSize: 11, display: "flex", alignItems: "center", gap: 3, flexWrap: "wrap" }}>
                  {u.nick}
                  {u.role !== "user" && <span className={`role-badge ${u.role === "admin" ? "role-admin" : "role-mod"}`}>{u.role.toUpperCase()}</span>}
                  {isLive && <span className="pl pl-t" style={{ fontSize: 6, padding: "0 3px" }}>LIVE</span>}
                  {!u.verified && <span className="pl pl-c" style={{ fontSize: 6, padding: "0 3px" }}>UNVERIFIED</span>}
                </div>
                <div style={{ fontSize: 8, color: "var(--tx2)", marginTop: 1 }}>{u.email}</div>
                <div style={{ display: "flex", gap: 6, marginTop: 3, fontSize: 8, color: "var(--tx2)" }}>
                  <span>⏱{u.hr}h</span>
                  <span>🪙{u.co}</span>
                  <span>🔥{u.st}</span>
                  <span>📋{uBks}</span>
                  <span>₾{Math.round(u.ts)}</span>
                </div>
              </div>
              {user.role === "admin" && u.id !== user.id && (
                <div style={{ display: "flex", flexDirection: "column", gap: 2, flexShrink: 0 }}>
                  <button className="btn btn-teal btn-sm" style={{ fontSize: 8, padding: "3px 8px" }} onClick={() => openEditUser(u)}>
                    ✏️ Edit
                  </button>
                  <div style={{ display: "flex", gap: 1 }}>
                    {["user", "mod", "admin"].map(r => (
                      <button key={r} className={`btn btn-sm ${u.role === r ? "btn-teal" : "btn-ghost"}`}
                        style={{ fontSize: 6, padding: "1px 3px" }}
                        onClick={() => setUsers(us => us.map(x => x.id === u.id ? { ...x, role: r } : x))}>
                        {r}
                      </button>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>;
        })}
      </React.Fragment>}
    </div>;
  };

  // ═══════════════════
  // SHEETS
  // ═══════════════════
  const renderSheet = () => {
    if (!sheet) return null;
    const close = () => setSheet(null);

    // AUTH — centered modal with Enter key support
    if (sheet === "auth") {
      const submitAuth = () => authMode === "login" ? doLogin() : doRegister();
      const handleKey = e => { if (e.key === "Enter") submitAuth(); };
      return <React.Fragment>
        <div className="overlay" onClick={close} />
        <div className="modal">
          <div style={{ textAlign: "center", marginBottom: 12 }}>
            <div style={{ fontSize: 28, marginBottom: 4 }}>{authMode === "login" ? "👋" : "✨"}</div>
            <h3 style={{ margin: 0 }}>{authMode === "login" ? L("login") : L("register")}</h3>
          </div>
          {authMode === "register" && <input className="inp" placeholder={L("nick")} value={aNick} onChange={e => setANick(e.target.value)} onKeyDown={handleKey} style={{ marginBottom: 6 }} />}
          <input className="inp" placeholder={authMode === "login" ? `${L("email")} / ${L("nick")}` : L("email")} value={aEmail} onChange={e => setAEmail(e.target.value)} onKeyDown={handleKey} style={{ marginBottom: 6 }} />
          <input className="inp" type="password" placeholder={L("password")} value={aPw} onChange={e => setAPw(e.target.value)} onKeyDown={handleKey} style={{ marginBottom: 14 }} />
          <button className="btn btn-teal" style={{ width: "100%" }} onClick={submitAuth}>
            {authMode === "login" ? L("login") : L("register")}
          </button>
          <div style={{ display: "flex", justifyContent: "center", marginTop: 10 }}>
            <button className="btn btn-ghost btn-sm" onClick={() => { setAuthMode(authMode === "login" ? "register" : "login"); setANick(""); setAEmail(""); setAPw(""); }}>
              {authMode === "login" ? L("register") : L("login")}
            </button>
          </div>
        </div>
      </React.Fragment>;
    }

    // VERIFY — centered modal, auto-submit on last digit, Enter support
    if (sheet === "verify" && verData) return <React.Fragment>
      <div className="overlay" onClick={close} />
      <div className="modal">
        <div style={{ textAlign: "center", marginBottom: 8 }}>
          <div style={{ fontSize: 28, marginBottom: 4 }}>🔐</div>
          <h3 style={{ margin: 0 }}>{L("verCode")}</h3>
        </div>
        <p style={{ fontSize: 10, color: "var(--tx2)", textAlign: "center", marginBottom: 4 }}>{L("enterCode")}</p>
        <p style={{ fontSize: 15, color: "var(--gold)", textAlign: "center", fontFamily: "Nunito", fontWeight: 800, letterSpacing: 5, marginBottom: 10 }}>Demo: {verData.code}</p>
        <div className="verify-inputs">
          {verDigits.map((d, i) => <input key={i} ref={el => verRefs.current[i] = el} value={d}
            onChange={e => {
              const v = e.target.value; if (!/^\d?$/.test(v)) return;
              const nd = [...verDigits]; nd[i] = v; setVerDigits(nd);
              if (v && i < 5) verRefs.current[i + 1]?.focus();
              if (v && i === 5) { const fullCode = nd.join(""); if (fullCode.length === 6) setTimeout(() => doVerify(fullCode), 50); }
            }}
            onKeyDown={e => {
              if (e.key === "Backspace" && !verDigits[i] && i > 0) verRefs.current[i - 1]?.focus();
              if (e.key === "Enter") doVerify();
            }}
            maxLength={1} inputMode="numeric" />)}
        </div>
        <button className="btn btn-teal" style={{ width: "100%", marginTop: 8 }} onClick={doVerify}>{L("verify")}</button>
      </div>
    </React.Fragment>;

    // PC INFO
    if (sheet === "pcinfo" && sheetData) {
      const pc = sheetData;
      const info = pcStatus(pc.id);
      const bks = bookings.filter(b => b.pid === pc.id && ["active", "pending", "playing"].includes(b.s) && b.t1 > Date.now()).sort((a, b) => a.t0 - b.t0);
      const lastEnd = bks.length > 0 ? Math.max(...bks.map(b => b.t1)) : Date.now();

      return <React.Fragment>
        <div className="overlay" onClick={close} />
        <div className="sheet"><div className="sheet-bar" />
          <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 8 }}>
            <span style={{ fontSize: 30 }}>{pc.icon}</span>
            <div><h3 style={{ margin: 0 }}>{pc.name}</h3><StatusPill status={info.s} L={L} /></div>
            <div style={{ width: 32, height: 3, borderRadius: 2, background: pc.c, marginLeft: "auto" }} />
          </div>

          {bks.length > 0 && <div style={{ marginBottom: 6 }}>
            <div className="section-title">{L("timeline")}</div>
            {bks.map(bk => <div key={bk.id} style={{ display: "flex", gap: 5, padding: "4px 0", borderBottom: "1px solid rgba(37,45,64,.3)" }}>
              <div style={{ width: 2, borderRadius: 1, background: (bk.s === "active" || bk.s === "playing") ? "var(--teal)" : "var(--gold)" }} />
              <div style={{ flex: 1, fontSize: 10 }}><div style={{ fontWeight: 600 }}>{fmt(bk.t0)}–{fmt(bk.t1)}</div><div style={{ color: "var(--tx2)" }}>{bk.un} · ₾{bk.price}</div></div>
            </div>)}
          </div>}

          {bks.length > 0 && <div className="queue-box">
            <div style={{ fontWeight: 700, color: "var(--lav)", marginBottom: 4, fontSize: 12 }}>{L("bookAfter")}</div>
            <div style={{ fontSize: 10, color: "var(--tx2)", marginBottom: 5 }}>From: {fmt(lastEnd)}</div>
            <div style={{ display: "flex", gap: 4, marginBottom: 5 }}>{[1, 2, 3].map(h => <button key={h} className={`ftab ${aqDur === h ? "act" : ""}`} onClick={() => setAqDur(h)}>{h}h</button>)}</div>
            <button className="btn btn-lav" style={{ width: "100%" }} onClick={() => createBooking(pc.id, lastEnd, lastEnd + aqDur * 3600000)}>{L("confirm")}</button>
          </div>}

          <button className="btn btn-teal" style={{ width: "100%", marginBottom: 5 }} onClick={() => { setSheetData(pc); setSheet("book"); setBkDur(1); setBkCustom(false); }}>
            {L("book")} {pc.name}
          </button>
          <button className="btn btn-coral" style={{ width: "100%" }} onClick={() => setShowIss(!showIss)}>{L("report")}</button>
          {showIss && <div style={{ marginTop: 5 }}>
            <div className="issue-grid">{ISSUES.map(iss => <div key={iss.id} className="issue-btn" onClick={() => {
              if (!user) return setSheet("auth");
              setReports(rs => [...rs, { id: uid(), pid: pc.id, issue: iss, details: issDet, uid: user.id, un: user.nick, ts: Date.now(), resolved: false }]);
              sendMsg(user.id, `🆘 ${iss[lang] || iss.en} on ${pc.name}${issDet ? ": " + issDet : ""}`, true);
              showToast("🆘 Reported!"); close();
            }}><span className="issue-icon">{iss.icon}</span>{iss[lang] || iss.en}</div>)}</div>
            <input className="inp" placeholder={L("details")} value={issDet} onChange={e => setIssDet(e.target.value)} style={{ marginTop: 4 }} />
          </div>}
        </div>
      </React.Fragment>;
    }

    // BOOK — unified for single PC and multi-PC, with full scheduling
    if (sheet === "book" && sheetData) {
      const isMulti = !!sheetData.pids;
      const pids = isMulti ? sheetData.pids : [sheetData.id];
      const pcs = pids.map(pid => ALL_PCS.find(p => p.id === pid)).filter(Boolean);
      const pcCount = pcs.length;
      const now = Date.now();

      // Quick start presets
      const quickStarts = [
        { label: "+30m", ts: now + 30 * 60000 },
        { label: "+1h", ts: now + 3600000 },
        { label: "+2h", ts: now + 2 * 3600000 },
        { label: "+3h", ts: now + 3 * 3600000 },
      ];
      const tmrw = new Date(now); tmrw.setDate(tmrw.getDate() + 1); tmrw.setMinutes(0, 0, 0);
      quickStarts.push({ label: lang === "ka" ? "ხვალ" : "Tomorrow", ts: tmrw.getTime() });

      const startTs = bkCustom ? new Date(bkT0).getTime() : now;
      const endTs = bkCustom ? new Date(bkT1).getTime() : now + bkDur * 3600000;
      const hrs = Math.max(0, (endTs - startTs) / 3600000);
      const calc = calcPrice(hrs, user);

      // Check conflicts for all PCs
      const conflictPids = pids.filter(pid =>
        bookings.some(b => b.pid === pid && ["active", "pending", "playing"].includes(b.s) && b.t0 < endTs && b.t1 > startTs)
      );
      const hasConflict = conflictPids.length > 0;

      const totalPrice = Math.round(calc.final * pcCount * 100) / 100;
      const totalCoins = calc.coins * pcCount;

      const setStart = (ts) => {
        setBkT0(fmtDT(new Date(ts)));
        setBkT1(fmtDT(new Date(ts + bkDur * 3600000)));
        setBkCustom(true);
      };

      const confirmBooking = () => {
        if (!user) return setSheet("auth");
        // Create booking for each PC
        const created = [];
        pids.forEach(pid => {
          if (conflictPids.includes(pid)) return; // skip conflicted
          const bkHrs = hrs;
          const bkCalc = calcPrice(bkHrs, user);
          const bk = { id: uid(), pid, uid: user.id, un: user.nick, t0: startTs, t1: endTs, price: bkCalc.final, coins: bkCalc.coins, hrs: Math.round(bkHrs * 100) / 100, s: "pending", ca: Date.now() };
          created.push(bk);
        });
        if (created.length === 0) return showToast("❌ All PCs have conflicts");
        setBookings(bs => [...bs, ...created]);
        updUser(user.id, u => ({ ...u, bk: u.bk + created.length }));
        created.forEach(bk => addNotif(user.id, "📋", `Booked ${ALL_PCS.find(p => p.id === bk.pid)?.name}`));
        // Show payment summary
