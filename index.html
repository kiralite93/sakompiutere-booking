  async function startRealtime(){ if(unsub){try{unsub()}catch(_){}} const {start,end}=dayBoundsNow(); unsub=db.collection('bookings').where('startAtMs','<',end).where('endAtMs','>',start).onSnapshot(snap=>{ allBookings=snap.docs.map(d=>({id:d.id,...d.data()})).map(x=>({...x,startAtMs:Number(x.startAtMs||0),endAtMs:Number(x.endAtMs||0)})); setCloud(tr('statusLive'),true); renderHall(); renderSelected(); renderMyBookings(); },handleFsError); }
  function startTicker(){ clearInterval(timer); timer=setInterval(()=>{ renderHall(); renderSelected(); },30000); }
  function bind(){ $('lang_ru').onclick=()=>{lang='ru';localStorage.setItem(LANG_KEY,lang);setLangUI()}; $('lang_en').onclick=()=>{lang='en';localStorage.setItem(LANG_KEY,lang);setLangUI()}; $('lang_ka').onclick=()=>{lang='ka';localStorage.setItem(LANG_KEY,lang);setLangUI()}; $('filterAll').onclick=()=>{currentFilter='all';renderHall()}; $('filterFree').onclick=()=>{currentFilter='free';renderHall()}; $('filterSoon').onclick=()=>{currentFilter='soon';renderHall()}; $('findNowBtn').onclick=findFreeNow; $('openMyBtn').onclick=toggleMy; $('openAuthBtn').onclick=openAuth; $('logoutBtn').onclick=async()=>{try{await auth.signOut()}catch(_){}}; $('closeAuthBtn').onclick=closeAuth; $('authBackdrop').onclick=e=>{if(e.target===$('authBackdrop')) closeAuth()}; $('closeConfirmBtn').onclick=closeConfirm; $('cancelConfirmBtn').onclick=closeConfirm; $('confirmBackdrop').onclick=e=>{if(e.target===$('confirmBackdrop')) closeConfirm()}; $('customDate').value=toISODate(new Date()); $('nickInput').value=localStorage.getItem(NICK_KEY)||''; $('nickInput').addEventListener('input',()=>localStorage.setItem(NICK_KEY,$('nickInput').value.trim())); $('customDate').addEventListener('change',buildCustomTimes); $('customDuration').addEventListener('change',buildCustomTimes); $('hideCustomBtn').onclick=hideCustom; $('bookCustomBtn').onclick=()=>{ if(!selectedPc) return; const startAtMs=Number($('customTime').value||0); if(!startAtMs) return toast(tr('pickTime'),'warn'); const duration=Number($('customDuration').value||60); pendingBooking={pc:selectedPc,startAtMs,endAtMs:startAtMs+duration*60000,nick:($('nickInput').value||'').trim(),note:($('noteInput').value||'').trim()}; fillConfirm(); openConfirm(); }; $('confirmBookBtn').onclick=()=>pendingBooking&&createBooking(pendingBooking); $('loginBtn').onclick=async()=>{ const email=($('authEmail').value||'').trim(), pass=($('authPass').value||'').trim(); if(!email||!pass) return $('authMsg').textContent=tr('loginErr'); try{ await auth.signInWithEmailAndPassword(email,pass); closeAuth(); }catch(e){ console.error(e); $('authMsg').textContent=e.message||tr('fsErr'); } }; $('registerBtn').onclick=async()=>{ const email=($('authEmail').value||'').trim(), pass=($('authPass').value||'').trim(); if(!email||!pass) return $('authMsg').textContent=tr('loginErr'); try{ await auth.createUserWithEmailAndPassword(email,pass); closeAuth(); }catch(e){ console.error(e); $('authMsg').textContent=e.message||tr('fsErr'); } }; $('resetBtn').onclick=async()=>{ const email=($('authEmail').value||'').trim(); if(!email) return $('authMsg').textContent=tr('loginErr'); try{ await auth.sendPasswordResetEmail(email); $('authMsg').textContent=tr('resetSent'); }catch(e){ console.error(e); $('authMsg').textContent=e.message||tr('fsErr'); } }; document.addEventListener('keydown',e=>{ if(e.key==='Escape'){closeAuth();closeConfirm();} }); }
  async function boot(){ setLangUI(); bind(); setCloud(tr('statusOk'),true); startTicker(); if(db) startRealtime(); auth.onAuthStateChanged(async u=>{ currentUser=u||null; updateUserUI(); renderMyBookings(); if(currentUser && !$('nickInput').value.trim()){ try{ const doc=await db.collection('users').doc(String(currentUser.uid)).get(); const nick=doc.exists?(doc.data().nick||''):''; if(nick){ $('nickInput').value=nick; localStorage.setItem(NICK_KEY,nick);} }catch(_){ } } }); }
  boot();
})();
</script>
