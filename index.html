  async function renderMyBookings(){ const box=$('myBookings'); box.innerHTML=''; if(!currentUser){ box.innerHTML=`<div class="notice">${esc(tr('authNeed'))}</div>`; return; } const mine=allBookings.filter(b=>b.uid===currentUser.uid&&b.endAtMs>Date.now()-86400000).sort((a,b)=>a.startAtMs-b.startAtMs); if(!mine.length){ box.innerHTML=`<div class="notice">${esc(tr('empty'))}</div>`; return; } mine.forEach(b=>{ const s=new Date(b.startAtMs), e=new Date(b.endAtMs); const item=document.createElement('div'); item.className='item'; item.innerHTML=`<div><b>${esc(b.pc)}</b><div class="meta">${esc(toISODate(s))} • ${esc(fmtHM(s))} → ${esc(fmtHM(e))}</div></div><button class="mini bad">${esc(tr('remove'))}</button>`; item.querySelector('button').onclick=async()=>{ if(!confirm(tr('remove')+'?')) return; try{ await db.collection('bookings').doc(b.id).delete(); toast(tr('canceled'),'good'); }catch(e){ handleFsError(e); } }; box.appendChild(item); }); }
  async function renderAdminBookings(){ const box=$('adminBookings'); box.innerHTML=''; $('adminPanel').classList.toggle('hidden', !isAdmin); if(!isAdmin) return; const list=allBookings.filter(b=>b.endAtMs>Date.now()).sort((a,b)=>a.startAtMs-b.startAtMs); if(!list.length){ box.innerHTML=`<div class="notice">${esc(tr('empty'))}</div>`; return; } list.forEach(b=>{ const s=new Date(b.startAtMs), e=new Date(b.endAtMs); const item=document.createElement('div'); item.className='item'; item.innerHTML=`<div><b>${esc(b.pc)}</b><div class="meta">${esc(b.nick||'')} • ${esc(toISODate(s))} • ${esc(fmtHM(s))} → ${esc(fmtHM(e))}</div></div><button class="mini bad">${esc(tr('remove'))}</button>`; item.querySelector('button').onclick=async()=>{ if(!confirm(tr('remove')+'?')) return; try{ await db.collection('bookings').doc(b.id).delete(); toast(tr('canceled'),'good'); }catch(e){ handleFsError(e); } }; box.appendChild(item); }); }
  function updateUserUI(){ $('userPill').textContent=currentUser?(currentUser.email||currentUser.uid.slice(0,6)):'—'; isAdmin=!!(currentUser&&ADMIN_EMAILS.includes(String(currentUser.email||'').toLowerCase())); $('openAuthBtn').classList.toggle('hidden',!!currentUser); $('logoutBtn').classList.toggle('hidden',!currentUser); if(currentUser) $('authMsg').textContent=tr('authOk')+(currentUser.email||currentUser.uid.slice(0,6)); $('adminPanel').classList.toggle('hidden', !isAdmin); }
  function findFreeNow(){ const free=ALL.filter(pc=>getPcStatus(pc).state==='free'); if(!free.length) return toast(tr('noFree'),'warn'); if(multiMode){ selectedPCs=new Set(free.slice(0,Math.min(3,free.length))); selectedPc=[...selectedPCs][0]||null; } else { selectedPc=free[0]; selectedPCs=new Set([free[0]]); } renderStats(); renderHall(); renderSelected(); buildCustomTimes(); }
  async function startRealtime(){ if(unsub){ try{unsub()}catch(_){}} const {start,end}=dayBoundsNow(); unsub=db.collection('bookings').where('startAtMs','<',end).where('endAtMs','>',start).onSnapshot(snap=>{ allBookings=snap.docs.map(d=>({id:d.id,...d.data()})).map(x=>({...x,startAtMs:Number(x.startAtMs||0),endAtMs:Number(x.endAtMs||0)})); setCloud(tr('statusLive'),true); renderStats(); renderHall(); renderSelected(); renderMyBookings(); renderAdminBookings(); },handleFsError); }
  function startTicker(){ clearInterval(timer); timer=setInterval(()=>{ renderStats(); renderHall(); renderSelected(); },30000); }
  function bind(){ $('lang_ru').onclick=()=>{lang='ru';localStorage.setItem(LANG_KEY,lang);setLangUI()}; $('lang_en').onclick=()=>{lang='en';localStorage.setItem(LANG_KEY,lang);setLangUI()}; $('lang_ka').onclick=()=>{lang='ka';localStorage.setItem(LANG_KEY,lang);setLangUI()}; $('filterAll').onclick=()=>{currentFilter='all';renderHall()}; $('filterFree').onclick=()=>{currentFilter='free';renderHall()}; $('filterSoon').onclick=()=>{currentFilter='soon';renderHall()}; $('findNowBtn').onclick=findFreeNow; $('toggleMultiBtn').onclick=()=>{ multiMode=!multiMode; if(!multiMode&&selectedPCs.size>1){ const first=[...selectedPCs][0]; selectedPCs=new Set(first?[first]:[]); selectedPc=first||null; } setLangUI(); }; $('clearSelectedBtn').onclick=()=>{ selectedPCs.clear(); selectedPc=null; renderStats(); renderHall(); renderSelected(); buildCustomTimes(); }; $('openMyBtn').onclick=()=>$('myPanel').scrollIntoView({behavior:'smooth',block:'start'}); $('mobileMyBtn').onclick=()=>$('myPanel').scrollIntoView({behavior:'smooth',block:'start'}); $('mobileBookBtn').onclick=()=>{ if(!selectedPCs.size) return toast(tr('selectedNone'),'warn'); $('customSection').scrollIntoView({behavior:'smooth',block:'start'}); }; $('openAdminBtn').onclick=()=>{ if(!currentUser) return toast(tr('loginNeeded'),'warn'); if(!isAdmin) return toast(tr('adminDenied'),'bad'); $('adminPanel').scrollIntoView({behavior:'smooth',block:'start'}); }; $('openAuthBtn').onclick=openAuth; $('logoutBtn').onclick=async()=>{ try{await auth.signOut()}catch(_){}}; $('closeAuthBtn').onclick=closeAuth; $('authBackdrop').onclick=e=>{ if(e.target===$('authBackdrop')) closeAuth(); }; $('closeConfirmBtn').onclick=closeConfirm; $('cancelConfirmBtn').onclick=closeConfirm; $('confirmBackdrop').onclick=e=>{ if(e.target===$('confirmBackdrop')) closeConfirm(); }; $('customDate').value=toISODate(new Date()); $('nickInput').value=localStorage.getItem(NICK_KEY)||''; $('nickInput').addEventListener('input',()=>localStorage.setItem(NICK_KEY,$('nickInput').value.trim())); $('customDate').addEventListener('change',buildCustomTimes); $('customDuration').addEventListener('change',buildCustomTimes); $('clearPanelsBtn').onclick=()=>{ selectedPCs.clear(); selectedPc=null; renderStats(); renderHall(); renderSelected(); buildCustomTimes(); }; $('bookCustomBtn').onclick=()=>{ if(!selectedPCs.size) return toast(tr('selectedNone'),'warn'); const startAtMs=Number($('customTime').value||0); if(!startAtMs) return toast(tr('pickTime'),'warn'); const duration=Number($('customDuration').value||60); pendingBooking={pcs:[...selectedPCs], startAtMs, endAtMs:startAtMs+duration*60000, nick:($('nickInput').value||'').trim(), note:($('noteInput').value||'').trim()}; fillConfirm(); openConfirm(); }; $('confirmBookBtn').onclick=()=>{ if(pendingBooking) createBooking(pendingBooking); }; $('loginBtn').onclick=async()=>{ const email=($('authEmail').value||'').trim(), pass=($('authPass').value||'').trim(); if(!email||!pass) return $('authMsg').textContent=tr('loginErr'); try{ await auth.signInWithEmailAndPassword(email,pass); closeAuth(); }catch(e){ console.error(e); $('authMsg').textContent=e.message||tr('fsErr'); } }; $('registerBtn').onclick=async()=>{ const email=($('authEmail').value||'').trim(), pass=($('authPass').value||'').trim(); if(!email||!pass) return $('authMsg').textContent=tr('loginErr'); try{ await auth.createUserWithEmailAndPassword(email,pass); closeAuth(); }catch(e){ console.error(e); $('authMsg').textContent=e.message||tr('fsErr'); } }; $('resetBtn').onclick=async()=>{ const email=($('authEmail').value||'').trim(); if(!email) return $('authMsg').textContent=tr('loginErr'); try{ await auth.sendPasswordResetEmail(email); $('authMsg').textContent=tr('resetSent'); }catch(e){ console.error(e); $('authMsg').textContent=e.message||tr('fsErr'); } }; document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeAuth(); closeConfirm(); } }); }
  async function boot(){ setLangUI(); bind(); setCloud(tr('statusOk'),true); startTicker(); if(db) startRealtime(); auth.onAuthStateChanged(async u=>{ currentUser=u||null; updateUserUI(); renderMyBookings(); renderAdminBookings(); if(currentUser&&!$('nickInput').value.trim()){ try{ const doc=await db.collection('users').doc(String(currentUser.uid)).get(); const nick=doc.exists?(doc.data().nick||''):''; if(nick){ $('nickInput').value=nick; localStorage.setItem(NICK_KEY,nick); } }catch(_){} } }); }
  boot();

  function renderHall(){ $('leftSide').innerHTML=''; $('rightSide').innerHTML=''; LEFT.forEach(pc=>{const c=renderCard(pc); if(c) $('leftSide').appendChild(c)}); RIGHT.forEach(pc=>{const c=renderCard(pc); if(c) $('rightSide').appendChild(c)}); }
  function renderStats(){ const freeCount=ALL.filter(pc=>getPcStatus(pc).state==='free').length; $('statAll').textContent=String(ALL.length); $('statFree').textContent=String(freeCount); $('statBusy').textContent=String(ALL.length-freeCount); $('statSelected').textContent=String(selectedPCs.size); }
  function renderSelected(){ $('selectedChips').innerHTML=''; if(!selectedPCs.size){ $('selectedName').textContent='—'; $('selectedStatus').textContent=multiMode?tr('multiHint'):tr('singleHint'); $('selectedActions').classList.add('hidden'); return; } const names=[...selectedPCs]; $('selectedName').textContent=names.length===1?names[0]:`${names.length} ${tr('pcs')}`; $('selectedStatus').textContent=names.length===1?tr('selectedOne'):`${tr('selectedMany')}: ${names.length}`; names.forEach(pc=>{ const chip=document.createElement('div'); chip.className='chip'; chip.innerHTML=`<b>${esc(pc)}</b>`; $('selectedChips').appendChild(chip); }); $('selectedActions').classList.remove('hidden'); const actions=[]; if(names.length===1&&!multiMode){ const s=getPcStatus(names[0]); if(s.state==='free'){ actions.push({label:tr('play1'), small:`${tr('starts')}: ${fmtHM(new Date())}`, fn:()=>openQuickConfirm(names,new Date(),60)}); actions.push({label:tr('play2'), small:`${tr('starts')}: ${fmtHM(new Date())}`, fn:()=>openQuickConfirm(names,new Date(),120)}); actions.push({label:tr('play3'), small:`${tr('starts')}: ${fmtHM(new Date())}`, fn:()=>openQuickConfirm(names,new Date(),180)}); } else { actions.push({label:tr('bookAt'), small:`${tr('starts')}: ${fmtHM(new Date(s.freeAtMs))}`, fn:()=>openNearestConfirm(names)}); actions.push({label:tr('queue'), small:tr('queueHint'), fn:()=>openNearestConfirm(names)}); } } else { actions.push({label:tr('group2'), small:names.join(', '), fn:()=>openQuickConfirm(names,new Date(),120)}); actions.push({label:tr('group3'), small:names.join(', '), fn:()=>openQuickConfirm(names,new Date(),180)}); }
    actions.push({label:tr('exact'), small:tr('customhint'), fn:()=>showCustom()}); $('quickActions').innerHTML=''; actions.forEach((a,i)=>{ const div=document.createElement('div'); div.className='quickItem'; div.innerHTML=`<div><b>${esc(a.label)}</b><small>${esc(a.small)}</small></div><button class="mini ${i===0?'primary':''}">→</button>`; div.querySelector('button').onclick=a.fn; $('quickActions').appendChild(div); }); }
  function clampToOpen(date){ const d=new Date(date); const base=new Date(d.getFullYear(),d.getMonth(),d.getDate(),0,0,0,0), open=addMinutes(base,WORK_START), close=addDays(base,1); close.setHours(Math.floor(WORK_END_NEXTDAY/60),WORK_END_NEXTDAY%60,0,0); if(d<open) return open; if(d>close) return null; return d; }
  function roundUp(date){ const d=new Date(date); d.setSeconds(0,0); const m=d.getMinutes(); const extra=(SLOT_STEP-(m%SLOT_STEP))%SLOT_STEP; if(extra) d.setMinutes(m+extra); return d; }
  const isFreeRangeForAll=(pcs,startMs,endMs)=>pcs.every(pc=>!getPcBookings(pc).some(b=>overlaps(startMs,endMs,b.startAtMs,b.endAtMs)));
  function findNearestForAll(pcs,earliest,dur){ let cur=roundUp(clampToOpen(earliest)||earliest); const until=addDays(new Date(),5).getTime(); while(cur&&cur.getTime()<until){ const end=addMinutes(cur,dur), a=clampToOpen(cur), b=clampToOpen(end); if(a&&b&&isFreeRangeForAll(pcs,cur.getTime(),end.getTime())) return cur; cur=addMinutes(cur,SLOT_STEP); } return null; }
  const openAuth=()=>$('authBackdrop').classList.add('show'), closeAuth=()=>$('authBackdrop').classList.remove('show'), openConfirm=()=>$('confirmBackdrop').classList.add('show'), closeConfirm=()=>$('confirmBackdrop').classList.remove('show');
  function needLogin(){ openAuth(); $('authMsg').textContent=tr('loginNeeded'); }
  function openQuickConfirm(pcs,start,dur){ if(!currentUser) return needLogin(); const nick=($('nickInput').value||'').trim()||localStorage.getItem(NICK_KEY)||''; if(!nick) return toast(tr('enterNick'),'warn'); const safe=findNearestForAll(pcs,start,dur); if(!safe) return toast(tr('taken'),'bad'); pendingBooking={pcs:[...pcs], startAtMs:safe.getTime(), endAtMs:addMinutes(safe,dur).getTime(), nick, note:($('noteInput').value||'').trim()}; fillConfirm(); openConfirm(); }
  function openNearestConfirm(pcs){ if(!currentUser) return needLogin(); const nick=($('nickInput').value||'').trim()||localStorage.getItem(NICK_KEY)||''; if(!nick) return toast(tr('enterNick'),'warn'); const safe=findNearestForAll(pcs,new Date(),120); if(!safe) return toast(tr('taken'),'bad'); pendingBooking={pcs:[...pcs], startAtMs:safe.getTime(), endAtMs:addMinutes(safe,120).getTime(), nick, note:($('noteInput').value||'').trim()}; fillConfirm(); openConfirm(); }
  function fillConfirm(){ if(!pendingBooking) return; const s=new Date(pendingBooking.startAtMs), e=new Date(pendingBooking.endAtMs); $('confirmInfo').innerHTML=`<b>${esc(tr('pcs'))}:</b> ${esc(pendingBooking.pcs.join(', '))}<br><b>${esc(tr('starts'))}:</b> ${esc(toISODate(s))} ${esc(fmtHM(s))}<br><b>${esc(tr('ends'))}:</b> ${esc(toISODate(e))} ${esc(fmtHM(e))}<br><b>${esc(tr('nick'))}:</b> ${esc(pendingBooking.nick)}${pendingBooking.note?`<br><b>${esc(tr('note'))}:</b> ${esc(pendingBooking.note)}`:''}`; }
  function showCustom(){ if(!selectedPCs.size) return toast(tr('selectedNone'),'warn'); buildCustomTimes(); }
  function buildCustomTimes(){ if(!selectedPCs.size) return; const pcs=[...selectedPCs], dateKey=$('customDate').value||toISODate(new Date()), dur=Number($('customDuration').value||60), sel=$('customTime'); sel.innerHTML=''; const [y,m,d]=dateKey.split('-').map(Number); const base=new Date(y,m-1,d,0,0,0,0), open=addMinutes(base,WORK_START), close=addDays(base,1); close.setHours(Math.floor(WORK_END_NEXTDAY/60),WORK_END_NEXTDAY%60,0,0); for(let cur=new Date(open); addMinutes(cur,dur)<=close; cur=addMinutes(cur,SLOT_STEP)){ const end=addMinutes(cur,dur); if(cur.getTime()<Date.now()) continue; if(!isFreeRangeForAll(pcs,cur.getTime(),end.getTime())) continue; const o=document.createElement('option'); o.value=String(cur.getTime()); o.textContent=`${fmtHM(cur)} → ${fmtHM(end)}`; sel.appendChild(o);} if(!sel.children.length){ const o=document.createElement('option'); o.value=''; o.textContent='—'; sel.appendChild(o);} }
  async function createBooking(data){ if(!currentUser) return needLogin(); const pcs=[...new Set((data.pcs||[]).map(String))].slice(0,10), startAtMs=Number(data.startAtMs), endAtMs=Number(data.endAtMs), nick=String(data.nick||'').trim().slice(0,32), note=String(data.note||'').trim().slice(0,120); if(!pcs.length) return toast(tr('selectedNone'),'warn'); if(!nick) return toast(tr('enterNick'),'warn'); if(!isFreeRangeForAll(pcs,startAtMs,endAtMs)) return toast(tr('taken'),'bad'); try{ await db.collection('users').doc(String(currentUser.uid)).set({nick,updatedAtMs:Date.now()},{merge:true}); const batch=db.batch(); pcs.forEach(pc=>{ const ref=db.collection('bookings').doc(); batch.set(ref,{uid:String(currentUser.uid),userEmail:String(currentUser.email||''),nick,pc,note,startAtMs,endAtMs,createdAtMs:Date.now()}); }); await batch.commit(); localStorage.setItem(NICK_KEY,nick); $('nickInput').value=nick; toast(tr('booked'),'good'); closeConfirm(); pendingBooking=null; await renderMyBookings(); if(isAdmin) await renderAdminBookings(); $('myPanel').scrollIntoView({behavior:'smooth',block:'start'}); }catch(e){ handleFsError(e); } }
  async function renderMyBookings(){ const box=$('myBookings'); box.innerHTML=''; if(!currentUser){ box.innerHTML=`<div class="notice">${esc(tr('authNeed'))}</div>`; return; } const mine=allBookings.filter(b=>b.uid===currentUser.uid&&b.endAtMs>Date.now()-86400000).sort((a,b)=>a.startAtMs-b.startAtMs); if(!mine.length){ box.innerHTML=`<div class="notice">${esc(tr('empty'))}</div>`; return; } mine.forEach(b=>{ const s=new Date(b.startAtMs), e=new Date(b.endAtMs); const item=document.createElement('div'); item.className='item'; item.innerHTML=`<div><b>${esc(b.pc)}</b><div class="meta">${esc(toISODate(s))} • ${esc(fmtHM(s))} → ${esc(fmtHM(e))}</div></div><button class="mini bad">${esc(tr('remove'))}</button>`; item.querySelector('button').onclick=async()=>{ if(!confirm(tr('remove')+'?')) return; try{ await db.collection('bookings').doc(b.id).delete(); toast(tr('canceled'),'good'); }catch(e){ handleFsError(e); } }; box.appendChild(item); }); }
  async function renderAdminBookings(){ const box=$('adminBookings'); box.innerHTML=''; $('adminPanel').classList.toggle('hidden', !isAdmin); if(!isAdmin) return; const list=allBookings.filter(b=>b.endAtMs>Date.now()).sort((a,b)=>a.startAtMs-b.startAtMs); if(!list.length){ box.innerHTML=`<div class="notice">${esc(tr('empty'))}</div>`; return; } list.forEach(b=>{ const s=new Date(b.startAtMs), e=new Date(b.endAtMs); const item=document.createElement('div'); item.className='item'; item.innerHTML=`<div><b>${esc(b.pc)}</b><div class="meta">${esc(b.nick||'')} • ${esc(toISODate(s))} • ${esc(fmtHM(s))} → ${esc(fmtHM(e))}</div></div><button class="mini bad">${esc(tr('remove'))}</button>`; item.querySelector('button').onclick=async()=>{ if(!confirm(tr('remove')+'?')) return; try{ await db.collection('bookings').doc(b.id).delete(); toast(tr('canceled'),'good'); }catch(e){ handleFsError(e); } }; box.appendChild(item); }); }
  function updateUserUI(){ $('userPill').textContent=currentUser?(currentUser.email||currentUser.uid.slice(0,6)):'—'; isAdmin=!!(currentUser&&ADMIN_EMAILS.includes(String(currentUser.email||'').toLowerCase())); $('openAuthBtn').classList.toggle('hidden',!!currentUser); $('logoutBtn').classList.toggle('hidden',!currentUser); if(currentUser) $('authMsg').textContent=tr('authOk')+(currentUser.email||currentUser.uid.slice(0,6)); $('adminPanel').classList.toggle('hidden', !isAdmin); }
  function findFreeNow(){ const free=ALL.filter(pc=>getPcStatus(pc).state==='free'); if(!free.length) return toast(tr('noFree'),'warn'); if(multiMode){ selectedPCs=new Set(free.slice(0,Math.min(3,free.length))); selectedPc=[...selectedPCs][0]||null; } else { selectedPc=free[0]; selectedPCs=new Set([free[0]]); } renderStats(); renderHall(); renderSelected(); buildCustomTimes(); }
  async function startRealtime(){ if(unsub){ try{unsub()}catch(_){}} const {start,end}=dayBoundsNow(); unsub=db.collection('bookings').where('startAtMs','<',end).where('endAtMs','>',start).onSnapshot(snap=>{ allBookings=snap.docs.map(d=>({id:d.id,...d.data()})).map(x=>({...x,startAtMs:Number(x.startAtMs||0),endAtMs:Number(x.endAtMs||0)})); setCloud(tr('statusLive'),true); renderStats(); renderHall(); renderSelected(); renderMyBookings(); renderAdminBookings(); },handleFsError); }
  function startTicker(){ clearInterval(timer); timer=setInterval(()=>{ renderStats(); renderHall(); renderSelected(); },30000); }
  function bind(){ $('lang_ru').onclick=()=>{lang='ru';localStorage.setItem(LANG_KEY,lang);setLangUI()}; $('lang_en').onclick=()=>{lang='en';localStorage.setItem(LANG_KEY,lang);setLangUI()}; $('lang_ka').onclick=()=>{lang='ka';localStorage.setItem(LANG_KEY,lang);setLangUI()}; $('filterAll').onclick=()=>{currentFilter='all';renderHall()}; $('filterFree').onclick=()=>{currentFilter='free';renderHall()}; $('filterSoon').onclick=()=>{currentFilter='soon';renderHall()}; $('findNowBtn').onclick=findFreeNow; $('toggleMultiBtn').onclick=()=>{ multiMode=!multiMode; if(!multiMode&&selectedPCs.size>1){ const first=[...selectedPCs][0]; selectedPCs=new Set(first?[first]:[]); selectedPc=first||null; } setLangUI(); }; $('clearSelectedBtn').onclick=()=>{ selectedPCs.clear(); selectedPc=null; renderStats(); renderHall(); renderSelected(); buildCustomTimes(); }; $('openMyBtn').onclick=()=>$('myPanel').scrollIntoView({behavior:'smooth',block:'start'}); $('mobileMyBtn').onclick=()=>$('myPanel').scrollIntoView({behavior:'smooth',block:'start'}); $('mobileBookBtn').onclick=()=>{ if(!selectedPCs.size) return toast(tr('selectedNone'),'warn'); $('customSection').scrollIntoView({behavior:'smooth',block:'start'}); }; $('openAdminBtn').onclick=()=>{ if(!currentUser) return toast(tr('loginNeeded'),'warn'); if(!isAdmin) return toast(tr('adminDenied'),'bad'); $('adminPanel').scrollIntoView({behavior:'smooth',block:'start'}); }; $('openAuthBtn').onclick=openAuth; $('logoutBtn').onclick=async()=>{ try{await auth.signOut()}catch(_){}}; $('closeAuthBtn').onclick=closeAuth; $('authBackdrop').onclick=e=>{ if(e.target===$('authBackdrop')) closeAuth(); }; $('closeConfirmBtn').onclick=closeConfirm; $('cancelConfirmBtn').onclick=closeConfirm; $('confirmBackdrop').onclick=e=>{ if(e.target===$('confirmBackdrop')) closeConfirm(); }; $('customDate').value=toISODate(new Date()); $('nickInput').value=localStorage.getItem(NICK_KEY)||''; $('nickInput').addEventListener('input',()=>localStorage.setItem(NICK_KEY,$('nickInput').value.trim())); $('customDate').addEventListener('change',buildCustomTimes); $('customDuration').addEventListener('change',buildCustomTimes); $('clearPanelsBtn').onclick=()=>{ selectedPCs.clear(); selectedPc=null; renderStats(); renderHall(); renderSelected(); buildCustomTimes(); }; $('bookCustomBtn').onclick=()=>{ if(!selectedPCs.size) return toast(tr('selectedNone'),'warn'); const startAtMs=Number($('customTime').value||0); if(!startAtMs) return toast(tr('pickTime'),'warn'); const duration=Number($('customDuration').value||60); pendingBooking={pcs:[...selectedPCs], startAtMs, endAtMs:startAtMs+duration*60000, nick:($('nickInput').value||'').trim(), note:($('noteInput').value||'').trim()}; fillConfirm(); openConfirm(); }; $('confirmBookBtn').onclick=()=>{ if(pendingBooking) createBooking(pendingBooking); }; $('loginBtn').onclick=async()=>{ const email=($('authEmail').value||'').trim(), pass=($('authPass').value||'').trim(); if(!email||!pass) return $('authMsg').textContent=tr('loginErr'); try{ await auth.signInWithEmailAndPassword(email,pass); closeAuth(); }catch(e){ console.error(e); $('authMsg').textContent=e.message||tr('fsErr'); } }; $('registerBtn').onclick=async()=>{ const email=($('authEmail').value||'').trim(), pass=($('authPass').value||'').trim(); if(!email||!pass) return $('authMsg').textContent=tr('loginErr'); try{ await auth.createUserWithEmailAndPassword(email,pass); closeAuth(); }catch(e){ console.error(e); $('authMsg').textContent=e.message||tr('fsErr'); } }; $('resetBtn').onclick=async()=>{ const email=($('authEmail').value||'').trim(); if(!email) return $('authMsg').textContent=tr('loginErr'); try{ await auth.sendPasswordResetEmail(email); $('authMsg').textContent=tr('resetSent'); }catch(e){ console.error(e); $('authMsg').textContent=e.message||tr('fsErr'); } }; document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeAuth(); closeConfirm(); } }); }
  async function boot(){ setLangUI(); bind(); setCloud(tr('statusOk'),true); startTicker(); if(db) startRealtime(); auth.onAuthStateChanged(async u=>{ currentUser=u||null; updateUserUI(); renderMyBookings(); renderAdminBookings(); if(currentUser&&!$('nickInput').value.trim()){ try{ const doc=await db.collection('users').doc(String(currentUser.uid)).get(); const nick=doc.exists?(doc.data().nick||''):''; if(nick){ $('nickInput').value=nick; localStorage.setItem(NICK_KEY,nick); } }catch(_){} } }); }
  boot();
})();
</script>
